<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#05070a" />

  <!-- Outer Hexagon Outline -->
  <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="none" stroke="#00ff41" stroke-width="2" filter="url(#greenGlow)" opacity="0.6"/>

  <!-- Inner Cyber Shield -->
  <path d="M 50 18 L 22 30 L 22 55 C 22 75 40 82 50 88 C 60 82 78 75 78 55 L 78 30 Z" fill="none" stroke="#00f2ff" stroke-width="4" filter="url(#cyanGlow)"/>

  <!-- Inner Circuit Traces -->
  <path d="M 50 18 L 50 35 M 22 55 L 35 55 M 78 55 L 65 55 M 50 88 L 50 72" fill="none" stroke="#00f2ff" stroke-width="2" opacity="0.8"/>

  <!-- Center Eye / Node -->
  <circle cx="50" cy="53" r="10" fill="none" stroke="#ff003c" stroke-width="3" filter="url(#redGlow)"/>
  <circle cx="50" cy="53" r="3" fill="#ffb800" filter="url(#redGlow)"/>
  <path d="M 35 53 L 40 53 M 60 53 L 65 53 M 50 38 L 50 43 M 50 63 L 50 68" stroke="#ff003c" stroke-width="2" filter="url(#redGlow)"/>
</svg>
