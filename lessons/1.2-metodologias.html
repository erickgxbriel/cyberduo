<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberDuo - Metodologias de Teste 1.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #2d5af5;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(45, 90, 245, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: 1.05rem; color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: 0.95rem; line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: 0.95rem; -webkit-tap-highlight-color: transparent; }
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(45, 90, 245, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem; background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px; }
        .check-btn.active { background: var(--cyber-blue); color: white; box-shadow: 0 4px 0 #1a3fb3; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: 0.95rem; color: #8b949e; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="game-header">
        <i class="fas fa-times cursor-pointer text-gray-500" onclick="window.location.href='../modules/modulo-01.html'"></i>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-vial-circle-check',
                concept: 'Metodologias de Teste',
                desc: 'Seguir métodos conhecidos é vital para uma abordagem <span class="highlight-cyan">organizada e sistemática</span>, garantindo que nenhum vetor seja esquecido e que os resultados sejam defensáveis.',
                task: 'Por que utilizar uma metodologia comprovada durante um pentest para um cliente?',
                options: [
                    'Para garantir prestação de contas e resultados defensáveis e sistemáticos',
                    'Para terminar o teste o mais rápido possível e receber o pagamento',
                    'Para permitir que qualquer pessoa da internet acesse a rede do cliente'
                ],
                correctText: 'Para garantir prestação de contas e resultados defensáveis e sistemáticos',
                explanation: 'Metodologias dão credibilidade e estrutura profissional ao trabalho do pentester.'
            },
            {
                icon: 'fa-ghost',
                concept: 'Ambiente Desconhecido',
                desc: 'No teste de <span class="highlight-yellow">ambiente desconhecido</span> (Caixa Preta), o testador não possui conhecimento prévio da infraestrutura, simulando um ataque externo real.',
                task: 'Qual a principal característica de um teste de "Caixa Preta"?',
                options: [
                    'O auditor possui pouco ou nenhum conhecimento prévio do alvo',
                    'O auditor possui acesso total ao código-fonte e senhas de administrador',
                    'O teste é realizado apenas em servidores que estão desligados'
                ],
                correctText: 'O auditor possui pouco ou nenhum conhecimento prévio do alvo',
                explanation: 'Este método avalia o que um agressor externo veria e conseguiria explorar.'
            },
            {
                icon: 'fa-eye',
                concept: 'Ambiente Conhecido',
                desc: 'No teste de <span class="highlight-cyan">ambiente conhecido</span> (Caixa Branca), o auditor tem acesso total a documentação, diagramas de rede e até código-fonte.',
                task: 'Qual a vantagem de realizar um teste de "Caixa Branca"?',
                options: [
                    'Permite uma auditoria profunda e exaustiva de todos os componentes internos',
                    'É o método mais barato pois exige menos tempo de investigação',
                    'Garante que o hacker criminoso nunca descubra a existência da rede'
                ],
                correctText: 'Permite uma auditoria profunda e exaustiva de todos os componentes internos',
                explanation: 'Com acesso aos dados, o pentester pode encontrar falhas que seriam difíceis de ver de fora.'
            },
            {
                icon: 'fa-diagram-project',
                concept: 'MITRE ATT&CK',
                desc: 'O framework <span class="highlight-red">MITRE ATT&CK</span> é uma base de conhecimento global de táticas, técnicas e procedimentos (TTPs) baseada em observações do mundo real.',
                task: 'Como profissionais utilizam a matriz MITRE ATT&CK no dia a dia?',
                options: [
                    'Para aprender e mapear as táticas e técnicas reais usadas por adversários',
                    'Para hospedar sites pessoais e portfólios de design gráfico',
                    'Para realizar chamadas de vídeo criptografadas com outros países'
                ],
                correctText: 'Para aprender e mapear as táticas e técnicas reais usadas por adversários',
                explanation: 'O MITRE fornece a linguagem comum para descrever comportamentos de ataque.'
            },
            {
                icon: 'fa-magnifying-glass-chart',
                concept: 'OWASP WSTG',
                desc: 'O <span class="highlight-cyan">WSTG (Web Security Testing Guide)</span> é o guia mais detalhado para testes de aplicações web, cobrindo vetores como XSS e SQLi.',
                task: 'Qual o foco principal do guia OWASP WSTG na indústria de segurança?',
                options: [
                    'Fornecer uma metodologia exaustiva para testes de segurança em aplicações web',
                    'Ensinar a montar infraestruturas de rede física em grandes prédios',
                    'Vender licenças de software antivírus para o governo federal'
                ],
                correctText: 'Fornecer uma metodologia exaustiva para testes de segurança em aplicações web',
                explanation: 'É o padrão de ouro para auditoria técnica de sites e sistemas web.'
            },
            {
                icon: 'fa-building-shield',
                concept: 'NIST SP 800-115',
                desc: 'A publicação <span class="highlight-yellow">NIST SP 800-115</span> fornece diretrizes fundamentais para o planejamento e realização de testes de segurança da informação.',
                task: 'Qual organização criou o documento padrão SP 800-115 usado na indústria?',
                options: [
                    'NIST (National Institute of Standards and Technology)',
                    'FBI (Federal Bureau of Investigation)',
                    'OWASP Foundation'
                ],
                correctText: 'NIST (National Institute of Standards and Technology)',
                explanation: 'O NIST define muitos dos padrões de conformidade e auditoria seguidos globalmente.'
            },
            {
                icon: 'fa-list-ol',
                concept: 'Fases do PTES',
                desc: 'O <span class="highlight-cyan">PTES</span> define sete fases, desde a pré-interação até o relatório final, focando em ferramentas e métodos atuais de ataque.',
                task: 'Quantas fases distintas compõem o Padrão de Execução de Teste de Penetração (PTES)?',
                options: [
                    '7 fases',
                    '3 fases',
                    '10 fases'
                ],
                correctText: '7 fases',
                explanation: 'As fases incluem inteligência, modelagem de ameaças, análise de vulnerabilidades, entre outras.'
            },
            {
                icon: 'fa-bug',
                concept: 'Bug Bounties',
                desc: 'Programas de <span class="highlight-green">Recompensa por Bugs</span> permitem que pesquisadores recebam compensação financeira por encontrar falhas de forma ética.',
                task: 'Qual a diferença entre Pentest tradicional e programas de Bug Bounty?',
                options: [
                    'Bug Bounty é contínuo e aberto a muitos pesquisadores; Pentest é por contrato e prazo',
                    'Pentest é ilegal; Bug Bounty é a única forma legal de praticar hacking',
                    'Não há diferença técnica ou contratual entre os dois modelos'
                ],
                correctText: 'Bug Bounty é contínuo e aberto a muitos pesquisadores; Pentest é por contrato e prazo',
                explanation: 'Empresas usam Bug Bounties para ter uma multidão de olhos testando seus sistemas 24/7.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">1.2 • METODOLOGIAS • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "PROCESSO VALIDADO!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "DESVIO DE ESCOPO!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("METODOLOGIA CORROMPIDA. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: var(--cyber-blue)">
                    <i class="fas fa-medal text-5xl text-yellow-400 mb-2"></i>
                    <h2 class="text-xl font-bold text-white mb-1">METODOLOGIAS DOMINADAS!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você compreendeu os padrões e processos que guiam um teste de penetração profissional no Módulo 1.2.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-01.html'" style="background: var(--cyber-blue); color: white;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
