<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberDuo - Falhas de Configuração 6.10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #00f2ff;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(0, 242, 255, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: 1.05rem; color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: 0.95rem; line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: 0.95rem; -webkit-tap-highlight-color: transparent; }
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(0, 242, 255, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem; background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px; }
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #0099a1; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: 0.95rem; color: #8b949e; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="game-header">
        <i class="fas fa-times cursor-pointer text-gray-500" onclick="window.location.href='../modules/modulo-06.html'"></i>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-gears',
                concept: 'Security Misconfiguration',
                desc: 'Falhas de <span class="highlight-cyan">má configuração de segurança</span> ocorrem devido a padrões conhecidos, senhas de fábrica ou permissões excessivas que expõem o servidor web.',
                task: 'O que caracteriza uma vulnerabilidade de má configuração em um servidor web?',
                options: [
                    'Uso de configurações e senhas padrão que não foram alteradas',
                    'Uso de cabos de rede com cores diferentes das especificadas no manual',
                    'A desativação do modo de economia de energia do computador host'
                ],
                correctText: 'Uso de configurações e senhas padrão que não foram alteradas',
                explanation: 'Manter padrões de fábrica é convidar atacantes a usar credenciais conhecidas.'
            },
            {
                icon: 'fa-folder-tree',
                concept: 'Traversal de Diretório',
                desc: 'A <span class="highlight-yellow">Travessia de Diretório</span> (path traversal) permite acessar arquivos fora da pasta raiz (web root) usando sequências como <span class="highlight-cyan">../</span> (dot-dot-slash).',
                task: 'Qual a função técnica da sequência de caracteres "../" em um ataque de traversal?',
                options: [
                    'Subir um nível na árvore de diretórios do sistema operacional hospedeiro',
                    'Apagar todos os arquivos temporários da pasta de downloads do servidor',
                    'Redirecionar o tráfego HTTP para um servidor de backup externo'
                ],
                correctText: 'Subir um nível na árvore de diretórios do sistema operacional hospedeiro',
                explanation: 'Ao "subir" níveis, o atacante pode alcançar o sistema de arquivos base do SO.'
            },
            {
                icon: 'fa-file-shield',
                concept: 'Exploração de Path Traversal',
                desc: 'Manipulando variáveis que referenciam arquivos, um atacante pode ler o arquivo <span class="highlight-red">/etc/passwd</span> ou arquivos de configuração sensíveis do servidor.',
                task: 'Você acessa uma URL que termina em "?page=../../etc/passwd" e vê o conteúdo. O que isso confirma?',
                options: [
                    'Uma falha de travessia de diretório e possível vazamento de informações do SO',
                    'Que o firewall da empresa está funcionando corretamente e bloqueando o acesso',
                    'Que o aplicativo web é 100% seguro e segue todas as normas do NIST'
                ],
                correctText: 'Uma falha de travessia de diretório e possível vazamento de informações do SO',
                explanation: 'A visualização de arquivos de sistema via web confirma a falha de isolamento da raiz.'
            },
            {
                icon: 'fa-cookie',
                concept: 'Manipulação de Cookies',
                desc: 'A <span class="highlight-cyan">Manipulação de Cookies</span> (ataques baseados em DOM armazenados) ocorre quando o app insere entrada do usuário em um cookie de forma insegura.',
                task: 'Qual a prática recomendada para evitar a manipulação de cookies por atacantes?',
                options: [
                    'Evitar gravar cookies dinamicamente usando dados de fontes não confiáveis',
                    'Permitir que qualquer script de terceiros altere o valor do cookie de sessão',
                    'Ocultar a existência de cookies dos desenvolvedores do aplicativo'
                ],
                correctText: 'Evitar gravar cookies dinamicamente usando dados de fontes não confiáveis',
                explanation: 'Validar o que vai para o armazenamento do navegador é essencial para manter a integridade da sessão.'
            },
            {
                icon: 'fa-magnifying-glass-bug',
                concept: 'Scanners e Validação',
                desc: 'Testes <span class="highlight-yellow">automatizados</span> encontram muitas falhas de configuração, mas a validação humana é necessária para entender contextos e softwares legados.',
                task: 'Por que o conhecimento manual é vital mesmo usando scanners automáticos de vulnerabilidade?',
                options: [
                    'Para garantir que falhas em softwares antigos e contextos específicos não foram perdidas',
                    'Porque scanners automáticos não conseguem ler arquivos HTML simples',
                    'Para desligar o servidor manualmente toda vez que uma falha for encontrada'
                ],
                correctText: 'Para garantir que falhas em softwares antigos e contextos específicos não foram perdidas',
                explanation: 'O pentester humano identifica nuances lógicas que a ferramenta automatizada ignora.'
            },
            {
                icon: 'fa-user-lock',
                concept: 'Isolamento do Web Root',
                desc: 'O servidor deve impedir que visitantes naveguem <span class="highlight-red">para fora da pasta raiz</span>, onde arquivos do sistema e senhas estão armazenados.',
                task: 'O que o web root deve representar em uma configuração de servidor segura?',
                options: [
                    'O limite máximo de acesso de arquivos para qualquer requisição via HTTP',
                    'A página que contém todas as senhas de administrador do banco de dados',
                    'O local onde o histórico de navegação de todos os funcionários é salvo'
                ],
                correctText: 'O limite máximo de acesso de arquivos para qualquer requisição via HTTP',
                explanation: 'Nenhuma requisição deve ser capaz de referenciar arquivos acima do diretório da aplicação.'
            },
            {
                icon: 'fa-shield-check',
                concept: 'Mitigação e Hardening',
                desc: 'Manter software atualizado, revisar permissões e remover serviços desnecessários são <span class="highlight-green">pilares do hardening</span> (endurecimento) de servidores.',
                task: 'Qual ação faz parte de um processo de hardening (endurecimento) de segurança?',
                options: [
                    'Revisão periódica de permissões e desativação de serviços não utilizados',
                    'Aumento da contagem de usuários com privilégios de root no sistema',
                    'Remoção de todos os logs de acesso para economizar espaço em disco'
                ],
                correctText: 'Revisão periódica de permissões e desativação de serviços não utilizados',
                explanation: 'Hardening é o processo de reduzir a superfície de ataque fechando portas e serviços extras.'
            },
            {
                icon: 'fa-check-double',
                concept: 'Práticas de Configuração Segura',
                desc: 'A configuração segura é um <span class="highlight-green">processo contínuo</span> de auditoria, atualização e monitoramento de mudanças no ambiente web.',
                task: 'Como garantir a segurança da configuração a longo prazo?',
                options: [
                    'Através de auditorias periódicas, atualizações e controle de mudanças',
                    'Formatando o servidor completamente a cada final de semana',
                    'Utilizando apenas mídias de instalação físicas de vinte anos atrás'
                ],
                correctText: 'Através de auditorias periódicas, atualizações e controle de mudanças',
                explanation: 'A segurança web exige vigilância constante contra novas falhas e mudanças de infraestrutura.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">6.10 • MÁ CONFIGURAÇÃO • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "CONFIGURAÇÃO VÁLIDA!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "CONFIGURAÇÃO INSEGURA!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("ACESSO NEGADO. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: var(--cyber-green)">
                    <i class="fas fa-medal text-5xl text-yellow-400 mb-2"></i>
                    <h2 class="text-xl font-bold text-white mb-1">AUDITORIA CONCLUÍDA!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você dominou as skills de configuração segura e travessia de diretório no Módulo 6.10.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-06.html'" style="background: var(--cyber-green); color: black;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
