<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <title>CyberDuo - Laboratório Hacker 1.3</title>
    <link rel="stylesheet" href="../assets/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #2d5af5;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: max(0.8rem, env(safe-area-inset-top)) 1rem 0.8rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(45, 90, 245, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: clamp(0.95rem, 3.8vw, 1.1rem); color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: clamp(0.9rem, 3.5vw, 1rem); line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: clamp(1rem, 4vw, 1.15rem); font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: clamp(0.9rem, 3.5vw, 1rem); -webkit-tap-highlight-color: transparent;  min-height: 48px;}
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(45, 90, 245, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem 1rem max(1rem, env(safe-area-inset-bottom)); background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px;  min-height: 48px;}
        .check-btn.active { background: var(--cyber-blue); color: white; box-shadow: 0 4px 0 #1a3fb3; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: clamp(1rem, 4vw, 1.2rem); font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: clamp(0.9rem, 3.5vw, 1rem); color: #8b949e; line-height: 1.4; }
    
        /* Design Spells: Interactive Magic */
        .option-card {
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @media (hover: hover) and (pointer: fine) {
            .option-card:hover:not(.disabled) {
                transform: translateX(6px);
                border-color: rgba(0, 242, 255, 0.5);
                box-shadow: -4px 0 10px rgba(0, 242, 255, 0.1);
            }
            .check-btn.active:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 15px rgba(0, 255, 65, 0.3), 0 4px 0 #008f20;
            }
        }
        .check-btn.active:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #008f20;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <div class="flex items-center justify-center cursor-pointer text-gray-500" style="min-width: 44px; min-height: 44px; margin-left: -10px;" onclick="window.location.href='../modules/modulo-01.html'"><i class="fas fa-times"></i></div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-vial-virus',
                concept: 'Ambiente de Laboratório',
                desc: 'Um ambiente de laboratório adequado permite testar ferramentas e técnicas <span class="highlight-cyan">antes</span> de executá-las na rede do cliente, garantindo que nada quebre acidentalmente.',
                task: 'Por que é vital testar suas ferramentas em um laboratório antes de usá-las em um cliente?',
                options: [
                    'Muitas ferramentas são projetadas para quebrar coisas e você precisa saber o que esperar',
                    'Para economizar o tempo de login nos servidores oficiais da empresa',
                    'Para garantir que a velocidade da internet banda larga do cliente seja preservada'
                ],
                correctText: 'Muitas ferramentas são projetadas para quebrar coisas e você precisa saber o que esperar',
                explanation: 'O lab é o campo de testes seguro onde falhas não causam prejuízo real.'
            },
            {
                icon: 'fa-linux',
                concept: 'Distribuições PenTest',
                desc: 'Sistemas como <span class="highlight-yellow">Kali Linux</span>, Parrot OS e BlackArch fornecem ambientes convenientes com centenas de ferramentas pré-instaladas.',
                task: 'Qual a vantagem principal de usar distribuições Linux como o Kali em laboratórios?',
                options: [
                    'Elas oferecem um ambiente conveniente e pronto com ferramentas de segurança',
                    'Elas são as únicas capazes de acessar a deep web de forma criptografada',
                    'Elas permitem formatar qualquer computador remotamente sem autorização'
                ],
                correctText: 'Elas oferecem um ambiente conveniente e pronto com ferramentas de segurança',
                explanation: 'A conveniência economiza horas de instalação e configuração de dependências.'
            },
            {
                icon: 'fa-microchip',
                concept: 'Virtualização Host-Only',
                desc: 'Uma rede <span class="highlight-cyan">somente host</span> permite que VMs se comuniquem sem que os pacotes saiam do sistema físico, criando uma rede fechada e segura.',
                task: 'O que caracteriza uma rede "Host-Only" em ambientes virtualizados?',
                options: [
                    'As máquinas virtuais se comunicam sem que o tráfego saia do computador físico',
                    'A conexão de rede é feita através de cabos físicos USB de alta velocidade',
                    'O tráfego de dados é enviado diretamente para os satélites de comunicação'
                ],
                correctText: 'As máquinas virtuais se comunicam sem que o tráfego saia do computador físico',
                explanation: 'Isso isola completamente seus ataques da rede da sua casa ou empresa.'
            },
            {
                icon: 'fa-flask-vial',
                concept: 'WebSploit Labs',
                desc: 'O <span class="highlight-green">WebSploit Labs</span> fornece mais de 450 exercícios e aplicativos vulneráveis rodando em contêineres Docker para prática intensiva.',
                task: 'Como as tecnologias de contêiner (como Docker) auxiliam no laboratório?',
                options: [
                    'Permitem implementar e restaurar rapidamente aplicativos vulneráveis para prática',
                    'Aumentam o brilho da tela para facilitar a leitura de logs de segurança',
                    'Bloqueiam permanentemente qualquer tentativa de invasão por Wi-Fi'
                ],
                correctText: 'Permitem implementar e restaurar rapidamente aplicativos vulneráveis para prática',
                explanation: 'Contêineres são leves e podem ser reiniciados instantaneamente se algo quebrar.'
            },
            {
                icon: 'fa-shield-halved',
                concept: 'Rede Fechada',
                desc: 'Garantir um <span class="highlight-yellow">acesso restrito à Internet</span> e acesso controlado é um requisito fundamental para evitar o vazamento de tráfego malicioso.',
                task: 'Qual a importância de manter seu laboratório de ataque em uma rede fechada?',
                options: [
                    'Garantir acesso controlado e evitar que tráfego de testes atinja a internet real',
                    'Reduzir o consumo de energia elétrica dos servidores de banco de dados',
                    'Impedir que outros usuários assistam vídeos de entretenimento na rede local'
                ],
                correctText: 'Garantir acesso controlado e evitar que tráfego de testes atinja a internet real',
                explanation: 'O isolamento evita incidentes legais e vazamento de código malicioso.'
            },
            {
                icon: 'fa-camera',
                concept: 'Snapshots e Restauração',
                desc: 'O recurso de <span class="highlight-cyan">SnapShot</span> permite capturar o estado atual da VM, possibilitando a restauração imediata se o sistema for corrompido.',
                task: 'Para que serve a função "SnapShot" em softwares como VirtualBox ou VMware?',
                options: [
                    'Capturar o estado do sistema para permitir restauração rápida se algo quebrar',
                    'Tirar uma foto física do usuário através da webcam do computador',
                    'Aumentar permanentemente o espaço de armazenamento do disco rígido'
                ],
                correctText: 'Capturar o estado do sistema para permitir restauração rápida se algo quebrar',
                explanation: 'Penteesters quebram sistemas; snapshots permitem voltar atrás e tentar de novo.'
            },
            {
                icon: 'fa-terminal',
                concept: 'Comando pwd no Linux',
                desc: 'No terminal Kali, o comando <span class="highlight-yellow">pwd</span> (print working directory) exibe o caminho completo do diretório onde você se encontra.',
                task: 'Ao abrir um terminal no Kali e digitar "pwd", o que o sistema retornará?',
                options: [
                    'O caminho completo do diretório atual onde o usuário está trabalhando',
                    'A senha de administrador root do sistema operacional atual',
                    'O endereço IP público que o roteador está usando no momento'
                ],
                correctText: 'O caminho completo do diretório atual onde o usuário está trabalhando',
                explanation: 'pwd é um comando básico vital para navegação via console no Linux.'
            },
            {
                icon: 'fa-circle-check',
                concept: 'Sistemas de Alvo',
                desc: 'Ter <span class="highlight-green">alvos de prática</span> (VMs intencionalmente vulneráveis) é essencial para validar achados e treinar o uso de ferramentas.',
                task: 'O que o aluno deve ter configurado antes de iniciar as explorações reais do curso?',
                options: [
                    'Uma distribuição de ataque (ex: Kali) e sistemas alvo vulneráveis (ex: Windows/Docker)',
                    'Apenas uma lista de nomes de domínios famosos para tentar invadir',
                    'Um navegador de internet com várias abas de redes sociais abertas'
                ],
                correctText: 'Uma distribuição de ataque (ex: Kali) e sistemas alvo vulneráveis (ex: Windows/Docker)',
                explanation: 'A dupla Ataque + Alvo compõe o ecossistema básico do Pentest.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">1.3 • LABORATÓRIO • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "CONFIGURAÇÃO VÁLIDA!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "ERRO NO AMBIENTE!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("INSTALAÇÃO CORROMPIDA. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: var(--cyber-blue)">
                    <i class="fas fa-medal text-5xl text-yellow-400 mb-2"></i>
                    <h2 class="text-xl font-bold text-white mb-1">LABORATÓRIO PRONTO!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você compreendeu como construir e operar um ambiente de testes seguro no Módulo 1.3.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-01.html'" style="background: var(--cyber-blue); color: white;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
