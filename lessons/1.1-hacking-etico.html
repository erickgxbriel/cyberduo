<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberDuo - Hacking Ético e Pentest 1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #2d5af5;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(45, 90, 245, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: 1.05rem; color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: 0.95rem; line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: 0.95rem; -webkit-tap-highlight-color: transparent; }
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(45, 90, 245, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem; background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px; }
        .check-btn.active { background: var(--cyber-blue); color: white; box-shadow: 0 4px 0 #1a3fb3; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: 0.95rem; color: #8b949e; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="game-header">
        <i class="fas fa-times cursor-pointer text-gray-500" onclick="window.location.href='../modules/modulo-01.html'"></i>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-user-shield',
                concept: 'O Hacker Ético',
                desc: 'Um <span class="highlight-cyan">hacker ético</span> é um profissional que imita um atacante para avaliar a segurança de um sistema com o objetivo de minimizar riscos.',
                task: 'O que define essencialmente a diferença entre um hacker ético e um malicioso?',
                options: [
                    'A permissão explícita para testar e a ausência de intenção maliciosa',
                    'O uso de sistemas operacionais mais modernos e caros',
                    'A velocidade com que ele consegue quebrar senhas de Wi-Fi'
                ],
                correctText: 'A permissão explícita para testar e a ausência de intenção maliciosa',
                explanation: 'A autorização e o propósito de ajudar são os pilares da ética no hacking.'
            },
            {
                icon: 'fa-bullseye',
                concept: 'Escopo do Teste',
                desc: 'A permissão para atacar é definida pelo <span class="highlight-yellow">Escopo</span>. Ele determina o que você pode ou não testar para evitar problemas legais.',
                task: 'No contexto de um teste de penetração, o que é o "escopo"?',
                options: [
                    'O conjunto de regras e sistemas que o auditor tem autorização para testar',
                    'Uma lista de todas as senhas que o hacker já descobriu na vida',
                    'O nome do software antivírus que o cliente utiliza nos servidores'
                ],
                correctText: 'O conjunto de regras e sistemas que o auditor tem autorização para testar',
                explanation: 'Sair do escopo pode levar a processos legais e danos não planejados.'
            },
            {
                icon: 'fa-handshake',
                concept: 'Divulgação Responsável',
                desc: 'Pesquisadores de segurança são éticos quando realizam a <span class="highlight-cyan">divulgação responsável</span>, informando falhas aos fornecedores antes do público.',
                task: 'O que caracteriza a prática de "Divulgação Responsável"?',
                options: [
                    'Comunicar a vulnerabilidade ao proprietário do sistema de forma privada e segura',
                    'Postar os detalhes da falha imediatamente em redes sociais para ganhar fama',
                    'Vender a informação da vulnerabilidade para o maior lance no mercado negro'
                ],
                correctText: 'Comunicar a vulnerabilidade ao proprietário do sistema de forma privada e segura',
                explanation: 'Isso dá tempo para o fornecedor criar um patch antes que o erro seja explorado.'
            },
            {
                icon: 'fa-shield-halved',
                concept: 'Defesa em Profundidade',
                desc: 'A <span class="highlight-green">Defesa em Profundidade</span> é uma estratégia que utiliza múltiplas camadas de segurança (firewalls, IPS, antivírus) para proteger dados.',
                task: 'Qual a utilidade dos testes de penetração na estratégia de defesa em profundidade?',
                options: [
                    'Validar se as múltiplas camadas defensivas realmente funcionam como esperado',
                    'Substituir todas as camadas de segurança por um único software firewall',
                    'Garantir que os funcionários não usem o computador durante o fim de semana'
                ],
                correctText: 'Validar se as múltiplas camadas defensivas realmente funcionam como esperado',
                explanation: 'O pentest é o teste de estresse das defesas implementadas.'
            },
            {
                icon: 'fa-users',
                concept: 'Agentes de Ameaça',
                desc: 'Existem diversos tipos de agressores: <span class="highlight-red">Script Kiddies</span> (amadores), Hacktivistas (causas), Estado-Nação (governos) e Cibercriminosos.',
                task: 'Como são classificados os atacantes que utilizam ferramentas prontas sem entender como elas funcionam?',
                options: [
                    'Script Kiddies',
                    'Hackers de Estado-Nação',
                    'Cyber Terceirizados'
                ],
                correctText: 'Script Kiddies',
                explanation: 'Script Kiddies dependem exclusivamente de scripts e ferramentas de terceiros.'
            },
            {
                icon: 'fa-user-secret',
                concept: 'Insider Threat',
                desc: 'A <span class="highlight-red">Ameaça Interna</span> (Insider) vem de funcionários ou parceiros que possuem acesso legítimo e abusam dele para causar danos.',
                task: 'Por que ameaças internas são consideradas tão perigosas para uma organização?',
                options: [
                    'Porque o atacante já possui acesso e conhecimento prévio da rede interna',
                    'Porque ameaças internas são imunes a qualquer tipo de firewall de rede',
                    'Porque funcionários sempre possuem senhas de nível administrador root'
                ],
                correctText: 'Porque o atacante já possui acesso e conhecimento prévio da rede interna',
                explanation: 'O insider "pula" o perímetro de segurança, agindo de dentro para fora.'
            },
            {
                icon: 'fa-mask',
                concept: 'Advanced Persistent Threat (APT)',
                desc: 'As <span class="highlight-red">APTs</span> são grupos altamente organizados e financiados que realizam ataques prolongados e furtivos contra alvos específicos.',
                task: 'Qual a característica principal de uma Ameaça Persistente Avançada (APT)?',
                options: [
                    'Foco em objetivos de longo prazo com alta sofisticação e furtividade',
                    'Ataques rápidos e ruidosos contra o maior número possível de sites',
                    'Uso exclusivo de vírus que formatam o disco rígido da vítima no ato'
                ],
                correctText: 'Foco em objetivos de longo prazo com alta sofisticação e furtividade',
                explanation: 'APTs buscam permanecer na rede por meses ou anos sem serem detectadas.'
            },
            {
                icon: 'fa-circle-check',
                concept: 'Conclusão de Fundamentos',
                desc: 'Hacking ético é sobre <span class="highlight-green">proteger o futuro</span> através da compreensão profunda do presente. Conhecer as táticas é a melhor defesa.',
                task: 'Qual a missão final de um Pentester após identificar uma falha crítica?',
                options: [
                    'Reportar as descobertas e recomendar estratégias de mitigação eficazes',
                    'Publicar os dados roubados para provar que o teste foi um sucesso total',
                    'Deletar todos os arquivos do sistema para ver se o backup funciona'
                ],
                correctText: 'Reportar as descobertas e recomendar estratégias de mitigação eficazes',
                explanation: 'O valor do pentest está na melhoria da segurança do cliente.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">1.1 • HACKING ÉTICO • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "VETOR VALIDADO!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "PACOTE CORROMPIDO!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("ACESSO BLOQUEADO. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: var(--cyber-blue)">
                    <i class="fas fa-medal text-5xl text-yellow-400 mb-2"></i>
                    <h2 class="text-xl font-bold text-white mb-1">MÉTODOS COMPREENDIDOS!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você dominou as bases e os agentes de ameaça no Módulo 1.1.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-01.html'" style="background: var(--cyber-blue); color: white;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
