<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <title>CyberDuo - Escopo e Necessidades 2.2</title>
    <link rel="stylesheet" href="../assets/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #ffb800;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: max(0.8rem, env(safe-area-inset-top)) 1rem 0.8rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(255, 184, 0, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: clamp(0.95rem, 3.8vw, 1.1rem); color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: clamp(0.9rem, 3.5vw, 1rem); line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: clamp(1rem, 4vw, 1.15rem); font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: clamp(0.9rem, 3.5vw, 1rem); -webkit-tap-highlight-color: transparent;  min-height: 48px;}
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(255, 184, 0, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem 1rem max(1rem, env(safe-area-inset-bottom)); background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px;  min-height: 48px;}
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #b38600; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: clamp(1rem, 4vw, 1.2rem); font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: clamp(0.9rem, 3.5vw, 1rem); color: #8b949e; line-height: 1.4; }
    
        /* Design Spells: Interactive Magic */
        .option-card {
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @media (hover: hover) and (pointer: fine) {
            .option-card:hover:not(.disabled) {
                transform: translateX(6px);
                border-color: rgba(0, 242, 255, 0.5);
                box-shadow: -4px 0 10px rgba(0, 242, 255, 0.1);
            }
            .check-btn.active:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 15px rgba(0, 255, 65, 0.3), 0 4px 0 #008f20;
            }
        }
        .check-btn.active:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #008f20;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <div class="flex items-center justify-center cursor-pointer text-gray-500" style="min-width: 44px; min-height: 44px; margin-left: -10px;" onclick="window.location.href='../modules/modulo-02.html'"><i class="fas fa-times"></i></div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-handshake',
                concept: 'Regras de Engajamento (ROE)',
                desc: 'As <span class="highlight-cyan">Regras de Engajamento (ROE)</span> especificam as condições sob as quais o teste será conduzido, incluindo horários, alvos proibidos e canais de comunicação.',
                task: 'O que deve ser detalhado no documento de Regras de Engajamento?',
                options: [
                    'As condições e restrições sob as quais o teste será realizado',
                    'A lista de compras de hardware do departamento de marketing',
                    'O manual de instruções da cafeteira do escritório do cliente'
                ],
                correctText: 'As condições e restrições sob as quais o teste será realizado',
                explanation: 'O ROE define o "como" e o "quando" do teste de penetração.'
            },
            {
                icon: 'fa-bullseye',
                concept: 'Definição do Escopo',
                desc: 'Definir o <span class="highlight-yellow">Escopo</span> envolve identificar todos os sistemas, redes, IPs e SSIDs que o testador tem permissão explícita para avaliar.',
                task: 'Qual a consequência de não definir corretamente o escopo de um Pentest?',
                options: [
                    'Pode levar a interrupções de serviços críticos e sérios problemas legais',
                    'Aumenta a velocidade de carregamento de todas as páginas web do site',
                    'Obriga o cliente a contratar apenas funcionários que usam Linux'
                ],
                correctText: 'Pode levar a interrupções de serviços críticos e sérios problemas legais',
                explanation: 'O escopo é o limite entre o teste autorizado e a invasão criminosa.'
            },
            {
                icon: 'fa-arrow-trend-up',
                concept: 'Scope Creep',
                desc: 'O <span class="highlight-red">Scope Creep</span> (Aumento do Escopo) ocorre quando o projeto cresce de forma descontrolada além do acordado inicialmente, podendo levar à falência da empresa de segurança.',
                task: 'Como também é conhecido o fenômeno do crescimento descontrolado do escopo de um projeto?',
                options: [
                    'Síndrome da pia da cozinha (Kitchen sink syndrome)',
                    'Efeito cascata de redundância técnica total',
                    'Algoritmo de expansão binária de diretórios'
                ],
                correctText: 'Síndrome da pia da cozinha (Kitchen sink syndrome)',
                explanation: 'Aumentar o trabalho sem aumentar o prazo ou orçamento prejudica a qualidade e a viabilidade do projeto.'
            },
            {
                icon: 'fa-ghost',
                concept: 'Ambiente Desconhecido',
                desc: 'Em um teste de <span class="highlight-cyan">ambiente desconhecido</span>, o auditor recebe pouca ou nenhuma informação, simulando a perspectiva de um atacante externo real.',
                task: 'Quais informações você espera receber em um Pentest de ambiente desconhecido?',
                options: [
                    'Nenhuma ou informações mínimas (como apenas o nome do domínio principal)',
                    'Diagramas de rede completos, senhas de admin e acesso ao código-fonte',
                    'A lista residencial de todos os funcionários da empresa alvo'
                ],
                correctText: 'Nenhuma ou informações mínimas (como apenas o nome do domínio principal)',
                explanation: 'O objetivo é testar a visibilidade e as defesas contra agentes externos.'
            },
            {
                icon: 'fa-eye',
                concept: 'Ambiente Conhecido',
                desc: 'No <span class="highlight-yellow">ambiente conhecido</span>, o objetivo pode ser parar assim que o primeiro caminho de entrada é encontrado ou auditar profundamente configurações internas.',
                task: 'O que caracteriza um teste de penetração em ambiente conhecido?',
                options: [
                    'O auditor possui informações detalhadas sobre a infraestrutura e o alvo',
                    'O teste é realizado sem que ninguém da empresa saiba da sua existência',
                    'O auditor deve descobrir o endereço físico da empresa usando apenas GPS'
                ],
                correctText: 'O auditor possui informações detalhadas sobre a infraestrutura e o alvo',
                explanation: 'Ambientes conhecidos permitem auditorias muito mais rápidas e focadas em componentes específicos.'
            },
            {
                icon: 'fa-code',
                concept: 'Documentação de API',
                desc: 'Para testar <span class="highlight-cyan">APIs</span>, o cliente pode fornecer documentação (Swagger/WSDL), SDKs ou até acesso ao código-fonte para auxiliar o auditor.',
                task: 'Como SDKs e documentação de API ajudam o testador de penetração?',
                options: [
                    'Permitindo entender as funções, endpoints e a lógica de comunicação do app',
                    'Aumentando a prioridade de tráfego de dados no roteador Wi-Fi da vítima',
                    'Substituindo a necessidade de usar ferramentas como Burp Suite ou ZAP'
                ],
                correctText: 'Permitindo entender as funções, endpoints e a lógica de comunicação do app',
                explanation: 'Documentação técnica acelera a identificação de falhas lógicas em interfaces de programação.'
            },
            {
                icon: 'fa-tower-broadcast',
                concept: 'Escalonamento de Comunicação',
                desc: 'É vital definir o <span class="highlight-cyan">Caminho de Escalada</span>. Se um sistema cair ou um crime real for detectado, o auditor deve saber exatamente quem contatar imediatamente.',
                task: 'Qual a finalidade de um caminho de escalada de comunicação em um projeto de Pentest?',
                options: [
                    'Garantir que os contatos de emergência sejam acionados rapidamente em caso de incidentes',
                    'Permitir que o testador envie mensagens de marketing para os diretores da empresa',
                    'Aumentar o volume dos bips de alerta de todos os servidores da rede local'
                ],
                correctText: 'Garantir que os contatos de emergência sejam acionados rapidamente em caso de incidentes',
                explanation: 'A comunicação rápida evita que falhas técnicas virem crises corporativas.'
            },
            {
                icon: 'fa-stopwatch',
                concept: 'Gestão de Tempo',
                desc: 'A <span class="highlight-green">Gestão de Tempo</span> é o planejamento de como alocar horas para cada tarefa, garantindo que o escopo seja cumprido dentro do prazo do contrato.',
                task: 'Qual o benefício de uma boa gestão de tempo durante um teste de penetração?',
                options: [
                    'Aumento da produtividade e maior oportunidade de encontrar vulnerabilidades',
                    'Permitir que o testador assista séries durante o horário de execução do exploit',
                    'Reduzir permanentemente o custo da energia elétrica do laboratório de testes'
                ],
                correctText: 'Aumento da produtividade e maior oportunidade de encontrar vulnerabilidades',
                explanation: 'Pentests têm prazos fixos; eficiência é a chave para uma auditoria completa.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">2.2 • ESCOPO E NECESSIDADES • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "PROCESSO VALIDADO!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "DESVIO DE ESCOPO!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("PLANEJAMENTO CORROMPIDO. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: var(--cyber-blue)">
                    <i class="fas fa-medal text-5xl text-yellow-400 mb-2"></i>
                    <h2 class="text-xl font-bold text-white mb-1">ESCOPO DEFINIDO!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você compreendeu as regras de engajamento, tipos de ambiente e gestão de escopo no Módulo 2.2.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-02.html'" style="background: var(--cyber-blue); color: black;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
