<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <title>CyberDuo - Laboratório de Aplicações 6.2</title>
    <link rel="stylesheet" href="../assets/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #00f2ff;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: max(0.8rem, env(safe-area-inset-top)) 1rem 0.8rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(0, 242, 255, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: clamp(0.95rem, 3.8vw, 1.1rem); color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: clamp(0.9rem, 3.5vw, 1rem); line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: clamp(1rem, 4vw, 1.15rem); font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: clamp(0.9rem, 3.5vw, 1rem); -webkit-tap-highlight-color: transparent;  min-height: 48px;}
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(0, 242, 255, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem 1rem max(1rem, env(safe-area-inset-bottom)); background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px;  min-height: 48px;}
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #0099a1; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: clamp(1rem, 4vw, 1.2rem); font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: clamp(0.9rem, 3.5vw, 1rem); color: #8b949e; line-height: 1.4; }
    
        /* Design Spells: Interactive Magic */
        .option-card {
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @media (hover: hover) and (pointer: fine) {
            .option-card:hover:not(.disabled) {
                transform: translateX(6px);
                border-color: rgba(0, 242, 255, 0.5);
                box-shadow: -4px 0 10px rgba(0, 242, 255, 0.1);
            }
            .check-btn.active:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 15px rgba(0, 255, 65, 0.3), 0 4px 0 #008f20;
            }
        }
        .check-btn.active:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #008f20;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <div class="flex items-center justify-center cursor-pointer text-gray-500" style="min-width: 44px; min-height: 44px; margin-left: -10px;" onclick="window.location.href='../modules/modulo-06.html'"><i class="fas fa-times"></i></div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-toolbox',
                concept: 'Preparação do Ambiente',
                desc: 'Para aprender segurança de aplicações, é necessário construir um <span class="highlight-cyan">laboratório isolado</span>. Isso permite testar ferramentas e explorar apps vulneráveis sem riscos.',
                task: 'Qual o principal benefício de usar distribuições Linux focadas em segurança?',
                options: [
                    'Elas já incluem centenas de ferramentas pré-instaladas e configuradas',
                    'Elas são as únicas que permitem acessar a internet banda larga',
                    'Elas impedem fisicamente que o computador seja roubado da mesa'
                ],
                correctText: 'Elas já incluem centenas de ferramentas pré-instaladas e configuradas',
                explanation: 'Kali e Parrot resolvem problemas de dependências e compatibilidade de ferramentas complexas.'
            },
            {
                icon: 'fa-linux',
                concept: 'Kali Linux',
                desc: 'O <span class="highlight-yellow">Kali Linux</span> é a distribuição baseada em Debian mais popular para testes de penetração, mantida pela Offensive Security.',
                task: 'Onde o Kali Linux pode ser instalado para uso em laboratório?',
                options: [
                    'Sistemas bare-metal, Máquinas Virtuais (VMs) e até Raspberry Pi',
                    'Apenas em servidores de grande porte de bancos internacionais',
                    'Exclusivamente em calculadoras científicas de alta performance'
                ],
                correctText: 'Sistemas bare-metal, Máquinas Virtuais (VMs) e até Raspberry Pi',
                explanation: 'Sua versatilidade permite criar labs em diversos tipos de hardware.'
            },
            {
                icon: 'fa-shield-halved',
                concept: 'Isolamento em VMs',
                desc: 'Executar labs em <span class="highlight-cyan">Máquinas Virtuais (VMs)</span> garante que eventuais malwares ou erros de configuração não afetem o seu sistema operacional principal.',
                task: 'Por que o uso de VMs é recomendado para a prática de hacking ético?',
                options: [
                    'Para garantir um ambiente seguro e isolado do sistema hospedeiro',
                    'Porque VMs aumentam a velocidade física do processador hospedeiro',
                    'Porque é impossível instalar o Linux diretamente no disco rígido'
                ],
                correctText: 'Para garantir um ambiente seguro e isolado do sistema hospedeiro',
                explanation: 'O isolamento é a regra número 1 para labs de segurança.'
            },
            {
                icon: 'fa-bug',
                concept: 'Apps Intencionalmente Vulneráveis',
                desc: 'O uso de apps como <span class="highlight-red">WebGoat</span> e DVWA permite praticar ataques reais de forma legal e controlada dentro do seu laboratório.',
                task: 'Qual a finalidade de ferramentas como o WebGoat no laboratório?',
                options: [
                    'Servir como alvo para prática de exploração de vulnerabilidades web',
                    'Proteger o site da empresa contra ataques de negação de serviço',
                    'Aumentar o limite de usuários conectados ao Wi-Fi simultaneamente'
                ],
                correctText: 'Servir como alvo para prática de exploração de vulnerabilidades web',
                explanation: 'Aprender a atacar em ambientes "quebrados por design" é o melhor método de ensino.'
            },
            {
                icon: 'fa-box-open',
                concept: 'Labs com Docker',
                desc: 'Muitas ferramentas e apps vulneráveis agora podem ser executados em <span class="highlight-cyan">Contêineres Docker</span>, facilitando a implantação rápida e o descarte após o uso.',
                task: 'Qual a vantagem do Docker na criação de laboratórios de cibersegurança?',
                options: [
                    'Facilitar a implantação rápida de sistemas e ferramentas vulneráveis',
                    'Eliminar permanentemente a necessidade de usar o terminal Linux',
                    'Transformar qualquer arquivo PDF em uma máquina virtual completa'
                ],
                correctText: 'Facilitar a implantação rápida de sistemas e ferramentas vulneráveis',
                explanation: 'Contêineres são leves e podem ser instanciados e destruídos em segundos.'
            },
            {
                icon: 'fa-flask-vial',
                concept: 'WebSploit Labs',
                desc: 'O <span class="highlight-green">WebSploit Labs</span> (websploit.org) é um ambiente pronto com ferramentas e apps vulneráveis, ideal para quem está começando agora.',
                task: 'O que o WebSploit Labs fornece ao estudante de segurança?',
                options: [
                    'Um ambiente seguro com apps intencionalmente vulneráveis para prática',
                    'Um serviço de chat criptografado para falar com outros hackers',
                    'Uma lista de senhas de redes Wi-Fi de aeroportos internacionais'
                ],
                correctText: 'Um ambiente seguro com apps intencionalmente vulneráveis para prática',
                explanation: 'É um dos pontos de partida mais simples para configurar seu primeiro lab sério.'
            },
            {
                icon: 'fa-laptop-code',
                concept: 'Recursos de Repositório',
                desc: 'Repositórios no <span class="highlight-yellow">GitHub</span> fornecem inúmeros recursos, links e sistemas intencionalmente vulneráveis que você pode baixar e montar.',
                task: 'Como petersers utilizam o GitHub no contexto de construção de labs?',
                options: [
                    'Para baixar ferramentas, códigos de exploit e guias de laboratório',
                    'Para hospedar as fotos das câmeras de vigilância da residência',
                    'Para substituir o Google como mecanismo de busca padrão da internet'
                ],
                correctText: 'Para baixar ferramentas, códigos de exploit e guias de laboratório',
                explanation: 'O compartilhamento de ferramentas open-source no GitHub impulsiona a área de segurança.'
            },
            {
                icon: 'fa-check-double',
                concept: 'Conclusão do Lab',
                desc: 'Dominar a configuração do seu ambiente é a <span class="highlight-green">base de todo o curso</span>. Sem um lab funcional, a exploração prática torna-se impossível.',
                task: 'Qual o requisito fundamental antes de iniciar as lições de exploração do módulo?',
                options: [
                    'Ter um ambiente de laboratório seguro e funcional configurado',
                    'Comprar um computador novo com pelo menos 128GB de RAM',
                    'Desativar permanentemente o acesso à internet em sua casa'
                ],
                correctText: 'Ter um ambiente de laboratório seguro e funcional configurado',
                explanation: 'O lab é onde a teoria do curso encontra a prática do profissional.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">6.2 • LAB SETUP • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "CONFIGURAÇÃO VÁLIDA!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "ERRO NO AMBIENTE!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("INSTALAÇÃO CORROMPIDA. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: var(--cyber-green)">
                    <i class="fas fa-flask text-5xl text-yellow-400 mb-2"></i>
                    <h2 class="text-xl font-bold text-white mb-1">LABORATÓRIO PRONTO!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você compreendeu os requisitos e ferramentas para construir um ambiente de testes profissional no Módulo 6.2.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-06.html'" style="background: var(--cyber-green); color: black;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
