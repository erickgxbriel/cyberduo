<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <title>CyberDuo - Vulnerabilidades Sem Fio 5.2</title>
    <link rel="stylesheet" href="../assets/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #ff8c00;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: max(0.8rem, env(safe-area-inset-top)) 1rem 0.8rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(255, 140, 0, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: clamp(0.95rem, 3.8vw, 1.1rem); color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: clamp(0.9rem, 3.5vw, 1rem); line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: clamp(1rem, 4vw, 1.15rem); font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: clamp(0.9rem, 3.5vw, 1rem); -webkit-tap-highlight-color: transparent;  min-height: 48px;}
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(255, 140, 0, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem 1rem max(1rem, env(safe-area-inset-bottom)); background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px;  min-height: 48px;}
        .check-btn.active { background: var(--cyber-blue); color: white; box-shadow: 0 4px 0 #cc5500; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: clamp(1rem, 4vw, 1.2rem); font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: clamp(0.9rem, 3.5vw, 1rem); color: #8b949e; line-height: 1.4; }
    
        /* Design Spells: Interactive Magic */
        .option-card {
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @media (hover: hover) and (pointer: fine) {
            .option-card:hover:not(.disabled) {
                transform: translateX(6px);
                border-color: rgba(0, 242, 255, 0.5);
                box-shadow: -4px 0 10px rgba(0, 242, 255, 0.1);
            }
            .check-btn.active:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 15px rgba(0, 255, 65, 0.3), 0 4px 0 #008f20;
            }
        }
        .check-btn.active:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #008f20;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <div class="flex items-center justify-center cursor-pointer text-gray-500" style="min-width: 44px; min-height: 44px; margin-left: -10px;" onclick="window.location.href='../modules/modulo-05.html'"><i class="fas fa-times"></i></div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-wifi',
                concept: 'Rogue Access Point',
                desc: 'Um <span class="highlight-cyan">Ponto de Acesso Malicioso (Rogue AP)</span> é instalado em uma rede para enganar usuários e criar um backdoor para o atacante.',
                task: 'O que caracteriza um Rogue Access Point em uma rede corporativa?',
                options: [
                    'Um ponto de acesso instalado sem autorização para contornar a segurança',
                    'Um roteador oficial que está com o firmware desatualizado',
                    'Um dispositivo que aumenta a velocidade do Wi-Fi para todos os usuários'
                ],
                correctText: 'Um ponto de acesso instalado sem autorização para contornar a segurança',
                explanation: 'Rogue APs permitem que atacantes criem pontes de acesso não monitoradas à rede interna.'
            },
            {
                icon: 'fa-clone',
                concept: 'Evil Twin Attack',
                desc: 'No ataque <span class="highlight-yellow">Evil Twin</span>, o agressor cria um AP falso com o mesmo SSID da rede legítima para capturar dados das vítimas.',
                task: 'Como um atacante normalmente redireciona o tráfego em um ataque Evil Twin?',
                options: [
                    'Usando falsificação de DNS para enviar a vítima a um portal cativo clonado',
                    'Criptografando fisicamente a antena do roteador original da empresa',
                    'Enviando um e-mail pedindo para o usuário trocar de rede manualmente'
                ],
                correctText: 'Usando falsificação de DNS para enviar a vítima a um portal cativo clonado',
                explanation: 'Ao controlar o DNS do AP falso, o atacante dita para onde o navegador da vítima vai.'
            },
            {
                icon: 'fa-door-open',
                concept: 'Portais Cativos',
                desc: 'Agressores representam <span class="highlight-cyan">Portais Cativos</span> falsos para realizar engenharia social ou roubar credenciais em locais públicos.',
                task: 'Qual a finalidade legítima de um Portal Cativo em redes públicas?',
                options: [
                    'Autenticar usuários ou exibir termos e condições de uso da rede',
                    'Aumentar o brilho da tela do smartphone conectado ao Wi-Fi',
                    'Formatar automaticamente o disco rígido do dispositivo do visitante'
                ],
                correctText: 'Autenticar usuários ou exibir termos e condições de uso da rede',
                explanation: 'Hackers clonam esses portais para que o usuário digite senhas ou e-mails voluntariamente.'
            },
            {
                icon: 'fa-user-slash',
                concept: 'Ataque de Desassociação',
                desc: 'O atacante envia pacotes de <span class="highlight-red">Desautenticação (DeAuth)</span> para desconectar usuários de APs legítimos e forçá-los a conectar no Evil Twin.',
                task: 'Qual ferramenta do conjunto Aircrack-ng é usada para lançar ataques de desautenticação?',
                options: [
                    'Aireplay-ng',
                    'Airmon-ng',
                    'Airodump-ng'
                ],
                correctText: 'Aireplay-ng',
                explanation: 'Aireplay-ng permite injetar quadros de gerenciamento, como o DeAuth, no tráfego sem fio.'
            },
            {
                icon: 'fa-search',
                concept: 'Monitoramento com Airmon-ng',
                desc: 'O <span class="highlight-cyan">Airmon-ng</span> coloca a interface sem fio em modo de monitoramento, permitindo ouvir todo o tráfego do ar, não apenas o destinado ao seu IP.',
                task: 'Qual o primeiro passo técnico para iniciar um pentest sem fio no Kali Linux?',
                options: [
                    'Colocar a interface em modo de monitoramento usando airmon-ng',
                    'Desligar o roteador físico da empresa para resetar os SSIDs',
                    'Criptografar o teclado do computador para evitar shoulder surfing'
                ],
                correctText: 'Colocar a interface em modo de monitoramento usando airmon-ng',
                explanation: 'O modo monitor é essencial para capturar pacotes de outros dispositivos no ar.'
            },
            {
                icon: 'fa-list-ul',
                concept: 'Airodump-ng: BSSID e ESSID',
                desc: 'O <span class="highlight-yellow">Airodump-ng</span> exibe o BSSID (MAC do AP) e o ESSID (nome da rede) das redes Wi-Fi disponíveis.',
                task: 'No contexto de redes sem fio, o que representa o valor ESSID?',
                options: [
                    'O nome ou identificador associado à rede sem fio (SSID)',
                    'O endereço físico único da placa de rede do roteador',
                    'A chave de criptografia AES usada para proteger os dados'
                ],
                correctText: 'O nome ou identificador associado à rede sem fio (SSID)',
                explanation: 'ESSID é o nome amigável da rede que vemos na lista de conexões.'
            },
            {
                icon: 'fa-shield-halved',
                concept: 'Proteção MFP (802.11w)',
                desc: 'O recurso <span class="highlight-green">Proteção da Estrutura de Gerenciamento (MFP)</span> impede que atacantes falsifiquem quadros de desautenticação.',
                task: 'Como o padrão 802.11w (MFP) ajuda a proteger redes Wi-Fi?',
                options: [
                    'Protegendo contra quadros de gerenciamento falsificados que desconectam usuários',
                    'Aumentando a força do sinal Wi-Fi para atravessar paredes de concreto',
                    'Bloqueando o acesso de qualquer dispositivo móvel que não use Android'
                ],
                correctText: 'Protegendo contra quadros de gerenciamento falsificados que desconectam usuários',
                explanation: 'O MFP assina os quadros de controle, tornando impossível para o atacante "derrubar" clientes.'
            },
            {
                icon: 'fa-car',
                concept: 'War Driving',
                desc: '<span class="highlight-cyan">War Driving</span> é o método de dirigir por áreas urbanas para mapear e encontrar pontos de acesso sem fio vulneráveis.',
                task: 'Qual o objetivo de um praticante de "War Driving"?',
                options: [
                    'Detectar e mapear redes Wi-Fi em uma área geográfica específica',
                    'Testar a velocidade de carros de corrida em pistas de alta performance',
                    'Entregar pizzas usando drones controlados via sinais de rádio AM'
                ],
                correctText: 'Detectar e mapear redes Wi-Fi em uma área geográfica específica',
                explanation: 'Praticantes usam GPS e antenas potentes para criar mapas de cobertura Wi-Fi (como o WiGLE).'
            },
            {
                icon: 'fa-skull',
                concept: 'Ataques IV e WEP',
                desc: 'O protocolo <span class="highlight-red">WEP</span> é obsoleto devido a falhas na implementação do algoritmo RC4 e na curta duração dos Vetores de Inicialização (IV).',
                task: 'Por que o protocolo WEP é considerado inseguro e deve ser evitado?',
                options: [
                    'Devido à reutilização previsível de Vetores de Inicialização (IV) que permite quebrar a chave',
                    'Porque é o único protocolo que exige o uso de cabos de rede coloridos',
                    'Porque limita a velocidade da internet a apenas 128 kbps por usuário'
                ],
                correctText: 'Devido à reutilização previsível de Vetores de Inicialização (IV) que permite quebrar a chave',
                explanation: 'Capturar pacotes suficientes permite reconstruir a chave secreta em minutos.'
            },
            {
                icon: 'fa-handshake',
                concept: 'WPA 4-way Handshake',
                desc: 'Ataques contra <span class="highlight-yellow">WPA/WPA2</span> focam em capturar o handshake de 4 vias. Uma vez capturado, o PSK pode ser quebrado via força bruta offline.',
                task: 'O que um atacante precisa capturar para tentar quebrar a senha de uma rede WPA2-PSK?',
                options: [
                    'O handshake de quatro vias entre um cliente e o ponto de acesso',
                    'O endereço residencial do administrador da rede sem fio',
                    'A cor da logomarca da empresa na página inicial do roteador'
                ],
                correctText: 'O handshake de quatro vias entre um cliente e o ponto de acesso',
                explanation: 'O handshake contém os dados necessários para testar milhões de senhas por segundo sem alertar o alvo.'
            },
            {
                icon: 'fa-dragon',
                concept: 'WPA3 e Dragonfly',
                desc: 'O <span class="highlight-green">WPA3</span> introduziu o handshake "Dragonfly" (SAE), que é imune a ataques de dicionário offline e KRACK.',
                task: 'Qual a principal melhoria de segurança do WPA3 em relação ao WPA2?',
                options: [
                    'Uso do protocolo SAE (Dragonfly) para prevenir ataques de dicionário offline',
                    'Desativação automática de todos os LEDs indicadores do roteador',
                    'Exigência de chaves físicas USB para cada dispositivo na rede'
                ],
                correctText: 'Uso do protocolo SAE (Dragonfly) para prevenir ataques de dicionário offline',
                explanation: 'Mesmo com o aperto de mão capturado, o atacante não consegue testar senhas sem interagir com o AP.'
            },
            {
                icon: 'fa-key',
                concept: 'Ataques WPS PIN',
                desc: 'O protocolo <span class="highlight-cyan">WPS</span> simplifica a conexão via PIN, mas muitas implementações permitem tentativas infinitas, sendo vulneráveis a força bruta.',
                task: 'Qual ferramenta é famosa por automatizar ataques de força bruta contra PINs de WPS?',
                options: [
                    'Reaver',
                    'John the Ripper',
                    'Hydra'
                ],
                correctText: 'Reaver',
                explanation: 'O Reaver explora a falha de design do WPS que revela se a primeira ou segunda metade do PIN está correta.'
            },
            {
                icon: 'fa-yin-yang',
                concept: 'Ataque KARMA',
                desc: 'No ataque <span class="highlight-red">KARMA</span>, o AP falso responde a todas as requisições de sonda de clientes, fingindo ser qualquer rede que o cliente procure.',
                task: 'Como funciona tecnicamente o ataque KARMA?',
                options: [
                    'O AP malicioso gera o mesmo SSID para o qual o dispositivo da vítima está enviando sondas',
                    'O atacante bloqueia fisicamente o sinal de rádio de todos os outros roteadores',
                    'O servidor web envia um comando de formatação para o celular da vítima'
                ],
                correctText: 'O AP malicioso gera o mesmo SSID para o qual o dispositivo da vítima está enviando sondas',
                explanation: 'Ele se aproveita da Lista de Redes Preferidas (PNL) do celular do usuário.'
            },
            {
                icon: 'fa-tooth',
                concept: 'Bluejacking vs Bluesnarfing',
                desc: 'O <span class="highlight-cyan">Bluejacking</span> envia spam (vCards) via Bluetooth. O <span class="highlight-red">Bluesnarfing</span> é muito pior: ele rouba dados e o IMEI do dispositivo.',
                task: 'Qual a diferença fundamental entre Bluejacking e Bluesnarfing?',
                options: [
                    'Bluejacking envia mensagens; Bluesnarfing rouba informações do dispositivo',
                    'Bluejacking rouba a bateria; Bluesnarfing aumenta a velocidade do Bluetooth',
                    'Não há diferença; ambos são nomes para o ato de parear fones de ouvido'
                ],
                correctText: 'Bluejacking envia mensagens; Bluesnarfing rouba informações do dispositivo',
                explanation: 'O Bluesnarfing permite acesso a contatos, mensagens e fotos sem autorização.'
            },
            {
                icon: 'fa-spray-can',
                concept: 'Password Spraying',
                desc: 'A <span class="highlight-yellow">Pulverização de Senha</span> tenta uma senha comum contra vários usuários para evitar o bloqueio de contas.',
                task: 'Por que o Password Spraying é eficaz contra políticas de bloqueio de contas?',
                options: [
                    'Porque testa poucas senhas por usuário, não disparando o limite de erros',
                    'Porque criptografa a tela do administrador impedindo que ele veja o erro',
                    'Porque aumenta automaticamente o número de tentativas permitidas pelo sistema'
                ],
                correctText: 'Porque testa poucas senhas por usuário, não disparando o limite de erros',
                explanation: 'Testar "Senha123" em 100 usuários é mais furtivo que testar 100 senhas em 1 usuário.'
            },
            {
                icon: 'fa-shield-halved',
                concept: 'Mitigação Wireless',
                desc: 'A defesa robusta exige <span class="highlight-green">WPA3</span>, desativação de WPS e monitoramento constante contra Rogue APs e interferências.',
                task: 'Qual a melhor recomendação para proteger uma rede sem fio moderna?',
                options: [
                    'Implementar WPA3, desativar WPS e usar autenticação baseada em certificados',
                    'Esconder o SSID e mudar a senha do Wi-Fi a cada 2 horas manualmente',
                    'Reduzir a potência do rádio para que o sinal não saia da sala do servidor'
                ],
                correctText: 'Implementar WPA3, desativar WPS e usar autenticação baseada em certificados',
                explanation: 'Certificados digitais (802.1X) eliminam o risco de quebra de senhas PSK.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">5.2 • VULNERABILIDADES SEM FIO • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "VETOR VALIDADO!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "PACOTE CORROMPIDO!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("TIMEOUT DE CONEXÃO. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: var(--cyber-blue)">
                    <i class="fas fa-medal text-5xl text-yellow-400 mb-2"></i>
