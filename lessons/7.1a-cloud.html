<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <title>CyberDuo - Segurança e Ataques em Nuvem</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #e6edf3;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: max(0.8rem, env(safe-area-inset-top)) 1rem 0.8rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(0, 255, 65, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 12px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; border-radius: 10px;}
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 80px; justify-content: flex-end; font-size: 1.1rem; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .game-card { width: 100%; animation: slideUp 0.3s ease-out; display: flex; flex-direction: column; gap: 0.8rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /<i> General Typography </i>/
        .module-subtitle { font-size: 0.7rem; font-weight: 900; color: var(--cyber-blue); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .title-main { font-size: clamp(1.4rem, 5vw, 1.8rem); font-weight: 800; color: white; line-height: 1.2; margin-bottom: 0.5rem; }
        .text-body { font-size: clamp(1rem, 4vw, 1.1rem); color: #b1bac4; line-height: 1.5; }
        .text-body b { color: white; }
        
        /<i> Utility Classes </i>/
        .mr-1 { margin-right: 0.25rem; }
        .mr-2 { margin-right: 0.5rem; }
        .mb-1 { margin-bottom: 0.25rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        /<i> TYPE: TEACH </i>/
        .teach-card { background: #0d1117; border: 1px solid #30363d; border-radius: 1.2rem; padding: clamp(1rem, 4vw, 1.5rem); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .teach-icon { font-size: 2.5rem; color: var(--cyber-blue); margin-bottom: 1rem; }
        .teach-highlight { display: flex; align-items: center; gap: 0.6rem; background: rgba(0, 255, 65, 0.1); border-left: 3px solid var(--cyber-green); padding: 0.8rem; margin-top: 1rem; font-weight: 600; color: var(--cyber-green); border-radius: 0 0.5rem 0.5rem 0; }

        /<i> TYPE: EXAMPLE </i>/
        .example-card { background: #0d1117; border: 1px solid #30363d; border-radius: 1.2rem; padding: clamp(1rem, 4vw, 1.5rem); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .example-scenario { background: #161b22; border: 1px solid #21262d; border-radius: 0.8rem; padding: 1rem; margin-top: 1rem; }
        .example-code { background: #010409; font-family: 'Fira Code', monospace; padding: 1rem; border-radius: 0.5rem; margin-top: 1rem; font-size: 0.85rem; color: #00ff41; border: 1px solid #30363d; overflow-x: auto; white-space: pre; }
        .example-takeaway { display: flex; gap: 0.8rem; align-items: flex-start; margin-top: 1rem; color: #8b949e; font-size: 0.9rem; font-weight: 600; }

        /<i> TYPE: QUIZ </i>/
        .quiz-title { font-size: clamp(1.2rem, 5vw, 1.5rem); font-weight: 800; color: white; margin-bottom: 1.5rem; line-height: 1.3; }
        .options-grid { display: flex; flex-direction: column; gap: 0.6rem; width: 100%; }
        .option-card { background: #161b22; border: 2px solid #30363d; border-bottom-width: 4px; padding: clamp(0.8rem, 3vw, 1rem); border-radius: 1rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 1rem; font-weight: 600; font-size: clamp(0.95rem, 4vw, 1.05rem); -webkit-tap-highlight-color: transparent; }
        .option-card:active { transform: translateY(2px); border-bottom-width: 2px; }
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(0, 255, 65, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }
        .option-card.disabled { pointer-events: none; opacity: 0.6; }
        .option-number { width: 28px; height: 28px; flex-shrink: 0; border: 2px solid #484f58; border-radius: 0.4rem; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 800; color: #8b949e; }
        .option-card.selected .option-number { border-color: var(--cyber-blue); color: var(--cyber-blue); }

        /<i> TYPE: FILL </i>/
        .fill-sentence { font-size: clamp(1.1rem, 5vw, 1.3rem); font-weight: 600; line-height: 1.6; color: white; margin-bottom: 2rem; background: #0d1117; padding: clamp(1rem, 4vw, 1.5rem); border-radius: 1.2rem; border: 1px solid #30363d; }
        .fill-slot { display: inline-block; min-width: 120px; height: 34px; border-bottom: 3px solid #484f58; margin: 0 0.5rem; vertical-align: middle; text-align: center; color: var(--cyber-blue); font-weight: 800; transition: all 0.2s; }
        .fill-slot.filled { border-bottom-color: var(--cyber-blue); }

        /<i> TYPE: MATCH </i>/
        .match-container { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem clamp(0.5rem, 3vw, 1rem); width: 100%; margin-top: 1rem; }
        .match-item { background: #161b22; border: 2px solid #30363d; border-bottom-width: 4px; padding: clamp(0.5rem, 2.5vw, 0.8rem); border-radius: 0.8rem; cursor: pointer; text-align: center; font-weight: 600; font-size: clamp(0.85rem, 3.5vw, 0.95rem); transition: all 0.1s; user-select: none; display: flex; align-items: center; justify-content: center; min-height: 60px; height: 100%; -webkit-tap-highlight-color: transparent; }
        .match-item:active { transform: translateY(2px); border-bottom-width: 2px; }
        .match-item.selected { border-color: var(--cyber-blue); background: rgba(0, 255, 65, 0.1); color: white; }
        .match-item.matched { border-color: var(--cyber-green); background: rgba(0, 255, 65, 0.05); color: var(--cyber-green); opacity: 0.5; pointer-events: none; }
        .match-item.error { border-color: var(--cyber-red); animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        /<i> FOOTER & BUTTONS </i>/
        .game-footer { flex-shrink: 0; padding: 1rem 1rem max(1rem, env(safe-area-inset-bottom)); background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 1rem; border-radius: 1rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 1rem; letter-spacing: 1px; transition: all 0.1s; -webkit-tap-highlight-color: transparent; }
        .check-btn:active { transform: scale(0.98); }
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #a0a8b0; }
        .check-btn.active:active { transform: translateY(4px); box-shadow: 0 0px 0 #a0a8b0; }

        /<i> FEEDBACK OVERLAY </i>/
        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem 1.5rem max(1.5rem, env(safe-area-inset-bottom)); transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: left; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 4px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 4px solid var(--cyber-red); }
        .feedback-title { font-size: clamp(1.2rem, 5vw, 1.4rem); font-weight: 800; margin-bottom: 0.5rem; width: 100%; max-width: 400px; display: flex; align-items: center; gap: 0.5rem; }
        .feedback-msg { font-size: clamp(0.95rem, 4vw, 1.05rem); color: #8b949e; line-height: 1.5; width: 100%; max-width: 400px; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <div class="game-header">
        <div class="flex items-center justify-center cursor-pointer text-gray-500" style="min-width: 44px; min-height: 44px; margin-left: -10px;" onclick="window.location.href='../modules/modulo-07.html'"><i class="fas fa-times"></i></div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full" style="max-width: 400px;" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const steps = [            {
                "type": "teach",
                "icon": "fa-cloud",
                "title": "O Modelo de Responsabilidade Compartilhada (Cisco 7.1.1)",
                "content": "A segurança na nuvem baseia-se em um acordo básico: o <b>Modelo de Responsabilidade Compartilhada</b>. Ele divide as obrigações entre o <b>Provedor</b> (como AWS, Azure, Google Cloud) e o <b>Cliente</b> (a sua empresa).<br><br>🛡️ O provedor cuida da segurança <b>da</b> nuvem: protege a infraestrutura física (data centers, servidores reais, cabos, geradores) e a camada de virtualização (hypervisores).<br><br>👤 O cliente cuida da segurança <b>na</b> nuvem: protege seus próprios dados, sistemas operacionais das VMs, políticas de acesso (IAM), firewall interno e as senhas.",
                "highlight": "O provedor protege o hardware do data center, mas você protege o seu conteúdo interno!"
            },
            {
                "type": "quiz",
                "task": "Se a sua máquina virtual na nuvem for invadida porque você utilizou uma senha fraca de administrador (como 'admin123'), de quem é a responsabilidade pela falha de segurança segundo o Modelo de Responsabilidade Compartilhada?",
                "options": [
                    "Do cliente (você), pois a segurança do controle de acessos e configurações ocorre 'NA' nuvem.",
                    "Do provedor de nuvem, pois eles deveriam barrar senhas fracas no hardware físico.",
                    "De ambos de forma idêntica, já que a infraestrutura física foi afetada indiretamente."
                ],
                "correctText": "Do cliente (você), pois a segurança do controle de acessos e configurações ocorre 'NA' nuvem.",
                "explanation": "O provedor fornece a infraestrutura física segura, mas a configuração das contas, controle de acesso e firewalls internos é de inteira responsabilidade do cliente (segurança NA nuvem)."
            },
            {
                "type": "teach",
                "icon": "fa-triangle-exclamation",
                "title": "O Perigo do Shadow IT (Cisco 7.1.1)",
                "content": "Na nuvem, criar um novo servidor de banco de dados ou um bucket de arquivos é extremamente fácil e rápido. Isso gera o fenômeno do <b>Shadow IT</b> (TI Invisível): quando funcionários ou setores inteiros criam ativos em nuvem sem a homologação, conhecimento ou autorização da equipe de segurança corporativa.<br><br>Esses ativos criados de forma paralela costumam ficar esquecidos, desatualizados e com configurações inseguras, servindo como portas de entrada fáceis para invasores.",
                "highlight": "O Shadow IT burla as políticas de segurança corporativa e expõe dados confidenciais de forma silenciosa."
            },
            {
                "type": "quiz",
                "task": "Um desenvolvedor cria uma nova base de dados temporária em nuvem para realizar um teste rápido de fim de semana, sem avisar a equipe de segurança, e a deixa ativa e sem senha. Esse cenário descreve:",
                "options": [
                    "Uma prática de Shadow IT, que gera brechas críticas e descontroladas.",
                    "Uma conformidade padrão com o modelo SaaS.",
                    "Um ataque de canal lateral do hipervisor."
                ],
                "correctText": "Uma prática de Shadow IT, que gera brechas críticas e descontroladas.",
                "explanation": "O provisionamento não autorizado de recursos de TI por parte de colaboradores é chamado de Shadow IT e é uma das maiores causas de vazamentos na nuvem corporativa."
            },
            {
                "type": "teach",
                "icon": "fa-server",
                "title": "Modelos de Serviços - O que é IaaS? (Cisco 7.1.2)",
                "content": "Para organizar a divisão de responsabilidades, os serviços de nuvem são classificados em três modelos. O primeiro é a <b>IaaS (Infraestrutura como Serviço)</b>.<br><br>Aqui, o provedor te entrega apenas o 'ferro virtualizado': máquinas virtuais cruas, redes e armazenamento vazios. O provedor cuida da segurança física e do hipervisor.<br><br><b>Toda a responsabilidade interna é sua</b>: instalar e atualizar o Sistema Operacional (Windows/Linux), configurar os bancos de dados, instalar runtimes e rodar seu próprio software de forma segura.",
                "highlight": "Exemplo clássico: Uma instância de máquina virtual AWS EC2 ou Google Compute Engine."
            },
            {
                "type": "teach",
                "icon": "fa-layer-group",
                "title": "Modelos de Serviços - O que é PaaS? (Cisco 7.1.2)",
                "content": "No modelo <b>PaaS (Plataforma como Serviço)</b>, a sua responsabilidade diminui significativamente.<br><br>O provedor de nuvem gerencia e protege quase tudo: o hardware físico, o hipervisor, o Sistema Operacional da máquina e os servidores de banco de dados. A única obrigação do cliente é <b>escrever o código da aplicação e enviá-lo</b> para a plataforma rodar.<br><br>Você não precisa se preocupar em atualizar o kernel do Linux ou configurar a rede interna do servidor.",
                "highlight": "Exemplo clássico: Heroku ou AWS Elastic Beanstalk, onde você apenas faz o upload do seu código."
            },
            {
                "type": "teach",
                "icon": "fa-laptop",
                "title": "Modelos de Serviços - O que é SaaS? (Cisco 7.1.2)",
                "content": "No modelo <b>SaaS (Software como Serviço)</b>, o provedor gerencia e protege <b>toda a cadeia tecnológica</b>.<br><br>Eles cuidam da infraestrutura física, do hardware, do Sistema Operacional, do código do software e do armazenamento de dados. Você apenas utiliza o aplicativo pronto diretamente pelo navegador web ou aplicativo cliente.<br><br>Sua única responsabilidade de segurança é proteger sua própria credencial de acesso (senha e perfil de usuário).",
                "highlight": "Exemplos clássicos: Microsoft Office 365, Google Drive, Slack ou Dropbox."
            },
            {
                "type": "match",
                "title": "Prática - Modelos de Serviços em Nuvem (Cisco 7.1.2)",
                "pairs": [
                    {
                        "term": "IaaS",
                        "definition": "O provedor fornece apenas o hardware virtualizado/VMs. O S.O. é seu."
                    },
                    {
                        "term": "PaaS",
                        "definition": "O provedor gerencia o S.O. e banco de dados. Você gerencia o código."
                    },
                    {
                        "term": "SaaS",
                        "definition": "Aplicação inteiramente pronta e hospedada pelo provedor."
                    },
                    {
                        "term": "Shadow IT",
                        "definition": "Recursos criados na nuvem sem homologação ou aviso da equipe de segurança."
                    }
                ]
            },
            {
                "type": "teach",
                "icon": "fa-mask",
                "title": "Colheita de Credenciais (Cisco 7.1.3)",
                "content": "Como a nuvem é exposta diretamente na internet, a forma mais rápida de um atacante invadir é através da <b>Colheita de Credenciais (Credential Harvesting)</b>. Hackers utilizam Phishing altamente direcionado (Spear Phishing), clonagem de portais reais de login (como AWS Console ou Microsoft 365) e roubo de tokens de sessão ativos (via XSS) para contornar o MFA.",
                "highlight": "Roubar o token de sessão ativa permite assumir o acesso mesmo com MFA habilitado."
            },
            {
                "type": "example",
                "icon": "fa-terminal",
                "title": "Prática - Clonagem de Portais com o SET (Cisco 7.1.4)",
                "scenario": "O atacante inicia o Social-Engineer Toolkit (SET) no Kali Linux para clonar o portal administrativo e interceptar requisições de credenciais:",
                "code": "$ sudo setoolkit\n1) Social-Engineering Attacks\n2) Website Attack Vectors\n3) Credential Harvester Attack Method\n2) Site Cloner\n\n[<i>] SET Web Server running. Cloning Microsoft 365 login...\n[</i>] Credential Harvester is active on port 80!",
                "takeaway": "Qualquer tentativa de login na página clonada enviará a senha em texto claro ao atacante."
            },
            {
                "type": "quiz",
                "task": "No Social-Engineer Toolkit (SET), qual o método específico usado para criar cópias de páginas de login e roubar credenciais interceptando requisições POST?",
                "options": [
                    "Credential Harvester Attack Method.",
                    "Infectious Media Generator.",
                    "Mass Mailer Attack Vector."
                ],
                "correctText": "Credential Harvester Attack Method.",
                "explanation": "O Credential Harvester clona o HTML da página original e altera o formulário de login para enviar os dados digitados para o IP do atacante."
            },
            {
                "type": "teach",
                "icon": "fa-stairs",
                "title": "Escalada de Privilégios em Nuvem (Cisco 7.1.5)",
                "content": "Uma vez dentro da nuvem com uma conta inicial, o hacker busca elevar seus direitos (<b>Escalada de Privilégios</b>). Isso pode ser:<br><br>1. ↕️ <b>Vertical</b>: Subir de nível, como ir de um visualizador de logs para administrador geral aproveitando falhas em políticas IAM mal configuradas.<br>2. ↔️ <b>Horizontal</b>: Acessar dados de outros usuários do mesmo nível hierárquico.",
                "highlight": "Políticas de IAM permissivas demais (ex: 'iam:PutUserPolicy') são as maiores causas de escalada vertical."
            },
            {
                "type": "fill",
                "sentence": "Se eu consigo acessar e gerenciar arquivos de outro usuário de mesmo nível acessando uma pasta de bucket vizinho, estou realizando uma escalada de privilégios ___.",
                "options": [
                    "horizontal",
                    "vertical",
                    "root"
                ],
                "correctText": "horizontal",
                "explanation": "Como seu nível de privilégio hierárquico não aumentou, mas você acessou dados laterais de terceiros, a escalada é horizontal."
            },
            {
                "type": "teach",
                "icon": "fa-key",
                "title": "Aquisição de Conta - Account Takeover (Cisco 7.1.6)",
                "content": "A <b>Aquisição de Conta (Account Takeover - ATO)</b> ocorre quando o atacante sequestra totalmente as credenciais e assume a conta. Na nuvem, atacantes executam o takeover criando novas chaves de API secretas (para persistência), alterando políticas de segurança ou criando permissões OAuth maliciosas em aplicações parceiras para acessar dados silenciosamente.",
                "highlight": "Detecta-se o takeover por anomalias como logins em locais geograficamente impossíveis."
            },
            {
                "type": "quiz",
                "task": "Qual das seguintes opções é um forte indicador de que uma conta administrativa em nuvem sofreu uma Aquisição de Conta (Takeover)?",
                "options": [
                    "Acessos OAuth suspeitos e logins simultâneos em países distantes (geografia impossível).",
                    "O aumento do tráfego de rede HTTP da aplicação.",
                    "A expiração natural da sessão de login do usuário."
                ],
                "correctText": "Acessos OAuth suspeitos e logins simultâneos em países distantes (geografia impossível).",
                "explanation": "Acessos simultâneos de localizações distantes e novas conexões de apps de terceiros (OAuth) sem o consentimento indicam sequestro de conta."
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];
        
        // Match state
        let matchLeft = [];
        let matchRight = [];
        let selectedLeft = null;
        let selectedRight = null;
        let matchesFound = 0;

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function updateProgress() {
            const progress = (currentStep / steps.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
            
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function render() {
            if (currentStep >= steps.length) { showVictory(); return; }
            const step = steps[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            
            updateProgress();
            
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            checkBtn.innerText = (step.type === 'teach' || step.type === 'example') ? 'Continuar' : 'Verificar';
            
            if (step.type === 'teach' || step.type === 'example') {
                checkBtn.disabled = false;
                checkBtn.classList.add('active');
            }

            area.innerHTML = '';

            if (step.type === 'teach') {
                area.innerHTML = `
                    <div class="game-card teach-card">
                        <div class="module-subtitle"><i class="fas ${step.icon}"></i> NOVO CONCEITO</div>
                        <h2 class="title-main">${step.title}</h2>
                        <div class="text-body">${step.content}</div>
                        ${step.highlight ? `<div class="teach-highlight"><i class="fas fa-lightbulb mr-2"></i>${step.highlight}</div>` : ''}
                    </div>
                `;
            } 
            else if (step.type === 'example') {
                area.innerHTML = `
                    <div class="game-card example-card">
                        <div class="module-subtitle"><i class="fas ${step.icon}"></i> NA PRÁTICA</div>
                        <h2 class="title-main">${step.title}</h2>
                        <div class="example-scenario text-body">${step.scenario}</div>
                        ${step.code ? `<div class="example-code">${step.code}</div>` : ''}
                        <div class="example-takeaway"><i class="fas fa-arrow-right mt-1" style="color: var(--cyber-blue)"></i> ${step.takeaway}</div>
                    </div>
                `;
            }
            else if (step.type === 'quiz') {
                shuffledOptions = shuffle([...step.options]);
                area.innerHTML = `
                    <div class="game-card">
                        <div class="quiz-title">${step.task}</div>
                        <div class="options-grid">
                            ${shuffledOptions.map((opt, i) => `
                                <div class="option-card" onclick="selectQuiz(${i})" id="opt-${i}">
                                    <div class="option-number">${i+1}</div>
                                    <span>${opt}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            else if (step.type === 'fill') {
                shuffledOptions = shuffle([...step.options]);
                const sentenceParts = step.sentence.split('___');
                
                area.innerHTML = `
                    <div class="game-card">
                        <div class="module-subtitle"><i class="fas fa-pen-to-square"></i> COMPLETE A FRASE</div>
                        <div class="fill-sentence">
                            ${sentenceParts[0]}<span class="fill-slot" id="fillSlot"></span>${sentenceParts[1]}
                        </div>
                        <div class="options-grid">
                            ${shuffledOptions.map((opt, i) => `
                                <div class="option-card" style="justify-content: center;" onclick="selectFill(${i})" id="opt-${i}">
                                    <span>${opt}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            else if (step.type === 'match') {
                matchesFound = 0;
                matchLeft = shuffle(step.pairs.map((p, i) => ({text: p.term, id: i})));
                
                let isDeranged = false;
                while (!isDeranged) {
                    matchRight = shuffle(step.pairs.map((p, i) => ({text: p.definition, id: i})));
                    isDeranged = true;
                    for (let j = 0; j < matchLeft.length; j++) {
                        if (matchLeft[j].id === matchRight[j].id) {
                            if (matchLeft.length > 1) {
                                isDeranged = false;
                                break;
                            }
                        }
                    }
                }
                selectedLeft = null;
                selectedRight = null;
                
                area.innerHTML = `
                    <div class="game-card">
                        <div class="module-subtitle"><i class="fas fa-link"></i> ASSOCIE OS PARES</div>
                        <div class="quiz-title">${step.title}</div>
                        <div class="match-container">
                                ${matchLeft.map((item, i) => `
                                    <div class="match-item" id="left-${i}" onclick="selectMatch('left', ${i}, ${item.id})">${item.text}</div>
                                    <div class="match-item" id="right-${i}" onclick="selectMatch('right', ${i}, ${matchRight[i].id})">${matchRight[i].text}</div>
                                `).join('')}
                        </div>
                    </div>
                `;
            }
            
            area.scrollTop = 0;
        }

        function selectQuiz(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function selectFill(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            const slot = document.getElementById('fillSlot');
            slot.innerText = shuffledOptions[idx];
            slot.classList.add('filled');
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function selectMatch(side, idx, pairId) {
            const item = document.getElementById(`${side}-${idx}`);
            if (item.classList.contains('matched')) return;

            document.querySelectorAll(`.match-item[id^='${side}-']`).forEach(el => {
                if(!el.classList.contains('matched')) el.classList.remove('selected');
            });
            
            item.classList.add('selected');

            if (side === 'left') selectedLeft = {el: item, id: pairId};
            else selectedRight = {el: item, id: pairId};

            if (selectedLeft && selectedRight) {
                if (selectedLeft.id === selectedRight.id) {
                    selectedLeft.el.classList.remove('selected');
                    selectedLeft.el.classList.add('matched');
                    selectedRight.el.classList.remove('selected');
                    selectedRight.el.classList.add('matched');
                    matchesFound++;
                    
                    if (matchesFound === steps[currentStep].pairs.length) {
                        document.getElementById('checkBtn').disabled = false;
                        document.getElementById('checkBtn').classList.add('active');
                    }
                } else {
                    let errLeft = selectedLeft;
                    let errRight = selectedRight;
                    selectedLeft = null;
                    selectedRight = null;

                    errLeft.el.classList.remove('selected');
                    errLeft.el.classList.add('error');
                    errRight.el.classList.remove('selected');
                    errRight.el.classList.add('error');
                    
                    hearts--;
                    updateProgress();
                    if(hearts <= 0) triggerGameOver();

                    setTimeout(() => {
                        errLeft.el.classList.remove('error');
                        errRight.el.classList.remove('error');
                    }, 500);
                    return;
                }
                selectedLeft = null;
                selectedRight = null;
            }
        }

        function checkResponse() {
            const step = steps[currentStep];
            const checkBtn = document.getElementById('checkBtn');
            const popup = document.getElementById('feedbackPopup');
            
            if (step.type === 'teach' || step.type === 'example') {
                currentStep++;
                render();
                return;
            }

            let isCorrect = false;

            if (step.type === 'quiz' || step.type === 'fill') {
                isCorrect = shuffledOptions[selectedIdx] === step.correctText;
                
                document.querySelectorAll('.option-card').forEach((c, i) => {
                    if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                    else if (i === selectedIdx) c.classList.add('wrong');
                    c.classList.add('disabled');
                });
            } else if (step.type === 'match') {
                isCorrect = true;
            }

            if (isCorrect) {
                document.getElementById('fbTitle').innerHTML = '<i class="fas fa-check-circle"></i> Excelente!';
                document.getElementById('fbTitle').className = "feedback-title text-green-500";
                document.getElementById('fbMsg').innerText = step.explanation || "Você dominou esse conceito.";
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateProgress();
                document.getElementById('fbTitle').innerHTML = '<i class="fas fa-times-circle"></i> Incorreto!';
                document.getElementById('fbTitle').className = "feedback-title text-red-500";
                document.getElementById('fbMsg').innerText = step.explanation || "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                
                if (hearts <= 0) {
                    setTimeout(triggerGameOver, 600);
                }
            }
        }

        function triggerGameOver() {
            alert("VOCÊ FICOU SEM VIDAS. O treinamento será reiniciado."); 
            location.reload();
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            
            let nextBtnHtml = `<button class="check-btn active w-full" onclick="window.location.href='../lessons/7.1b-configuracoes-nuvem.html'" style="background: var(--cyber-green); color: black; border-color: var(--cyber-green); box-shadow: 0 4px 0 #008f20; font-size: 1.1rem; padding: 1.2rem; letter-spacing: 2px;">PRÓXIMA LIÇÃO <i class="fas fa-arrow-right ml-2"></i></button>`;

            document.getElementById('gameArea').innerHTML = `
                <div class="game-card teach-card" style="align-items: center; text-align: center; border-color: var(--cyber-blue)">
                    <i class="fas fa-medal text-6xl text-yellow-400 mb-4 mt-4"></i>
                    <h2 class="title-main mb-2">ACESSO CONSOLIDADO!</h2>
                    <p class="text-body mb-6">Você desvendou as táticas de phishing com SET, mapeou os modelos de nuvem e compreendeu a escalada de privilégios e a aquisição de contas corporativas.</p>
                    <div style="display: flex; flex-direction: column; gap: 1rem; width: 100%; align-items: center; margin-top: 1rem;">
                        ${nextBtnHtml}
                        <div style="display: flex; gap: 1rem; width: 100%; max-width: 400px; margin-top: 0.5rem;">
                            <button class="check-btn" onclick="location.reload()" style="flex: 1; background: #161b22; border: 2px solid #30363d; color: #c9d1d9; box-shadow: 0 4px 0 #0d1117; padding: 0.8rem 0.5rem;">
                                <i class="fas fa-rotate-right mb-1 block text-lg"></i>
                                <span style="font-size: 0.75rem; display: block; margin-top: 4px;">REINICIAR</span>
                            </button>
                            <button class="check-btn" onclick="window.location.href='../modules/modulo-07.html'" style="flex: 1; background: #161b22; border: 2px solid var(--cyber-blue); color: var(--cyber-blue); box-shadow: 0 4px 0 rgba(0,255,255,0.2); padding: 0.8rem 0.5rem;">
                                <i class="fas fa-layer-group mb-1 block text-lg"></i>
                                <span style="font-size: 0.75rem; display: block; margin-top: 4px;">MÓDULOS</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
