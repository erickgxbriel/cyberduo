<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberDuo - Falhas de Autenticação 6.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #00f2ff;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(0, 242, 255, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: 1.05rem; color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: 0.95rem; line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: 0.95rem; -webkit-tap-highlight-color: transparent; }
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(0, 242, 255, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem; background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px; }
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #0099a1; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: 0.95rem; color: #8b949e; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="game-header">
        <i class="fas fa-times cursor-pointer text-gray-500" onclick="window.location.href='../modules/modulo-06.html'"></i>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-key',
                concept: 'Conceito de Autenticação',
                desc: 'A <span class="highlight-cyan">Autenticação</span> é o processo de verificar a identidade de um usuário, sistema ou entidade, geralmente através de senhas, biometria ou tokens.',
                task: 'O que o processo de autenticação busca confirmar em um sistema web?',
                options: [
                    'Se a entidade é realmente quem ela afirma ser',
                    'Quais arquivos o usuário tem permissão para editar',
                    'A velocidade de conexão do usuário com o servidor'
                ],
                correctText: 'Se a entidade é realmente quem ela afirma ser',
                explanation: 'Autenticação valida a identidade; autorização valida as permissões.'
            },
            {
                icon: 'fa-user-lock',
                concept: 'Ataques de Força Bruta',
                desc: 'No <span class="highlight-yellow">Brute Force</span>, o atacante tenta todas as combinações possíveis de caracteres até encontrar a senha correta.',
                task: 'Qual o principal fator que torna um ataque de força bruta bem-sucedido?',
                options: [
                    'Uso de senhas curtas, simples ou previsíveis pelo usuário',
                    'O uso de navegadores web com modo escuro ativado',
                    'A instalação de cabos de rede de marcas desconhecidas'
                ],
                correctText: 'Uso de senhas curtas, simples ou previsíveis pelo usuário',
                explanation: 'Senhas complexas aumentam o tempo necessário para o ataque ser viável.'
            },
            {
                icon: 'fa-book-skull',
                concept: 'Ataque de Dicionário',
                desc: 'Diferente da força bruta pura, o <span class="highlight-cyan">Ataque de Dicionário</span> utiliza listas de palavras pré-existentes e senhas vazadas comuns.',
                task: 'Qual a vantagem do ataque de dicionário sobre a força bruta convencional?',
                options: [
                    'É muito mais rápido pois testa termos com maior probabilidade de uso',
                    'É impossível de ser detectado por firewalls ou sistemas de IDS',
                    'Não exige conexão com a internet para ser realizado pelo hacker'
                ],
                correctText: 'É muito mais rápido pois testa termos com maior probabilidade de uso',
                explanation: 'A maioria das pessoas usa senhas baseadas em palavras ou padrões conhecidos.'
            },
            {
                icon: 'fa-spray-can',
                concept: 'Password Spraying',
                desc: 'No <span class="highlight-red">Password Spraying</span>, o atacante tenta uma única senha comum (ex: "Verão2024!") contra centenas de nomes de usuários diferentes.',
                task: 'Qual o objetivo tático do Password Spraying em comparação ao Brute Force?',
                options: [
                    'Evitar o bloqueio de contas (lockout) por excesso de erros em um único perfil',
                    'Criptografar o banco de dados de senhas do servidor de e-mail',
                    'Mudar o papel de parede de todos os computadores da rede local'
                ],
                correctText: 'Evitar o bloqueio de contas (lockout) por excesso de erros em um único perfil',
                explanation: 'Testar poucas senhas em muitos usuários evita disparar alertas de intrusão.'
            },
            {
                icon: 'fa-shield-halved',
                concept: 'Autenticação Multifator (MFA)',
                desc: 'O <span class="highlight-green">MFA</span> exige dois ou mais fatores de categorias diferentes: algo que você <span class="highlight-cyan">sabe</span>, algo que você <span class="highlight-cyan">tem</span> ou algo que você <span class="highlight-cyan">é</span>.',
                task: 'Qual destes é um exemplo de fator de autenticação da categoria "Algo que você tem"?',
                options: [
                    'Um token físico (hardware) ou um aplicativo autenticador no celular',
                    'Uma senha complexa de 12 caracteres com símbolos especiais',
                    'A sua impressão digital ou leitura de íris pelo sensor biométrico'
                ],
                correctText: 'Um token físico (hardware) ou um aplicativo autenticador no celular',
                explanation: 'Posse de um dispositivo físico é um fator de segurança muito forte.'
            },
            {
                icon: 'fa-cookie-bite',
                concept: 'Segurança de Cookies',
                desc: 'Cookies de autenticação devem usar atributos como <span class="highlight-green">HttpOnly</span> (impede leitura via JS) e <span class="highlight-green">Secure</span> (apenas via HTTPS).',
                task: 'Qual a função do atributo "HttpOnly" em um cookie de sessão?',
                options: [
                    'Impedir que scripts maliciosos (XSS) acessem o valor do cookie',
                    'Garantir que o cookie seja enviado apenas para sites do governo',
                    'Aumentar o limite de tamanho do cookie para 100 megabytes'
                ],
                correctText: 'Impedir que scripts maliciosos (XSS) acessem o valor do cookie',
                explanation: 'Isso mitiga o roubo de sessão mesmo se houver uma falha de XSS no site.'
            },
            {
                icon: 'fa-hourglass-end',
                concept: 'Gerenciamento de Sessão',
                desc: 'Sessões devem ter <span class="highlight-yellow">Timeouts</span> automáticos e expirar após o logout. IDs de sessão devem ser invalidados no servidor e no cliente.',
                task: 'Por que timeouts de sessão são essenciais para a segurança de autenticação?',
                options: [
                    'Para reduzir a janela de oportunidade caso o computador seja deixado sem vigilância',
                    'Para economizar memória RAM nos servidores do provedor de internet',
                    'Para forçar o usuário a comprar uma nova licença do software web'
                ],
                correctText: 'Para reduzir a janela de oportunidade caso o computador seja deixado sem vigilância',
                explanation: 'Sessões ativas por muito tempo aumentam o risco de sequestro ou uso não autorizado.'
            },
            {
                icon: 'fa-id-badge',
                concept: 'Single Sign-On (SSO)',
                desc: 'O <span class="highlight-cyan">SSO</span> permite que o usuário se autentique uma vez e acesse múltiplos sistemas (ex: Google Auth). Usa protocolos como <span class="highlight-yellow">SAML</span> e <span class="highlight-yellow">OAuth</span>.',
                task: 'Qual a principal vantagem do SSO para a segurança organizacional?',
                options: [
                    'Centralização do gerenciamento de acesso e redução da fadiga de senhas',
                    'Permitir que o hacker acesse todos os sistemas com uma única chave',
                    'Desativar o uso de firewalls em toda a infraestrutura da empresa'
                ],
                correctText: 'Centralização do gerenciamento de acesso e redução da fadiga de senhas',
                explanation: 'Com menos senhas para lembrar, o usuário tende a criar senhas mais fortes.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">6.5 • AUTENTICAÇÃO • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "IDENTIDADE VALIDADA!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "ACESSO NEGADO!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("SISTEMA BLOQUEADO. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: var(--cyber-green)">
                    <i class="fas fa-medal text-5xl text-yellow-400 mb-2"></i>
                    <h2 class="text-xl font-bold text-white mb-1">AUTENTICAÇÃO DOMINADA!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você compreendeu os ataques e as defesas robustas para autenticação no Módulo 6.5.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-06.html'" style="background: var(--cyber-green); color: black;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
