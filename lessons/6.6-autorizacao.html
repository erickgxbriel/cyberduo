<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberDuo - Falhas de Autorização 6.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #00f2ff;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(0, 242, 255, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: 1.05rem; color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: 0.95rem; line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: 0.95rem; -webkit-tap-highlight-color: transparent; }
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(0, 242, 255, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem; background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px; }
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #0099a1; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: 0.95rem; color: #8b949e; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="game-header">
        <i class="fas fa-times cursor-pointer text-gray-500" onclick="window.location.href='../modules/modulo-06.html'"></i>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-user-check',
                concept: 'Conceito de Autorização',
                desc: 'A <span class="highlight-cyan">Autorização</span> define o que um usuário autenticado pode fazer. Falhas aqui permitem que usuários comuns acessem recursos de administradores ou de outros usuários.',
                task: 'O que a autorização verifica especificamente em um sistema web?',
                options: [
                    'As ações e recursos que um usuário tem permissão para acessar',
                    'A validade do nome de usuário e senha inseridos no login',
                    'A velocidade física dos cabos de rede do provedor de internet'
                ],
                correctText: 'As ações e recursos que um usuário tem permissão para acessar',
                explanation: 'Autenticação é "quem você é"; autorização é "o que você pode fazer".'
            },
            {
                icon: 'fa-vial',
                concept: 'Parâmetros HTTP (HPP)',
                desc: 'A <span class="highlight-yellow">Poluição do Parâmetro HTTP (HPP)</span> ocorre quando vários parâmetros têm o mesmo nome, confundindo a interpretação do servidor e burlando filtros.',
                task: 'Como um atacante pode tentar disparar uma vulnerabilidade de HPP?',
                options: [
                    'Anexando o mesmo parâmetro várias vezes com valores diferentes na URL',
                    'Removendo permanentemente o arquivo index.html do servidor root',
                    'Utilizando apenas redes Wi-Fi públicas sem qualquer tipo de senha'
                ],
                correctText: 'Anexando o mesmo parâmetro várias vezes com valores diferentes na URL',
                explanation: 'Isso pode induzir o app a usar o valor malicioso em vez do legítimo.'
            },
            {
                icon: 'fa-folder-open',
                concept: 'IDOR (Referência Direta)',
                desc: 'A <span class="highlight-red">Referência Insegura a Objeto Direto (IDOR)</span> permite que atacantes acessem objetos (arquivos, dados) alterando identificadores na URL ou no corpo da requisição.',
                task: 'Qual ação caracteriza a exploração de uma falha de IDOR?',
                options: [
                    'Alterar um ID de parâmetro (ex: id=101) para acessar dados de outro usuário',
                    'Realizar um ataque de força bruta contra a senha do banco de dados',
                    'Instalar um servidor proxy entre o computador da vítima e o roteador'
                ],
                correctText: 'Alterar um ID de parâmetro (ex: id=101) para acessar dados de outro usuário',
                explanation: 'O IDOR acontece quando o sistema não verifica se o usuário tem permissão para o ID solicitado.'
            },
            {
                icon: 'fa-magnifying-glass',
                concept: 'Busca por HPP',
                desc: 'Ao analisar requisições, petersers buscam por parâmetros que aceitam entrada de usuário e tentam <span class="highlight-cyan">duplicá-los</span> para observar o comportamento do app.',
                task: 'Por que às vezes é necessário enviar três solicitações HTTP para cada parâmetro ao testar HPP?',
                options: [
                    'Para identificar indicadores de incompatibilidade de impedância na análise do app',
                    'Para garantir que o servidor web não entre em modo de hibernação profunda',
                    'Para criptografar as mensagens trocadas entre o navegador e o proxy local'
                ],
                correctText: 'Para identificar indicadores de incompatibilidade de impedância na análise do app',
                explanation: 'Diferenças nas respostas indicam como o sistema lida com parâmetros conflitantes.'
            },
            {
                icon: 'fa-tools',
                concept: 'Ferramenta OWASP ZAP',
                desc: 'O <span class="highlight-green">OWASP ZAP</span> é uma ferramenta indispensável para encontrar vulnerabilidades de HPP e outras falhas lógicas de autorização manualmente.',
                task: 'Qual a principal utilidade do OWASP ZAP no teste de autorização?',
                options: [
                    'Interceptar e manipular requisições para testar a lógica de acesso do app',
                    'Limpar o histórico de navegação do usuário no console do servidor',
                    'Aumentar o limite de upload de arquivos PDF para o servidor de e-mail'
                ],
                correctText: 'Interceptar e manipular requisições para testar a lógica de acesso do app',
                explanation: 'O ZAP permite agir como um proxy, editando parâmetros em tempo real.'
            },
            {
                icon: 'fa-shield-halved',
                concept: 'Mitigação de Autorização',
                desc: 'A defesa envolve <span class="highlight-green">validação de entrada</span> rigorosa e o uso de referências de objeto indireto (mapeamentos que o usuário não pode adivinhar).',
                task: 'Qual medida técnica ajuda a prevenir ataques de IDOR?',
                options: [
                    'Uso de referências de objeto indireto por usuário ou por sessão',
                    'Ocultar o endereço IP público do servidor web dos visitantes',
                    'Desativar o uso de formulários HTML em todas as páginas do site'
                ],
                correctText: 'Uso de referências de objeto indireto por usuário ou por sessão',
                explanation: 'Usar tokens aleatórios em vez de IDs sequenciais impede que o atacante "adivinhe" outros registros.'
            },
            {
                icon: 'fa-user-secret',
                concept: 'Privilégios Administrativos',
                desc: 'Usuários não autenticados podem, por falhas de autorização, executar ações de <span class="highlight-red">administradores</span> ou desenvolvedores se o controle for falho.',
                task: 'O que pode permitir que um usuário comum execute funções restritas de sistema?',
                options: [
                    'Vulnerabilidades de autorização que falham em validar permissões em cada ação',
                    'O uso de sistemas operacionais modernos e atualizados como o Windows 11',
                    'A presença de um firewall de hardware na borda da rede da organização'
                ],
                correctText: 'Vulnerabilidades de autorização que falham em validar permissões em cada ação',
                explanation: 'Cada endpoint deve verificar se o token de sessão atual tem o privilégio necessário.'
            },
            {
                icon: 'fa-check-circle',
                concept: 'Verificação de Controle de Acesso',
                desc: 'Garantir que o usuário esteja <span class="highlight-green">autorizado</span> a acessar o objeto solicitado é o pilar fundamental da segurança de dados web.',
                task: 'Qual o requisito básico para uma autorização segura em cada requisição?',
                options: [
                    'Verificar o controle de acesso para garantir a permissão ao objeto específico',
                    'Pedir a senha do usuário novamente em todas as páginas do site web',
                    'Criptografar todo o conteúdo estático da página (imagens e textos)'
                ],
                correctText: 'Verificar o controle de acesso para garantir a permissão ao objeto específico',
                explanation: 'O sistema deve confirmar se "Usuário A" pode ler "Arquivo de Usuário B".'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">6.6 • AUTORIZAÇÃO • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "AUTORIZAÇÃO VÁLIDA!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "ACESSO NEGADO!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("ACESSO BLOQUEADO. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: var(--cyber-green)">
                    <i class="fas fa-medal text-5xl text-yellow-400 mb-2"></i>
                    <h2 class="text-xl font-bold text-white mb-1">CONTROLE TOTAL!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você dominou exaustivamente as falhas de HPP, IDOR e controle de acesso no Módulo 6.6.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-06.html'" style="background: var(--cyber-green); color: black;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
