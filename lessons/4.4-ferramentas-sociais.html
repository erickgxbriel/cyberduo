<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <title>CyberDuo - Ferramentas Sociais 4.4</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #ff00ff;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: max(0.8rem, env(safe-area-inset-top)) 1rem 0.8rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(255, 0, 255, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: clamp(0.95rem, 3.8vw, 1.1rem); color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: clamp(0.9rem, 3.5vw, 1rem); line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }
        .highlight-magenta { color: #ff00ff; font-weight: 700; }

        .question-title { font-size: clamp(1rem, 4vw, 1.15rem); font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: clamp(0.9rem, 3.5vw, 1rem); -webkit-tap-highlight-color: transparent;  min-height: 48px;}
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(255, 0, 255, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem 1rem max(1rem, env(safe-area-inset-bottom)); background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px;  min-height: 48px;}
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #990099; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: clamp(1rem, 4vw, 1.2rem); font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: clamp(0.9rem, 3.5vw, 1rem); color: #8b949e; line-height: 1.4; }
    
        /* Design Spells: Interactive Magic */
        .option-card {
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @media (hover: hover) and (pointer: fine) {
            .option-card:hover:not(.disabled) {
                transform: translateX(6px);
                border-color: rgba(0, 242, 255, 0.5);
                box-shadow: -4px 0 10px rgba(0, 242, 255, 0.1);
            }
            .check-btn.active:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 15px rgba(0, 255, 65, 0.3), 0 4px 0 #008f20;
            }
        }
        .check-btn.active:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #008f20;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <div class="flex items-center justify-center cursor-pointer text-gray-500" style="min-width: 44px; min-height: 44px; margin-left: -10px;" onclick="window.location.href='../modules/modulo-04.html'"><i class="fas fa-times"></i></div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-toolbox',
                concept: 'Social-Engineer Toolkit (SET)',
                desc: 'O <span class="highlight-magenta">SET</span> é uma ferramenta open-source desenvolvida por David Kennedy para automatizar ataques de engenharia social, integrada nativamente no Kali Linux.',
                task: 'Qual a principal finalidade do Social-Engineer Toolkit (SET)?',
                options: [
                    'Automatizar diversos vetores de ataque baseados no elemento humano',
                    'Realizar a limpeza física de servidores de banco de dados',
                    'Criptografar arquivos locais para impedir ataques de ransomware'
                ],
                correctText: 'Automatizar diversos vetores de ataque baseados no elemento humano',
                explanation: 'O SET permite criar desde e-mails de phishing até clones de sites e dispositivos USB maliciosos.'
            },
            {
                icon: 'fa-terminal',
                concept: 'Iniciando a Operação',
                desc: 'Para iniciar o toolkit em sistemas baseados em Linux, o profissional utiliza o comando <span class="highlight-cyan">setoolkit</span> no terminal de comando.',
                task: 'Qual comando deve ser digitado no terminal Kali para abrir o menu do SET?',
                options: [
                    'setoolkit',
                    'social-eng-start',
                    'run-set-wizard'
                ],
                correctText: 'setoolkit',
                explanation: 'Este comando carrega o ambiente interativo de menus do toolkit.'
            },
            {
                icon: 'fa-list-ol',
                concept: 'Vetores de Spear-Phishing',
                desc: 'No menu principal, a opção <span class="highlight-yellow">1) Social-Engineering Attacks</span> seguida de <span class="highlight-yellow">1) Spear-Phishing Attack Vectors</span> inicia a configuração de e-mails direcionados.',
                task: 'Qual a sequência inicial de menus no SET para criar um ataque de Spear-Phishing?',
                options: [
                    'Opção 1 (Social-Engineering Attacks) e depois Opção 1 (Spear-Phishing)',
                    'Opção 2 (Fast-Track Attacks) e depois Opção 1 (MSSQL Attacks)',
                    'Opção 4 (Update the Metasploit Framework) e depois Opção 2 (Full Update)'
                ],
                correctText: 'Opção 1 (Social-Engineering Attacks) e depois Opção 1 (Spear-Phishing)',
                explanation: 'A organização em árvore de menus facilita a seleção do vetor de ataque específico.'
            },
            {
                icon: 'fa-file-pdf',
                concept: 'Payloads de Formato de Arquivo',
                desc: 'O SET pode gerar automaticamente arquivos como <span class="highlight-red">PDFs maliciosos</span> que embutem cargas úteis (payloads) para ganhar controle do sistema da vítima.',
                task: 'No SET, o que a opção "Create a FileFormat Payload" permite ao atacante?',
                options: [
                    'Criar um arquivo (ex: PDF) com malware embutido para comprometer a vítima',
                    'Converter um documento Word em uma imagem JPEG inofensiva',
                    'Remover todos os metadados de um arquivo confidencial antes do envio'
                ],
                correctText: 'Criar um arquivo (ex: PDF) com malware embutido para comprometer a vítima',
                explanation: 'Explorar a confiança em formatos de arquivo comuns é uma tática de spear-phishing clássica.'
            },
            {
                icon: 'fa-paper-plane',
                concept: 'Envio e SMTP',
                desc: 'O toolkit permite usar servidores de e-mail próprios ou <span class="highlight-cyan">retransmissões abertas</span> (SMTP) para disparar as mensagens massivas ou direcionadas.',
                task: 'Qual dado técnico é necessário configurar no SET para disparar o e-mail de phishing?',
                options: [
                    'O endereço do servidor SMTP e o número da porta (geralmente 25)',
                    'O número de série físico do processador do servidor de destino',
                    'A frequência de rádio do roteador Wi-Fi da vítima'
                ],
                correctText: 'O endereço do servidor SMTP e o número da porta (geralmente 25)',
                explanation: 'O protocolo SMTP é o padrão para envio de e-mails na internet.'
            },
            {
                icon: 'fa-plug',
                concept: 'Listeners e Reverse Shells',
                desc: 'Após o envio, o atacante configura um <span class="highlight-green">LSTNR</span> (ouvinte) para aguardar a conexão reversa do sistema comprometido.',
                task: 'Por que o atacante deve configurar um "listener" após enviar o payload?',
                options: [
                    'Para receber a conexão do sistema da vítima quando o malware for executado',
                    'Para monitorar se o e-mail foi marcado como spam pelo servidor',
                    'Para gravar a conversa telefônica do suporte técnico da empresa'
                ],
                correctText: 'Para receber a conexão do sistema da vítima quando o malware for executado',
                explanation: 'O listener estabelece o canal de comando e controle (C2) com a máquina invadida.'
            },
            {
                icon: 'fa-fish-fins',
                concept: 'Browser Exploitation (BeEF)',
                desc: 'O <span class="highlight-magenta">BeEF</span> foca em ganchar (hook) navegadores web para executar exploits através de vulnerabilidades de Cross-Site Scripting (XSS).',
                task: 'Qual o foco principal da ferramenta BeEF?',
                options: [
                    'Manipular e controlar navegadores web através de vulnerabilidades do lado do cliente',
                    'Quebrar senhas de arquivos ZIP protegidos por criptografia forte',
                    'Mapear a localização física exata de todos os data centers da Google'
                ],
                correctText: 'Manipular e controlar navegadores web através de vulnerabilidades do lado do cliente',
                explanation: 'O BeEF transforma o navegador da vítima em um ponto de entrada para a rede interna.'
            },
            {
                icon: 'fa-code',
                concept: 'BeEF e Pós-Exploração',
                desc: 'Uma vez ganchado, o navegador permite o uso de módulos para <span class="highlight-red">obtenção de informações</span>, distribuição de malware e pivô para rede interna.',
                task: 'Como o BeEF pode ser usado em conjunto com ataques de phishing?',
                options: [
                    'Através de e-mails que levam a vítima a uma página ganchada com o script do BeEF',
                    'Enviando o instalador do BeEF como um anexo .exe para o administrador',
                    'Substituindo o teclado físico da vítima por um teclado "BeEF" especial'
                ],
                correctText: 'Através de e-mails que levam a vítima a uma página ganchada com o script do BeEF',
                explanation: 'O link no e-mail direciona a vítima para o "gancho" que dá controle ao agressor.'
            },
            {
                icon: 'fa-user-check',
                concept: 'Educação e Prática',
                desc: 'Ferramentas como SET e BeEF são essenciais em pentests para ilustrar o <span class="highlight-green">impacto real</span> de vulnerabilidades sociais e de código.',
                task: 'Qual o valor de usar ferramentas reais em laboratórios controlados?',
                options: [
                    'Praticar a exploração de forma ética para entender e mitigar ameaças reais',
                    'Aprender a roubar dados financeiros para ganho pessoal ilícito',
                    'Desligar permanentemente os servidores de rede da sua própria empresa'
                ],
                correctText: 'Praticar a exploração de forma ética para entender e mitigar ameaças reais',
                explanation: 'Entender a ferramenta do agressor é o primeiro passo para construir a defesa.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon text-fuchsia-500"></i>
                    <div class="text-[0.6rem] text-fuchsia-500 font-black uppercase tracking-widest mb-1">4.4 • FERRAMENTAS SOCIAIS • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "TOOLKIT OPERACIONAL!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "ACESSO NEGADO!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("EQUIPAMENTO BLOQUEADO. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: #ff00ff">
                    <i class="fas fa-toolbox text-5xl text-magenta-400 mb-2" style="color: #ff00ff"></i>
                    <h2 class="text-xl font-bold text-white mb-1">ARMAMENTO COMPLETO!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você domina a operação do SET e BeEF para auditorias de engenharia social.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-04.html'" style="background: #ff00ff; color: white; border-bottom: 4px solid #990099;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
