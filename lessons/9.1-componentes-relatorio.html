<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberDuo - Componentes de Relatórios 9.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #00ffa3;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(0, 255, 163, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: 1.05rem; color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: 0.95rem; line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: 0.95rem; -webkit-tap-highlight-color: transparent; }
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(0, 255, 163, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem; background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px; }
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #00b372; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: 0.95rem; color: #8b949e; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="game-header">
        <i class="fas fa-times cursor-pointer text-gray-500" onclick="window.location.href='../modules/modulo-09.html'"></i>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-users-viewfinder',
                concept: 'Audiência Alvo',
                desc: 'Identificar quem lerá o relatório é vital. O conteúdo deve alternar entre o <span class="highlight-cyan">Resumo Executivo</span> (menos técnico) e os detalhes profundos para equipes de TI e desenvolvedores.',
                task: 'O que acontece se um relatório for escrito apenas para um público altamente técnico e entregue à gerência?',
                options: [
                    'O relatório não mostrará seu valor real e o trabalho pode passar despercebido',
                    'O relatório será automaticamente traduzido pelo sistema operacional local',
                    'A gerência passará a realizar todos os testes técnicos pessoalmente'
                ],
                correctText: 'O relatório não mostrará seu valor real e o trabalho pode passar despercebido',
                explanation: 'A clareza para todos os níveis de decisão é a chave de um relatório profissional.'
            },
            {
                icon: 'fa-user-tie',
                concept: 'A C-Suite',
                desc: 'O termo <span class="highlight-yellow">C-suite</span> refere-se aos gerentes de nível executivo (CEO, CFO, CIO, CSO). Eles tomam decisões baseadas em riscos de negócio, não apenas em bits e bytes.',
                task: 'Quem faz parte do grupo conhecido como "C-suite" em uma organização?',
                options: [
                    'Executivos de alto nível como o CEO, CFO e o Diretor de Segurança (CSO)',
                    'Apenas os estagiários que trabalham no departamento de infraestrutura',
                    'Os usuários finais que utilizam apenas os aplicativos mobile da empresa'
                ],
                correctText: 'Executivos de alto nível como o CEO, CFO e o Diretor de Segurança (CSO)',
                explanation: 'O relatório deve convencer a C-suite da necessidade de investimentos em segurança.'
            },
            {
                icon: 'fa-chart-simple',
                concept: 'Uso do CVSS',
                desc: 'O <span class="highlight-green">CVSS</span> (Common Vulnerability Scoring System) fornece uma escala de 0 a 10 para priorizar riscos. Scanners geram a pontuação, mas o auditor deve contextualizá-la.',
                task: 'Qual o valor de incluir as pontuações CVSS em um relatório de Pentest?',
                options: [
                    'Fornecer uma forma objetiva e padronizada de priorizar a gravidade das falhas',
                    'Garantir que o site do cliente nunca sofra nenhum tipo de lentidão técnica',
                    'Aumentar o número de curtidas nas postagens de blog da empresa de auditoria'
                ],
                correctText: 'Fornecer uma forma objetiva e padronizada de priorizar a gravidade das falhas',
                explanation: 'O CVSS remove o "achismo" e traz rigor métrico à análise de risco.'
            },
            {
                icon: 'fa-lock',
                concept: 'Classificação do Relatório',
                desc: 'O conteúdo de um relatório de pentest é <span class="highlight-red">altamente sensível</span>. Deve ser compartilhado apenas com base na "necessidade de conhecimento" e protegido rigorosamente.',
                task: 'Como deve ser tratado o nível de classificação de um relatório final de Pentest?',
                options: [
                    'Como informação altamente classificada e restrita aos envolvidos autorizados',
                    'Como conteúdo público que deve ser postado em fóruns de discussão abertos',
                    'Como um manual de treinamento que pode ser vendido para qualquer pessoa'
                ],
                correctText: 'Como informação altamente classificada e restrita aos envolvidos autorizados',
                explanation: 'Um relatório vazado é um mapa de invasão pronto para hackers maliciosos.'
            },
            {
                icon: 'fa-truck-ramp-box',
                concept: 'Métodos de Distribuição',
                desc: 'O relatório pode ser entregue como <span class="highlight-cyan">cópia impressa</span> ou eletronicamente. O controle deve ser rígido, incluindo a destruição de cópias extras.',
                task: 'Por que um auditor deve se preocupar com a destruição de cópias extras do relatório?',
                options: [
                    'Para evitar vazamentos acidentais de informações críticas de vulnerabilidade',
                    'Para economizar espaço físico nas prateleiras do escritório do cliente',
                    'Porque o papel utilizado é tóxico e deve ser manuseado com luvas de chumbo'
                ],
                correctText: 'Para evitar vazamentos acidentais de informações críticas de vulnerabilidade',
                explanation: 'Controlar o número de cópias limita a superfície de exposição dos segredos do cliente.'
            },
            {
                icon: 'fa-camera',
                concept: 'Prova Visual',
                desc: 'Incluir <span class="highlight-yellow">capturas de tela</span> e vídeos dos exploits é a melhor maneira de provar que a vulnerabilidade é real e não um falso positivo.',
                task: 'Qual a importância de incluir provas visuais (screenshots) no relatório técnico?',
                options: [
                    'Ilustrar as descobertas e permitir que a equipe técnica recrie o problema',
                    'Mudar o design visual das páginas web que foram testadas pelo auditor',
                    'Garantir que o relatório tenha mais de 100 páginas para impressionar o chefe'
                ],
                correctText: 'Ilustrar as descobertas e permitir que a equipe técnica recrie o problema',
                explanation: 'Screenshots são "fatos" que validam a existência da falha no código ou sistema.'
            },
            {
                icon: 'fa-folder-tree',
                concept: 'Dradis Framework',
                desc: 'O <span class="highlight-green">Dradis</span> é um framework de colaboração que ingere resultados de várias ferramentas e ajuda a produzir relatórios em formatos como PDF e HTML.',
                task: 'Qual a principal funcionalidade do Dradis durante a fase de relatório?',
                options: [
                    'Consolidar resultados de múltiplas ferramentas e automatizar a geração de relatórios',
                    'Remover permanentemente todos os registros de logs de todos os servidores root',
                    'Aumentar a velocidade física de processamento dos pacotes Wi-Fi capturados'
                ],
                correctText: 'Consolidar resultados de múltiplas ferramentas e automatizar a geração de relatórios',
                explanation: 'O Dradis economiza tempo ao unir dados do Nmap, Nessus, Burp, etc., em um só lugar.'
            },
            {
                icon: 'fa-check-double',
                concept: 'Validação e Qualidade',
                desc: 'Um relatório de qualidade fornece uma classificação precisa baseada no <span class="highlight-green">ambiente real</span> e uma análise detalhada da causa raiz de cada falha.',
                task: 'O que define um "relatório de qualidade" além de apenas listar falhas?',
                options: [
                    'Fornecer contexto de risco real e análise detalhada da causa raiz para correção',
                    'Ter uma capa colorida com muitas imagens de hackers de capuz preto',
                    'Ser entregue em um dispositivo USB que se autodestrói após 5 minutos'
                ],
                correctText: 'Fornecer contexto de risco real e análise detalhada da causa raiz para correção',
                explanation: 'O relatório útil diz o que está quebrado, por que quebrou e como consertar.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">9.1 • COMPONENTES • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "VETOR VALIDADO!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "PACOTE CORROMPIDO!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("TIMEOUT DE CONEXÃO. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: var(--cyber-blue)">
                    <i class="fas fa-medal text-5xl text-yellow-400 mb-2"></i>
                    <h2 class="text-xl font-bold text-white mb-1">AUDITOR DE RELATÓRIO!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você dominou os componentes, audiência e ferramentas de redação no Módulo 9.1.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-09.html'" style="background: var(--cyber-blue); color: black;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
