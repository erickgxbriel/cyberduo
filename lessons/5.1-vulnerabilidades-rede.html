<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <title>CyberDuo - Exploração de Protocolos e Ataques de Senha</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #ff8c00;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: max(0.8rem, env(safe-area-inset-top)) 1rem 0.8rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(0, 255, 65, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 12px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; border-radius: 10px;}
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 80px; justify-content: flex-end; font-size: 1.1rem; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .game-card { width: 100%; animation: slideUp 0.3s ease-out; display: flex; flex-direction: column; gap: 0.8rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* General Typography */
        .module-subtitle { font-size: 0.7rem; font-weight: 900; color: var(--cyber-blue); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .title-main { font-size: clamp(1.4rem, 5vw, 1.8rem); font-weight: 800; color: white; line-height: 1.2; margin-bottom: 0.5rem; }
        .text-body { font-size: clamp(1rem, 4vw, 1.1rem); color: #b1bac4; line-height: 1.5; }
        .text-body b { color: white; }
        
        
        /* Utility Classes */
        .mr-1 { margin-right: 0.25rem; }
        .mr-2 { margin-right: 0.5rem; }
        .mb-1 { margin-bottom: 0.25rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        /* TYPE: TEACH */
        .teach-card { background: #0d1117; border: 1px solid #30363d; border-radius: 1.2rem; padding: clamp(1rem, 4vw, 1.5rem); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .teach-icon { font-size: 2.5rem; color: var(--cyber-blue); margin-bottom: 1rem; }
        .teach-highlight { display: flex; align-items: center; gap: 0.6rem; background: rgba(0, 255, 65, 0.1); border-left: 3px solid var(--cyber-green); padding: 0.8rem; margin-top: 1rem; font-weight: 600; color: var(--cyber-green); border-radius: 0 0.5rem 0.5rem 0; }

        /* TYPE: EXAMPLE */
        .example-card { background: #0d1117; border: 1px solid #30363d; border-radius: 1.2rem; padding: clamp(1rem, 4vw, 1.5rem); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .example-scenario { background: #161b22; border: 1px solid #21262d; border-radius: 0.8rem; padding: 1rem; margin-top: 1rem; }
        .example-code { background: #010409; font-family: 'Fira Code', monospace; padding: 1rem; border-radius: 0.5rem; margin-top: 1rem; font-size: 0.9rem; color: #00ff41; border: 1px solid #30363d; }
        .example-takeaway { display: flex; gap: 0.8rem; align-items: flex-start; margin-top: 1rem; color: #8b949e; font-size: 0.9rem; font-weight: 600; }

        /* TYPE: QUIZ */
        .quiz-title { font-size: clamp(1.2rem, 5vw, 1.5rem); font-weight: 800; color: white; margin-bottom: 1.5rem; line-height: 1.3; }
        .options-grid { display: flex; flex-direction: column; gap: 0.6rem; width: 100%; }
        .option-card { background: #161b22; border: 2px solid #30363d; border-bottom-width: 4px; padding: clamp(0.8rem, 3vw, 1rem); border-radius: 1rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 1rem; font-weight: 600; font-size: clamp(0.95rem, 4vw, 1.05rem); -webkit-tap-highlight-color: transparent; }
        .option-card:active { transform: translateY(2px); border-bottom-width: 2px; }
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(0, 255, 65, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }
        .option-card.disabled { pointer-events: none; opacity: 0.6; }
        .option-number { width: 28px; height: 28px; flex-shrink: 0; border: 2px solid #484f58; border-radius: 0.4rem; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 800; color: #8b949e; }
        .option-card.selected .option-number { border-color: var(--cyber-blue); color: var(--cyber-blue); }

        /* TYPE: FILL */
        .fill-sentence { font-size: clamp(1.1rem, 5vw, 1.3rem); font-weight: 600; line-height: 1.6; color: white; margin-bottom: 2rem; background: #0d1117; padding: clamp(1rem, 4vw, 1.5rem); border-radius: 1.2rem; border: 1px solid #30363d; }
        .fill-slot { display: inline-block; min-width: 120px; height: 34px; border-bottom: 3px solid #484f58; margin: 0 0.5rem; vertical-align: middle; text-align: center; color: var(--cyber-blue); font-weight: 800; transition: all 0.2s; }
        .fill-slot.filled { border-bottom-color: var(--cyber-blue); }

        /* TYPE: MATCH */
        .match-container { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem clamp(0.5rem, 3vw, 1rem); width: 100%; margin-top: 1rem; }
        /* .match-column removed */
        .match-item { background: #161b22; border: 2px solid #30363d; border-bottom-width: 4px; padding: clamp(0.5rem, 2.5vw, 0.8rem); border-radius: 0.8rem; cursor: pointer; text-align: center; font-weight: 600; font-size: clamp(0.85rem, 3.5vw, 0.95rem); transition: all 0.1s; user-select: none; display: flex; align-items: center; justify-content: center; min-height: 60px; height: 100%; -webkit-tap-highlight-color: transparent; }
        .match-item:active { transform: translateY(2px); border-bottom-width: 2px; }
        .match-item.selected { border-color: var(--cyber-blue); background: rgba(0, 255, 65, 0.1); color: white; }
        .match-item.matched { border-color: var(--cyber-green); background: rgba(0, 255, 65, 0.05); color: var(--cyber-green); opacity: 0.5; pointer-events: none; }
        .match-item.error { border-color: var(--cyber-red); animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        /* FOOTER & BUTTONS */
        .game-footer { flex-shrink: 0; padding: 1rem 1rem max(1rem, env(safe-area-inset-bottom)); background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 1rem; border-radius: 1rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 1rem; letter-spacing: 1px; transition: all 0.1s; -webkit-tap-highlight-color: transparent; }
        .check-btn:active { transform: scale(0.98); }
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #b36200; }
        .check-btn.active:active { transform: translateY(4px); box-shadow: 0 0px 0 #b36200; }

        /* FEEDBACK OVERLAY */
        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem 1.5rem max(1.5rem, env(safe-area-inset-bottom)); transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: left; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 4px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 4px solid var(--cyber-red); }
        .feedback-title { font-size: clamp(1.2rem, 5vw, 1.4rem); font-weight: 800; margin-bottom: 0.5rem; width: 100%; max-width: 400px; display: flex; align-items: center; gap: 0.5rem; }
        .feedback-msg { font-size: clamp(0.95rem, 4vw, 1.05rem); color: #8b949e; line-height: 1.5; width: 100%; max-width: 400px; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <div class="game-header">
        <div class="flex items-center justify-center cursor-pointer text-gray-500" style="min-width: 44px; min-height: 44px; margin-left: -10px;" onclick="window.location.href='../modules/modulo-05.html'"><i class="fas fa-times"></i></div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full" style="max-width: 400px;" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const steps = [
            {
                        "type": "teach",
                        "icon": "fa-network-wired",
                        "title": "Fundamentos de Redes: MAC vs IP",
                        "content": "Antes de explorar as falhas, precisamos entender como as redes se comunicam. Cada dispositivo possui duas identificações principais:<br><br>1. <b>Endereço MAC (Camada 2 - Link de Dados)</b>: Identificador físico permanente e exclusivo de 48 bits gravado na placa de rede de fábrica. Usado para a comunicação direta na rede local.<br>2. <b>Endereço IP (Camada 3 - Rede)</b>: Identificador lógico associado ao dispositivo para permitir o roteamento e a comunicação através de diferentes redes (ex: internet)."
            },
            {
                        "type": "teach",
                        "icon": "fa-route",
                        "title": "Transporte de Dados: TCP vs UDP",
                        "content": "Os dados trafegam pela rede utilizando protocolos de transporte:<br><br>1. <b>TCP (Transmission Control Protocol)</b>: Focado em confiabilidade. Realiza uma conexão (handshake de 3 vias) antes de enviar dados, garante que todos os pacotes cheguem e corrige erros. Ex: HTTP, SSH, FTP.<br>2. <b>UDP (User Datagram Protocol)</b>: Focado em velocidade. Envia pacotes sem estabelecer conexão prévia e sem garantir que chegarão ao destino. Ex: DNS, DHCP, VoIP."
            },
            {
                        "type": "teach",
                        "icon": "fa-server",
                        "title": "DHCP e Roteamento",
                        "content": "Como os IPs se organizam?<br><br>• <b>DHCP (Dynamic Host Configuration Protocol)</b>: O protocolo da Camada de Aplicação que distribui configurações de rede (IP, máscara de sub-rede, gateway) automaticamente para os dispositivos que entram na rede local.<br>• <b>Roteamento</b>: Processo realizado por roteadores que encaminham os pacotes entre redes distintas com base na tabela de roteamento e no IP de destino."
            },
            {
                        "type": "quiz",
                        "task": "Qual das alternativas descreve corretamente uma característica do protocolo UDP?",
                        "options": [
                                    "Ele não é orientado a conexão e prioriza a velocidade do envio, sem garantir que os pacotes cheguem ao destino.",
                                    "Ele realiza o handshake de 3 vias antes de iniciar a transmissão.",
                                    "Ele só funciona na camada física de links de dados (Camada 1)."
                        ],
                        "correctText": "Ele não é orientado a conexão e prioriza a velocidade do envio, sem garantir que os pacotes cheguem ao destino.",
                        "explanation": "O UDP prioriza o tempo real e a velocidade de entrega sobre a integridade/garantia da conexão, ideal para DNS, DHCP e streams."
            },
            {
                        "type": "match",
                        "title": "Associe os Conceitos de Redes",
                        "pairs": [
                                    {
                                                "term": "MAC Address",
                                                "definition": "Identificador físico permanente (Camada 2)"
                                    },
                                    {
                                                "term": "IP Address",
                                                "definition": "Endereço lógico de rede (Camada 3)"
                                    },
                                    {
                                                "term": "TCP",
                                                "definition": "Conexão confiável via Handshake"
                                    },
                                    {
                                                "term": "DHCP",
                                                "definition": "Distribuição dinâmica de IPs locais"
                                    }
                        ]
            },
            {
                        "type": "teach",
                        "icon": "fa-users",
                        "title": "Man-in-the-Middle (MITM)",
                        "content": "No ataque <b>MITM</b>, o hacker se posiciona invisivelmente entre a vítima e o roteador (ou servidor). Todo o tráfego de rede passa pelo computador do hacker antes de chegar ao destino."
            },
            {
                        "type": "example",
                        "icon": "fa-eye",
                        "title": "Interceptação de Tráfego",
                        "scenario": "A vítima entra em um site HTTP para comprar um produto. Como o tráfego passa pelo computador do atacante, ele lê o número do cartão de crédito em texto puro usando o Wireshark.",
                        "takeaway": "Sem criptografia ponta-a-ponta, a rede local não é confiável."
            },
            {
                        "type": "quiz",
                        "task": "No ataque MITM, qual é o principal objetivo do atacante?",
                        "options": [
                                    "Interceptar e manipular a comunicação entre duas partes sem que elas saibam.",
                                    "Derrubar o servidor com múltiplas requisições simultâneas.",
                                    "Adivinhar a senha do Wi-Fi."
                        ],
                        "correctText": "Interceptar e manipular a comunicação entre duas partes sem que elas saibam.",
                        "explanation": "Ele vira um intermediário silencioso e malicioso."
            },
            {
                        "type": "teach",
                        "icon": "fa-network-wired",
                        "title": "ARP Spoofing",
                        "content": "A técnica mais comum de MITM em redes locais é o <b>ARP Spoofing</b>. O hacker envia pacotes ARP falsos dizendo para a máquina da vítima: 'Eu sou o roteador'. E diz para o roteador: 'Eu sou a vítima'."
            },
            {
                        "type": "example",
                        "icon": "fa-terminal",
                        "title": "Enganando o Switch",
                        "scenario": "O PC do João quer ir para a internet. Mas o atacante 'envenenou' a tabela ARP do João. Agora, o PC do João manda os dados para o hacker achando que é o roteador.",
                        "takeaway": "O protocolo ARP não possui autenticação nativa."
            },
            {
                        "type": "fill",
                        "sentence": "Para se defender de ataques de ___ Spoofing, empresas configuram 'Dynamic ARP Inspection' (DAI) em seus switches Cisco.",
                        "options": [
                                    "ARP",
                                    "DNS",
                                    "IP"
                        ],
                        "correctText": "ARP",
                        "explanation": "O DAI impede que máquinas enviem respostas ARP fraudulentas na rede."
            },
            {
                        "type": "teach",
                        "icon": "fa-volume-high",
                        "title": "O que é LLMNR?",
                        "content": "Quando um PC Windows não consegue resolver um nome via DNS, ele 'grita' na rede local usando <b>LLMNR</b> ou <b>NBT-NS</b> perguntando se alguém conhece aquele nome.",
                        "highlight": "Protocolo de broadcast local, altamente inseguro."
            },
            {
                        "type": "teach",
                        "icon": "fa-skull",
                        "title": "Poisoning (Envenenamento)",
                        "content": "O atacante ouve o grito e responde: 'Eu sou esse servidor! Me mande suas credenciais para autenticar'. A vítima envia seu hash NTLMv2.",
                        "highlight": "O atacante mente para capturar o hash da vítima."
            },
            {
                        "type": "example",
                        "icon": "fa-terminal",
                        "title": "Responder",
                        "scenario": "Usando a ferramenta `Responder`, o atacante fica passivamente na rede. Quando alguém digita errado o nome de uma pasta da rede (`\\\\servidro` em vez de `\\\\servidor`), o Responder captura a credencial.",
                        "takeaway": "Desabilite LLMNR e NBT-NS no Active Directory via GPO."
            },
            {
                        "type": "fill",
                        "sentence": "Ao capturar as credenciais através do Responder, o atacante obtém um ___, que precisa ser quebrado usando ferramentas como Hashcat.",
                        "options": [
                                    "Hash NTLMv2",
                                    "Cookie",
                                    "Token JWT"
                        ],
                        "correctText": "Hash NTLMv2",
                        "explanation": "O Windows usa o protocolo NTLMv2 em redes locais, que não envia senhas em texto puro."
            },
            {
                        "type": "teach",
                        "icon": "fa-key",
                        "title": "Brute Force e Dictionary",
                        "content": "<b>Brute Force</b>: testa TODAS as combinações. <b>Dictionary</b>: testa palavras de uma lista. <b>Hybrid</b>: combina dicionário + regras (ex: Password1!, Password2!).",
                        "highlight": "Dicionário é mais rápido, brute force é mais completo"
            },
            {
                        "type": "teach",
                        "icon": "fa-unlock",
                        "title": "Pass-the-Hash",
                        "content": "No <b>Pass-the-Hash</b>, o atacante usa o hash NTLM capturado para autenticar em serviços Windows <b>sem precisar da senha em texto claro</b>. Funciona com <b>psexec</b> e <b>wmiexec</b>.",
                        "highlight": "Hash NTLM = equivalente à senha no Windows"
            },
            {
                        "type": "teach",
                        "icon": "fa-ticket",
                        "title": "Kerberoasting",
                        "content": "<b>Kerberoasting</b>: solicita tickets Kerberos TGS para contas de serviço e tenta crackar offline. Contas de serviço frequentemente têm senhas fracas e privilégios altos.",
                        "highlight": "Service accounts = alvo fácil com alto impacto"
            },
            {
                        "type": "example",
                        "icon": "fa-terminal",
                        "title": "Kerberoasting com Impacket",
                        "scenario": "O pentester solicita tickets TGS para todas as contas de serviço do AD e tenta crackar com Hashcat.",
                        "code": "GetUserSPNs.py domain/user:pass -dc-ip 10.0.0.1 -outputfile tgs.txt\nhashcat -m 13100 tgs.txt rockyou.txt",
                        "takeaway": "Kerberoasting não requer privilégios elevados no AD."
            },
            {
                        "type": "teach",
                        "icon": "fa-id-card",
                        "title": "AS-REP Roasting",
                        "content": "<b>AS-REP Roasting</b>: explora contas com <b>Kerberos pre-auth desabilitado</b>. O atacante solicita o AS-REP e cracka offline sem precisar de credenciais válidas.",
                        "highlight": "Pre-auth desabilitado = senha crackável sem login"
            },
            {
                        "type": "teach",
                        "icon": "fa-database",
                        "title": "Credential Stuffing",
                        "content": "<b>Credential Stuffing</b>: usa pares <b>email:senha</b> de vazamentos (breaches) para tentar login em outros serviços. 65% das pessoas reutilizam senhas.",
                        "highlight": "Reutilização de senhas = porta aberta"
            },
            {
                        "type": "quiz",
                        "task": "Qual ataque solicita tickets Kerberos TGS para crackar senhas de service accounts offline?",
                        "options": [
                                    "Kerberoasting",
                                    "Phishing",
                                    "ARP Spoofing"
                        ],
                        "correctText": "Kerberoasting",
                        "explanation": "Kerberoasting explora contas de serviço com SPNs registrados no Active Directory."
            },
            {
                        "type": "match",
                        "title": "Ataque → Requisito",
                        "pairs": [
                                    {
                                                "term": "Pass-the-Hash",
                                                "definition": "Hash NTLM capturado"
                                    },
                                    {
                                                "term": "Kerberoasting",
                                                "definition": "Acesso ao AD (qualquer user)"
                                    },
                                    {
                                                "term": "AS-REP Roasting",
                                                "definition": "Pre-auth desabilitado"
                                    },
                                    {
                                                "term": "Credential Stuffing",
                                                "definition": "Lista de credenciais vazadas"
                                    }
                        ]
            },
            {
                        "type": "fill",
                        "sentence": "O ataque que explora contas com Kerberos pre-authentication desabilitado é o ___.",
                        "options": [
                                    "AS-REP Roasting",
                                    "Kerberoasting",
                                    "Pass-the-Hash"
                        ],
                        "correctText": "AS-REP Roasting",
                        "explanation": "AS-REP Roasting funciona sem credenciais si a pre-auth estiver desabilitada."
            }
];

        let currentStep = 0;
        let selectedIdx = null; // For quiz and fill
        let hearts = 7;
        let shuffledOptions = [];
        
        // Match state
        let matchLeft = [];
        let matchRight = [];
        let selectedLeft = null;
        let selectedRight = null;
        let matchesFound = 0;

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function updateProgress() {
            const progress = (currentStep / steps.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
            
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(7).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function render() {
            if (currentStep >= steps.length) { showVictory(); return; }
            const step = steps[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            
            updateProgress();
            
            // Reset states
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            checkBtn.innerText = (step.type === 'teach' || step.type === 'example') ? 'Continuar' : 'Verificar';
            
            if (step.type === 'teach' || step.type === 'example') {
                checkBtn.disabled = false;
                checkBtn.classList.add('active');
            }

            area.innerHTML = '';

            if (step.type === 'teach') {
                area.innerHTML = `
                    <div class="game-card teach-card">
                        <div class="module-subtitle"><i class="fas ${step.icon}"></i> NOVO CONCEITO</div>
                        <h2 class="title-main">${step.title}</h2>
                        <div class="text-body">${step.content}</div>
                        ${step.highlight ? `<div class="teach-highlight"><i class="fas fa-lightbulb mr-2"></i>${step.highlight}</div>` : ''}
                    </div>
                `;
            } 
            else if (step.type === 'example') {
                area.innerHTML = `
                    <div class="game-card example-card">
                        <div class="module-subtitle"><i class="fas ${step.icon}"></i> NA PRÁTICA</div>
                        <h2 class="title-main">${step.title}</h2>
                        <div class="example-scenario text-body">${step.scenario}</div>
                        ${step.code ? `<div class="example-code">${step.code}</div>` : ''}
                        <div class="example-takeaway"><i class="fas fa-arrow-right mt-1" style="color: var(--cyber-blue)"></i> ${step.takeaway}</div>
                    </div>
                `;
            }
            else if (step.type === 'quiz') {
                shuffledOptions = shuffle([...step.options]);
                area.innerHTML = `
                    <div class="game-card">
                        <div class="quiz-title">${step.task}</div>
                        <div class="options-grid">
                            ${shuffledOptions.map((opt, i) => `
                                <div class="option-card" onclick="selectQuiz(${i})" id="opt-${i}">
                                    <div class="option-number">${i+1}</div>
                                    <span>${opt}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            else if (step.type === 'fill') {
                shuffledOptions = shuffle([...step.options]);
                const sentenceParts = step.sentence.split('___');
                
                area.innerHTML = `
                    <div class="game-card">
                        <div class="module-subtitle"><i class="fas fa-pen-to-square"></i> COMPLETE A FRASE</div>
                        <div class="fill-sentence">
                            ${sentenceParts[0]}<span class="fill-slot" id="fillSlot"></span>${sentenceParts[1]}
                        </div>
                        <div class="options-grid">
                            ${shuffledOptions.map((opt, i) => `
                                <div class="option-card" style="justify-content: center;" onclick="selectFill(${i})" id="opt-${i}">
                                    <span>${opt}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            else if (step.type === 'match') {
                matchesFound = 0;
                matchLeft = shuffle(step.pairs.map((p, i) => ({text: p.term, id: i})));
                
                let isDeranged = false;
                while (!isDeranged) {
                    matchRight = shuffle(step.pairs.map((p, i) => ({text: p.definition, id: i})));
                    isDeranged = true;
                    for (let j = 0; j < matchLeft.length; j++) {
                        if (matchLeft[j].id === matchRight[j].id) {
                            if (matchLeft.length > 1) {
                                isDeranged = false;
                                break;
                            }
                        }
                    }
                }
                selectedLeft = null;
                selectedRight = null;
                
                area.innerHTML = `
                    <div class="game-card">
                        <div class="module-subtitle"><i class="fas fa-link"></i> ASSOCIE OS PARES</div>
                        <div class="quiz-title">${step.title}</div>
                        <div class="match-container">
                                ${matchLeft.map((item, i) => `
                                    <div class="match-item" id="left-${i}" onclick="selectMatch('left', ${i}, ${item.id})">${item.text}</div>
                                    <div class="match-item" id="right-${i}" onclick="selectMatch('right', ${i}, ${matchRight[i].id})">${matchRight[i].text}</div>
                                `).join('')}
                        </div>
                    </div>
                `;
            }
            
            area.scrollTop = 0;
        }

        // Interactivity Handlers
        function selectQuiz(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function selectFill(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            const slot = document.getElementById('fillSlot');
            slot.innerText = shuffledOptions[idx];
            slot.classList.add('filled');
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function selectMatch(side, idx, pairId) {
            const item = document.getElementById(`${side}-${idx}`);
            if (item.classList.contains('matched')) return;

            // Clear previous selection on same side
            document.querySelectorAll(`.match-item[id^='${side}-']`).forEach(el => {
                if(!el.classList.contains('matched')) el.classList.remove('selected');
            });
            
            item.classList.add('selected');

            if (side === 'left') selectedLeft = {el: item, id: pairId};
            else selectedRight = {el: item, id: pairId};

            if (selectedLeft && selectedRight) {
                // Check match
                if (selectedLeft.id === selectedRight.id) {
                    selectedLeft.el.classList.remove('selected');
                    selectedLeft.el.classList.add('matched');
                    selectedRight.el.classList.remove('selected');
                    selectedRight.el.classList.add('matched');
                    matchesFound++;
                    
                    if (matchesFound === steps[currentStep].pairs.length) {
                        document.getElementById('checkBtn').disabled = false;
                        document.getElementById('checkBtn').classList.add('active');
                    }
                } else {
                    let errLeft = selectedLeft;
                    let errRight = selectedRight;
                    selectedLeft = null;
                    selectedRight = null;

                    errLeft.el.classList.remove('selected');
                    errLeft.el.classList.add('error');
                    errRight.el.classList.remove('selected');
                    errRight.el.classList.add('error');
                    
                    // Lose heart for wrong match
                    hearts--;
                    updateProgress();
                    if(hearts <= 0) triggerGameOver();

                    setTimeout(() => {
                        errLeft.el.classList.remove('error');
                        errRight.el.classList.remove('error');
                    }, 500);
                    return;
                }
                selectedLeft = null;
                selectedRight = null;
            }
        }

        // Logic Check
        function checkResponse() {
            const step = steps[currentStep];
            const checkBtn = document.getElementById('checkBtn');
            const popup = document.getElementById('feedbackPopup');
            
            // Non-interactive steps just advance
            if (step.type === 'teach' || step.type === 'example') {
                currentStep++;
                render();
                return;
            }

            let isCorrect = false;

            if (step.type === 'quiz' || step.type === 'fill') {
                isCorrect = shuffledOptions[selectedIdx] === step.correctText;
                
                document.querySelectorAll('.option-card').forEach((c, i) => {
                    if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                    else if (i === selectedIdx) c.classList.add('wrong');
                    c.classList.add('disabled');
                });
            } else if (step.type === 'match') {
                isCorrect = true; // Button only enables when all matches found
            }

            if (isCorrect) {
                document.getElementById('fbTitle').innerHTML = '<i class="fas fa-check-circle"></i> Excelente!';
                document.getElementById('fbTitle').className = "feedback-title text-green-500";
                document.getElementById('fbMsg').innerText = step.explanation || "Você dominou esse conceito.";
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateProgress();
                document.getElementById('fbTitle').innerHTML = '<i class="fas fa-times-circle"></i> Incorreto!';
                document.getElementById('fbTitle').className = "feedback-title text-red-500";
                document.getElementById('fbMsg').innerText = step.explanation || "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                
                if (hearts <= 0) {
                    setTimeout(triggerGameOver, 600);
                }
            }
        }

        function triggerGameOver() {
            alert("VOCÊ FICOU SEM VIDAS. O treinamento será reiniciado."); 
            location.reload();
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            
            let nextBtnHtml = `<button class="check-btn active w-full" onclick="window.location.href='../lessons/5.2-wireless.html'" style="background: var(--cyber-green); color: black; border-color: var(--cyber-green); box-shadow: 0 4px 0 #008f20; font-size: 1.1rem; padding: 1.2rem; letter-spacing: 2px;">PRÓXIMA LIÇÃO <i class="fas fa-arrow-right ml-2"></i></button>`;
            if (nextBtnHtml.includes("##NEXT_LESSON_BTN" + "##")) {
                nextBtnHtml = `<button class="check-btn active w-full" onclick="window.location.href='../lessons/1.0-introducao.html'" style="background: var(--cyber-green); color: black; border-color: var(--cyber-green); box-shadow: 0 4px 0 #b36200; font-size: 1.1rem; padding: 1.2rem; letter-spacing: 2px;">PRÓXIMA LIÇÃO <i class="fas fa-arrow-right ml-2"></i></button>`;
            }

            document.getElementById('gameArea').innerHTML = `
                <div class="game-card teach-card" style="align-items: center; text-align: center; border-color: var(--cyber-blue)">
                    <i class="fas fa-medal text-6xl text-yellow-400 mb-4 mt-4"></i>
                    <h2 class="title-main mb-2">Você concluiu esta lição e dominou os conceitos apresentados.</h2>
                    <p class="text-body mb-6">Você completou esta lição com sucesso!</p>
                    <div style="display: flex; flex-direction: column; gap: 1rem; width: 100%; align-items: center; margin-top: 1rem;">
                        ${nextBtnHtml}
                        <div style="display: flex; gap: 1rem; width: 100%; max-width: 400px; margin-top: 0.5rem;">
                            <button class="check-btn" onclick="location.reload()" style="flex: 1; background: #161b22; border: 2px solid #30363d; color: #c9d1d9; box-shadow: 0 4px 0 #0d1117; padding: 0.8rem 0.5rem;">
                                <i class="fas fa-rotate-right mb-1 block text-lg"></i>
                                <span style="font-size: 0.75rem; display: block; margin-top: 4px;">REINICIAR</span>
                            </button>
                            <button class="check-btn" onclick="window.location.href='../modules/modulo-05.html'" style="flex: 1; background: #161b22; border: 2px solid var(--cyber-blue); color: var(--cyber-blue); box-shadow: 0 4px 0 rgba(0,255,255,0.2); padding: 0.8rem 0.5rem;">
                                <i class="fas fa-layer-group mb-1 block text-lg"></i>
                                <span style="font-size: 0.75rem; display: block; margin-top: 4px;">MÓDULOS</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
