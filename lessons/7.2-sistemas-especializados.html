<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <title>CyberDuo - Sistemas Especializados 7.2</title>
    <link rel="stylesheet" href="../assets/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #e6edf3;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: max(0.8rem, env(safe-area-inset-top)) 1rem 0.8rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(230, 237, 243, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: clamp(0.95rem, 3.8vw, 1.1rem); color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: clamp(0.9rem, 3.5vw, 1rem); line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: clamp(1rem, 4vw, 1.15rem); font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: clamp(0.9rem, 3.5vw, 1rem); -webkit-tap-highlight-color: transparent;  min-height: 48px;}
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(230, 237, 243, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem 1rem max(1rem, env(safe-area-inset-bottom)); background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px;  min-height: 48px;}
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #b1bac4; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: clamp(1rem, 4vw, 1.2rem); font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: clamp(0.9rem, 3.5vw, 1rem); color: #8b949e; line-height: 1.4; }
    
        /* Design Spells: Interactive Magic */
        .option-card {
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @media (hover: hover) and (pointer: fine) {
            .option-card:hover:not(.disabled) {
                transform: translateX(6px);
                border-color: rgba(0, 242, 255, 0.5);
                box-shadow: -4px 0 10px rgba(0, 242, 255, 0.1);
            }
            .check-btn.active:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 15px rgba(0, 255, 65, 0.3), 0 4px 0 #008f20;
            }
        }
        .check-btn.active:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #008f20;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <div class="flex items-center justify-center cursor-pointer text-gray-500" style="min-width: 44px; min-height: 44px; margin-left: -10px;" onclick="window.location.href='../modules/modulo-07.html'"><i class="fas fa-times"></i></div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-mobile-screen',
                concept: 'Engenharia Reversa Mobile',
                desc: 'Analisar o código-fonte de apps compilados permite entender a arquitetura e manipular dispositivos através de técnicas como <span class="highlight-cyan">rooting</span> (Android) ou <span class="highlight-cyan">jailbreaking</span> (iOS).',
                task: 'Qual o objetivo de realizar engenharia reversa em um aplicativo móvel?',
                options: [
                    'Extrair informações sobre o código-fonte e entender a arquitetura subjacente',
                    'Aumentar a vida útil da bateria física do dispositivo móvel',
                    'Substituir o processador do celular por um modelo mais rápido'
                ],
                correctText: 'Extrair informações sobre o código-fonte e entender a arquitetura subjacente',
                explanation: 'A engenharia reversa expõe a lógica do app e pode revelar falhas de segurança.'
            },
            {
                icon: 'fa-key',
                concept: 'iOS Keychain e SQLite',
                desc: 'O <span class="highlight-yellow">Keychain do iOS</span> usa um banco de dados SQLite acessível apenas por APIs específicas. Falhas na implementação podem expor chaves e tokens via engenharia reversa.',
                task: 'Como o iOS Keychain armazena fisicamente as informações confidenciais?',
                options: [
                    'Em um banco de dados SQLite acessível via APIs do Keychain',
                    'Em arquivos de imagem PNG ocultos na pasta de fotos',
                    'Em uma planilha de Excel desprotegida na raiz do sistema'
                ],
                correctText: 'Em um banco de dados SQLite acessível via APIs do Keychain',
                explanation: 'Embora robusto, o Keychain pode ser alvo de análise estática se o app não usar criptografia de hardware adicional.'
            },
            {
                icon: 'fa-fingerprint',
                concept: 'Bypass Biométrico',
                desc: 'Vulnerabilidades de integração permitem o <span class="highlight-red">bypass biométrico</span>. Atacantes usam instrumentação dinâmica para contornar a autenticação local (PIN/Digital).',
                task: 'Qual técnica é usada para burlar a autenticação biométrica em dispositivos móveis?',
                options: [
                    'Ataque de bypass biométrico por instrumentação (ex: Frida)',
                    'Substituição do sensor de impressão digital por um espelho',
                    'Aumento da resolução da tela para enganar o reconhecimento facial'
                ],
                correctText: 'Ataque de bypass biométrico por instrumentação (ex: Frida)',
                explanation: 'Ferramentas de instrumentação podem forçar o app a aceitar qualquer entrada como "sucesso".'
            },
            {
                icon: 'fa-thumbtack',
                concept: 'Pinagem de Certificado',
                desc: 'O <span class="highlight-cyan">Certificate Pinning</span> evita que o app aceite certificados de CAs comprometidas, forçando o uso de uma chave pública específica e conhecida.',
                task: 'Como agressores tentam ignorar a pinagem de certificado (pinning) em testes?',
                options: [
                    'Desbloqueando o aparelho (root/jailbreak) e usando ferramentas como SSL Kill Switch 2',
                    'Desligando o servidor web para que o app não consiga validar o cert',
                    'Mudando o fuso horário do celular para o ano de 1999'
                ],
                correctText: 'Desbloqueando o aparelho (root/jailbreak) e usando ferramentas como SSL Kill Switch 2',
                explanation: 'Em aparelhos desbloqueados, é possível "matar" a função de verificação de pinning do app.'
            },
            {
                icon: 'fa-bug',
                concept: 'Fragmentação do Android',
                desc: 'A <span class="highlight-yellow">Fragmentação</span> do Android deixa dispositivos sem patches de segurança, pois fabricantes muitas vezes não atualizam o firmware de modelos antigos.',
                task: 'Qual a principal vulnerabilidade gerada pela fragmentação do ecossistema Android?',
                options: [
                    'Existência de inúmeras versões desatualizadas e sem suporte a patches de segurança',
                    'Obrigação de usar apenas um tipo de carregador USB-C',
                    'Falta de suporte a aplicativos de jogos em telas pequenas'
                ],
                correctText: 'Existência de inúmeras versões desatualizadas e sem suporte a patches de segurança',
                explanation: 'A fragmentação é o maior desafio para manter a higiene digital em redes corporativas.'
            },
            {
                icon: 'fa-toolbox',
                concept: 'Toolkit de Exploração Mobile',
                desc: 'Ferramentas como <span class="highlight-cyan">Drozer</span> (Android), <span class="highlight-cyan">Needle</span> (iOS), <span class="highlight-cyan">MobSF</span> e <span class="highlight-cyan">Objection</span> são o padrão da indústria para auditoria mobile.',
                task: 'Qual destas ferramentas utiliza o Frida nos bastidores para análise de memória e bypass de segurança?',
                options: [
                    'Objection',
                    'Wireshark',
                    'Putty'
                ],
                correctText: 'Objection',
                explanation: 'Objection é uma ferramenta de exploração de tempo de execução (runtime) muito poderosa para mobile.'
            },
            {
                icon: 'fa-industry',
                concept: 'Complexidade IoT e SCADA',
                desc: 'Sistemas industriais (<span class="highlight-red">ICS/SCADA</span>) envolvem hardware dispar e protocolos legados (Modbus, Zigbee) de múltiplos fornecedores, dificultando a gestão.',
                task: 'O que torna o gerenciamento e a segurança de sistemas IoT/ICS tão desafiadores?',
                options: [
                    'Uso de tecnologias legadas, hardware dispar e múltiplos fornecedores',
                    'Excesso de padronização mundial em todos os sensores de pressão',
                    'A proibição do uso de internet em qualquer tipo de fábrica moderna'
                ],
                correctText: 'Uso de tecnologias legadas, hardware dispar e múltiplos fornecedores',
                explanation: 'A "névoa" de dispositivos dificulta a aplicação de uma política de segurança uniforme.'
            },
            {
                icon: 'fa-tower-broadcast',
                concept: 'Protocolos de Bordas IoT',
                desc: 'Protocolos como <span class="highlight-yellow">Bluetooth Low Energy (BLE)</span> e <span class="highlight-yellow">Modbus</span> muitas vezes não implementam criptografia, permitindo ataques On-Path (MITM).',
                task: 'Qual equipamento especializado é usado para analisar o protocolo BLE em ambientes IoT?',
                options: [
                    'Ubertooth One',
                    'Cabo Ethernet CAT6',
                    'Antena de TV Digital'
                ],
                correctText: 'Ubertooth One',
                explanation: 'Equipamentos SDR e Ubertooth permitem capturar e injetar tráfego em protocolos wireless de baixa energia.'
            },
            {
                icon: 'fa-search',
                concept: 'IoT no Shodan.io',
                desc: 'Pesquisas em <span class="highlight-cyan">Shodan.io</span> revelam centenas de dispositivos IoT com credenciais padrão e configurações inseguras expostas publicamente.',
                task: 'O que caracteriza a exposição de ICS e SCADA em ferramentas como o Shodan?',
                options: [
                    'Exposição direta de PLCs que controlam turbinas e robôs industriais à internet',
                    'Criptografia quântica obrigatória para todos os dispositivos de estádios',
                    'Remoção automática de IPs de servidores de energia da rede mundial'
                ],
                correctText: 'Exposição direta de PLCs que controlam turbinas e robôs industriais à internet',
                explanation: 'A visibilidade de sistemas críticos no Shodan é um risco de segurança nacional e corporativo.'
            },
            {
                icon: 'fa-microchip',
                concept: 'Interface IPMI e BMC',
                desc: 'A <span class="highlight-red">IPMI</span> permite o gerenciamento out-of-band independente do SO. Comprometer o BMC (Baseboard Management Controller) equivale ao acesso físico.',
                task: 'Qual o risco de um agressor comprometer o subsistema BMC (IPMI) de um servidor?',
                options: [
                    'Capacidade de monitorar, reinicializar e instalar implantes no nível do hardware',
                    'Redução na velocidade de rotação dos ventiladores de refrigeração',
                    'Mudança no nome de usuário do perfil de usuário convidado do Windows'
                ],
                correctText: 'Capacidade de monitorar, reinicializar e instalar implantes no nível do hardware',
                explanation: 'O BMC tem controle total sobre a placa-mãe, operando abaixo do nível do Sistema Operacional.'
            },
            {
                icon: 'fa-server',
                concept: 'Virtualização e Hipervisores',
                desc: 'Existem dois tipos de hipervisores: <span class="highlight-cyan">Tipo 1</span> (bare-metal, direto no hardware) e <span class="highlight-cyan">Tipo 2</span> (rodando sobre um SO hospedeiro).',
                task: 'O que define um hipervisor de Tipo 1 de acordo com o padrão da indústria?',
                options: [
                    'Executa diretamente no hardware físico (bare-metal)',
                    'Rodando como um aplicativo dentro do Windows ou MacOS',
                    'Um script de navegador para rodar jogos em nuvem'
                ],
                correctText: 'Executa diretamente no hardware físico (bare-metal)',
                explanation: 'Hipervisores Tipo 1 (como ESXi ou Xen) são mais eficientes e comuns em data centers.'
            },
            {
                icon: 'fa-box-open',
                concept: 'Segurança de Contêineres',
                desc: 'Contêineres (<span class="highlight-yellow">Docker, containerd</span>) exigem camadas de segurança: imagem segura, tempo de execução protegido e infraestrutura endurecida.',
                task: 'Qual a recomendação do CIS Benchmarks para a execução de contêineres Docker?',
                options: [
                    'Não executar contêineres com privilégios de raiz (root)',
                    'Permitir acesso anônimo total a todos os daemons Docker da rede',
                    'Substituir imagens Docker por máquinas virtuais completas em todos os casos'
                ],
                correctText: 'Não executar contêineres com privilégios de raiz (root)',
                explanation: 'Privilégios limitados impedem que uma quebra no contêiner comprometa o host inteiro.'
            },
            {
                icon: 'fa-bug-slash',
                concept: 'Scanners de Contêiner',
                desc: 'Ferramentas como <span class="highlight-green">Grype, Trivy e Clair</span> realizam varreduras em imagens de contêiner para identificar vulnerabilidades antes da implantação.',
                task: 'Para que servem ferramentas como Grype e Trivy no fluxo CI/CD?',
                options: [
                    'Verificar imagens do Docker em busca de vulnerabilidades conhecidas',
                    'Acelerar a velocidade de build do código-fonte em 200%',
                    'Mudar a cor da logo da empresa em todos os repositórios Git'
                ],
                correctText: 'Verificar imagens do Docker em busca de vulnerabilidades conhecidas',
                explanation: 'Escanear imagens garante que backdoors ou bibliotecas vulneráveis não cheguem à produção.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">7.2 • SISTEMAS ESPECIALIZADOS • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "SISTEMA VALIDADO!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "CONEXÃO CORROMPIDA!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("ACESSO BLOQUEADO. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: var(--cyber-blue)">
                    <i class="fas fa-medal text-5xl text-yellow-400 mb-2"></i>
                    <h2 class="text-xl font-bold text-white mb-1">DOMÍNIO TÉCNICO ALCANÇADO!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você dominou exaustivamente os ataques em Sistemas Móveis, IoT, Virtualização e Contêineres no Módulo 7.2.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-07.html'" style="background: var(--cyber-blue); color: black;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
