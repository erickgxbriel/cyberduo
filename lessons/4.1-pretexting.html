<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberDuo - Pretexting e Impersonação 4.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #ff00ff;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(255, 0, 255, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: 1.05rem; color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: 0.95rem; line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }
        .highlight-magenta { color: #ff00ff; font-weight: 700; }

        .question-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: 0.95rem; -webkit-tap-highlight-color: transparent; }
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(255, 0, 255, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem; background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px; }
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #990099; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: 0.95rem; color: #8b949e; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="game-header">
        <i class="fas fa-times cursor-pointer text-gray-500" onclick="window.location.href='../modules/modulo-04.html'"></i>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-comments',
                concept: 'Elicitação Estratégica',
                desc: 'A <span class="highlight-magenta">Elicitação</span> é o ato de obter informações sem pedir diretamente por elas. O agressor utiliza o desejo natural das pessoas de serem úteis ou educadas.',
                task: 'Qual a principal característica da técnica de elicitação?',
                options: [
                    'Obter conhecimento da vítima sem que ela perceba que está sendo interrogada',
                    'Ameaçar fisicamente o alvo para obter sua senha de administrador',
                    'Injetar scripts maliciosos em campos de comentários de blogs'
                ],
                correctText: 'Obter conhecimento da vítima sem que ela perceba que está sendo interrogada',
                explanation: 'A elicitação é sutil e evita levantar as defesas naturais da vítima.'
            },
            {
                icon: 'fa-user-pen',
                concept: 'Técnicas de Interrogatório',
                desc: 'Interrogadores usam perguntas <span class="highlight-yellow">abertas</span> para saber valores e objetivos, e perguntas <span class="highlight-yellow">fechadas</span> para liderar ou interromper a conversa.',
                task: 'Por que o interrogador usa perguntas abertas em uma abordagem social?',
                options: [
                    'Para encorajar o alvo a falar mais e revelar detalhes inesperados',
                    'Para forçar a vítima a responder apenas com "Sim" ou "Não"',
                    'Para encerrar a interação o mais rápido possível'
                ],
                correctText: 'Para encorajar o alvo a falar mais e revelar detalhes inesperados',
                explanation: 'Perguntas abertas extraem informações que o agressor nem sabia que poderia obter.'
            },
            {
                icon: 'fa-magnifying-glass',
                concept: 'Abordagem de Estreitamento',
                desc: 'Interrogadores bem-sucedidos utilizam uma <span class="highlight-cyan">abordagem de estreitamento</span> em seu questionamento para obter o máximo de informações possível.',
                task: 'Qual a finalidade da abordagem de estreitamento no interrogatório?',
                options: [
                    'Direcionar a conversa gradualmente para o detalhe específico desejado',
                    'Fazer tantas perguntas que a vítima acabe se confundindo e fugindo',
                    'Criptografar a voz do agressor para que ele não seja identificado'
                ],
                correctText: 'Direcionar a conversa gradualmente para o detalhe específico desejado',
                explanation: 'Começa-se com o geral e funila-se para o dado sensível (ex: versão do software usado).'
            },
            {
                icon: 'fa-eye',
                concept: 'Sinais de Reação Física',
                desc: 'Engenheiros sociais observam sinais como <span class="highlight-red">mudança na cor da pele</span> (pálida ou vermelha), direção da cabeça e movimento de mãos e pés.',
                task: 'O que a cor do rosto ficando pálida ou vermelha pode indicar ao agressor?',
                options: [
                    'Uma reação emocional de estresse, mentira ou desconforto da vítima',
                    'Que o sistema operacional da vítima foi atualizado com sucesso',
                    'Que a conexão Wi-Fi da sala está sofrendo interferência'
                ],
                correctText: 'Uma reação emocional de estresse, mentira ou desconforto da vítima',
                explanation: 'Reações fisiológicas involuntárias são pistas cruciais sobre o estado mental do alvo.'
            },
            {
                icon: 'fa-ear-listen',
                concept: 'Análise de Voz e Fala',
                desc: 'O agressor presta atenção ao <span class="highlight-cyan">tom, velocidade, disfunções e pausas</span> na voz da vítima para medir sua confiança ou suspeita.',
                task: 'Qual característica da fala é monitorada para identificar hesitação no alvo?',
                options: [
                    'O número de sílabas, disfunções e a duração das pausas',
                    'O sotaque regional da vítima e sua preferência musical',
                    'O modelo de microfone que a vítima está utilizando'
                ],
                correctText: 'O número de sílabas, disfunções e a duração das pausas',
                explanation: 'Pausas anormais ou gagueira podem indicar que a vítima está começando a desconfiar ou mentir.'
            },
            {
                icon: 'fa-id-card',
                concept: 'Pretexting e Personificação',
                desc: 'No <span class="highlight-magenta">Pretexting</span>, o agressor apresenta-se como alguém (ex: suporte de TI) para obter acesso a informações ou sistemas.',
                task: 'Como se define a técnica de Pretexting na Engenharia Social?',
                options: [
                    'A criação de uma nova identidade ou cenário falso para manipular o alvo',
                    'O processo de varredura de portas abertas em um servidor web',
                    'A criptografia de e-mails usando chaves públicas PGP'
                ],
                correctText: 'A criação de uma nova identidade ou cenário falso para manipular o alvo',
                explanation: 'O pretexto fornece a "razão legítima" para a vítima realizar a ação de risco.'
            },
            {
                icon: 'fa-truck-fast',
                concept: 'Ataques de Impostura',
                desc: 'Agressores fingem ser <span class="highlight-yellow">entregadores</span> (Amazon, UPS) ou mensageiros para obter acesso físico a instalações sem experiência na função.',
                task: 'Qual o perigo de um agressor personificar um entregador de encomendas?',
                options: [
                    'Obter entrada física em áreas restritas sob o pretexto de uma entrega',
                    'Reduzir o custo de frete para a organização alvo',
                    'Testar a integridade física das embalagens da empresa'
                ],
                correctText: 'Obter entrada física em áreas restritas sob o pretexto de uma entrega',
                explanation: 'Uniformes e caixas de entrega são disfarces de autoridade e urgência física.'
            },
            {
                icon: 'fa-user-gear',
                concept: 'Suporte de TI Falso',
                desc: 'Fingir ser da equipe de <span class="highlight-cyan">Suporte de TI</span> é eficaz porque usuários tendem a aceitar ajuda não solicitada para "problemas técnicos".',
                task: 'Por que o pretexto de suporte de TI é um dos mais bem-sucedidos?',
                options: [
                    'Porque concede acesso físico e lógico aos sistemas da organização',
                    'Porque técnicos de TI têm permissão legal para vender dados',
                    'Porque o suporte de TI não precisa usar autenticação multifator'
                ],
                correctText: 'Porque concede acesso físico e lógico aos sistemas da organização',
                explanation: 'A vítima confia no "técnico" para mexer em sua máquina e resolver falhas imaginárias.'
            },
            {
                icon: 'fa-usb',
                concept: ' Scripts em Pen Drives',
                desc: 'Um atacante com acesso físico pode usar um <span class="highlight-red">pen drive</span> contendo scripts personalizados para comprometer um computador em segundos.',
                task: 'Qual o risco de um agressor ter acesso físico momentâneo a uma estação de trabalho?',
                options: [
                    'Inserir um pendrive malicioso e comprometer o sistema quase instantaneamente',
                    'Aumentar o consumo de energia elétrica da tomada da estação',
                    'Mudar a orientação da tela do monitor permanentemente'
                ],
                correctText: 'Inserir um pendrive malicioso e comprometer o sistema quase instantaneamente',
                explanation: 'Scripts de automação (como Rubber Ducky) executam comandos assim que o USB é inserido.'
            },
            {
                icon: 'fa-route',
                concept: 'Mecânica do Pharming',
                desc: 'O <span class="highlight-magenta">Pharming</span> redireciona a vítima de um site válido para um malicioso, alterando arquivos host ou envenenando o DNS.',
                task: 'Como ocorre o redirecionamento em um ataque de Pharming?',
                options: [
                    'Através da modificação do arquivo host ou envenenamento de servidores DNS',
                    'Enviando um e-mail com anexo infectado por macro de Excel',
                    'Interceptando as ondas de rádio do roteador Wi-Fi da vítima'
                ],
                correctText: 'Através da modificação do arquivo host ou envenenamento de servidores DNS',
                explanation: 'O Pharming ataca a infraestrutura de resolução de nomes para enganar o navegador.'
            },
            {
                icon: 'fa-shield-halved',
                concept: 'Mitigação e Defesa',
                desc: 'A mitigação inclui <span class="highlight-green">treinamento de conscientização</span>, testes periódicos e políticas de segurança física e lógica rigorosas.',
                task: 'Qual a recomendação para mitigar ataques de personificação e personificação física?',
                options: [
                    'Treinamento abrangente de conscientização e testes periódicos de funcionários',
                    'Substituição de todos os funcionários humanos por inteligência artificial',
                    'Desativação de todos os serviços de entrega e e-mail na empresa'
                ],
                correctText: 'Treinamento abrangente de conscientização e testes periódicos de funcionários',
                explanation: 'Conhecimento é a única defesa eficaz contra vetores que exploram a psicologia humana.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon text-fuchsia-500"></i>
                    <div class="text-[0.6rem] text-fuchsia-500 font-black uppercase tracking-widest mb-1">4.1 • PRETEXTING • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "VETOR VALIDADO!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "PSICOLOGIA FALHOU!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("SESSÃO EXPIRADA. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: #ff00ff">
                    <i class="fas fa-mask text-5xl text-magenta-400 mb-2" style="color: #ff00ff"></i>
                    <h2 class="text-xl font-bold text-white mb-1">MÉTODO DOMINADO!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você compreendeu exaustivamente as táticas de interrogatório, sinais físicos e personificação.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-04.html'" style="background: #ff00ff; color: white; border-bottom: 4px solid #990099;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
