<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <title>CyberDuo - Vulnerabilidades de Injeção 6.4</title>
    <link rel="stylesheet" href="../assets/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #00f2ff;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: max(0.8rem, env(safe-area-inset-top)) 1rem 0.8rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(0, 242, 255, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: clamp(0.95rem, 3.8vw, 1.1rem); color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: clamp(0.9rem, 3.5vw, 1rem); line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: clamp(1rem, 4vw, 1.15rem); font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: clamp(0.9rem, 3.5vw, 1rem); -webkit-tap-highlight-color: transparent;  min-height: 48px;}
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(0, 242, 255, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem 1rem max(1rem, env(safe-area-inset-bottom)); background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px;  min-height: 48px;}
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #0099a1; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: clamp(1rem, 4vw, 1.2rem); font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: clamp(0.9rem, 3.5vw, 1rem); color: #8b949e; line-height: 1.4; }
    
        /* Design Spells: Interactive Magic */
        .option-card {
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @media (hover: hover) and (pointer: fine) {
            .option-card:hover:not(.disabled) {
                transform: translateX(6px);
                border-color: rgba(0, 242, 255, 0.5);
                box-shadow: -4px 0 10px rgba(0, 242, 255, 0.1);
            }
            .check-btn.active:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 15px rgba(0, 255, 65, 0.3), 0 4px 0 #008f20;
            }
        }
        .check-btn.active:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #008f20;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <div class="flex items-center justify-center cursor-pointer text-gray-500" style="min-width: 44px; min-height: 44px; margin-left: -10px;" onclick="window.location.href='../modules/modulo-06.html'"><i class="fas fa-times"></i></div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-syringe',
                concept: 'Conceito de Injeção',
                desc: 'Vulnerabilidades de <span class="highlight-cyan">Injeção</span> ocorrem quando aplicativos aceitam entrada de usuário não higienizada, permitindo que código malicioso seja executado no servidor ou banco de dados.',
                task: 'Qual a principal causa das vulnerabilidades de injeção em aplicações web?',
                options: [
                    'A falta de higienização ou validação de entrada de dados do usuário',
                    'O uso de cabos Ethernet sem blindagem magnética adequada',
                    'A desativação do brilho máximo nos monitores do data center'
                ],
                correctText: 'A falta de higienização ou validação de entrada de dados do usuário',
                explanation: 'Se o app confia na entrada do usuário para montar comandos, o atacante pode manipular esses comandos.'
            },
            {
                icon: 'fa-database',
                concept: 'SQL Injection (SQLi)',
                desc: 'O <span class="highlight-yellow">SQLi</span> envolve injetar instruções SQL para manipular o banco de dados. Um exemplo clássico é usar <span class="highlight-cyan">" Smith\' OR \'1\'=\'1 "</span> para ignorar login.',
                task: 'O que o payload "\' OR \'1\'=\'1" normalmente faz em um formulário de login vulnerável?',
                options: [
                    'Faz com que a consulta retorne verdadeiro para todos os registros',
                    'Apaga permanentemente a tabela de usuários do banco de dados',
                    'Desliga o sistema de firewall de rede física da empresa'
                ],
                correctText: 'Faz com que a consulta retorne verdadeiro para todos os registros',
                explanation: 'A condição OR 1=1 é sempre verdadeira, forçando o banco a aceitar o acesso sem senha.'
            },
            {
                icon: 'fa-terminal',
                concept: 'Injeção de Comando',
                desc: 'Na <span class="highlight-red">Injeção de Comando</span>, o agressor tenta executar comandos do sistema operacional (ex: <span class="highlight-cyan">; cat /etc/passwd</span>) através do aplicativo.',
                task: 'Qual o objetivo de um atacante ao realizar uma injeção de comando?',
                options: [
                    'Executar comandos do sistema operacional com privilégios do aplicativo',
                    'Aumentar o tempo de resposta do suporte técnico via chat',
                    'Criptografar as imagens da galeria de fotos do desenvolvedor'
                ],
                correctText: 'Executar comandos do sistema operacional com privilégios do aplicativo',
                explanation: 'Se o app passa entrada para um shell (como ping), o atacante pode anexar outros comandos via ponto e vírgula.'
            },
            {
                icon: 'fa-search',
                concept: 'Identificação de Vetores',
                desc: 'Pentesters começam adicionando uma <span class="highlight-yellow">aspa única (\')</span> ou ponto e vírgula (;) aos campos para observar erros de sintaxe SQL.',
                task: 'Ao receber um erro de "Sintaxe SQL" após inserir uma aspa única (\'), o que o pentester confirmou?',
                options: [
                    'Que o campo é potencialmente vulnerável à injeção de SQL',
                    'Que o servidor web está bloqueando ataques automaticamente',
                    'Que o banco de dados foi formatado com sucesso'
                ],
                correctText: 'Que o campo é potencialmente vulnerável à injeção de SQL',
                explanation: 'O erro indica que a aspa interferiu na estrutura da consulta original do servidor.'
            },
            {
                icon: 'fa-layer-group',
                concept: 'Técnica UNION',
                desc: 'O operador <span class="highlight-cyan">UNION</span> permite combinar o resultado da consulta original com uma consulta maliciosa do atacante (ex: listar números de cartões).',
                task: 'Qual a utilidade do operador UNION em um ataque de injeção de SQL?',
                options: [
                    'Combinar resultados de duas consultas SELECT em um único conjunto',
                    'Multiplicar a velocidade de download de dados do banco de dados',
                    'Deletar todos os registros de uma tabela específica'
                ],
                correctText: 'Combinar resultados de duas consultas SELECT em um único conjunto',
                explanation: 'O UNION é usado para extrair dados de tabelas que não faziam parte da consulta original.'
            },
            {
                icon: 'fa-eye-slash',
                concept: 'Blind SQLi (Booleana)',
                desc: 'Em <span class="highlight-yellow">Injeções Cegas (Blind)</span>, o app não mostra erros, mas o atacante observa mudanças de comportamento (ex: 404 vs 200) para deduzir dados.',
                task: 'Como um atacante deduz informações em um ataque Blind SQLi?',
                options: [
                    'Observando as diferenças de resposta (verdadeiro vs falso) do aplicativo',
                    'Lendo o código-fonte PHP diretamente no navegador do usuário',
                    'Pedindo a senha ao administrador através de um pop-up falso'
                ],
                correctText: 'Observando as diferenças de resposta (verdadeiro vs falso) do aplicativo',
                explanation: 'O atacante faz perguntas ao banco (ex: a primeira letra da senha é A?) e vê se a página carrega ou falha.'
            },
            {
                icon: 'fa-hourglass-half',
                concept: 'Time-Delay SQLi',
                desc: 'A técnica de <span class="highlight-red">atraso de tempo (sleep)</span> é usada quando não há feedback visual. O tempo de resposta indica se a condição injetada foi verdadeira.',
                task: 'O que o comando "sleep(10)" faz em uma técnica de injeção de SQL?',
                options: [
                    'Força o servidor a atrasar a resposta, indicando sucesso na condição',
                    'Desliga o servidor web por 10 minutos para manutenção',
                    'Aumenta a segurança do banco de dados retardando ataques'
                ],
                correctText: 'Força o servidor a atrasar a resposta, indicando sucesso na condição',
                explanation: 'Se a resposta demorar 10 segundos, o atacante sabe que sua pergunta ao banco foi respondida com "Sim".'
            },
            {
                icon: 'fa-network-wired',
                concept: 'Injeção Out-of-Band',
                desc: 'A exploração <span class="highlight-cyan">Out-of-Band</span> força o banco de dados a fazer uma conexão externa (ex: DNS/HTTP) para enviar os dados para o servidor do atacante.',
                task: 'Qual a vantagem da técnica Out-of-Band sobre as outras técnicas de injeção?',
                options: [
                    'Permite extrair dados usando um canal de comunicação diferente',
                    'É o único método que funciona em redes sem internet',
                    'Não exige nenhum conhecimento de sintaxe SQL para ser executado'
                ],
                correctText: 'Permite extrair dados usando um canal de comunicação diferente',
                explanation: 'É útil quando o canal de resposta direta está bloqueado ou monitorado.'
            },
            {
                icon: 'fa-robot',
                concept: 'Ferramenta SQLmap',
                desc: 'O <span class="highlight-green">SQLmap</span> é a ferramenta padrão para automatizar a detecção e exploração de vulnerabilidades de injeção de SQL.',
                task: 'Qual ferramenta é amplamente usada para automatizar o dump de bancos de dados via SQLi?',
                options: [
                    'SQLmap',
                    'Wireshark',
                    'Nmap'
                ],
                correctText: 'SQLmap',
                explanation: 'O SQLmap detecta automaticamente o tipo de injeção e extrai os dados com um clique/comando.'
            },
            {
                icon: 'fa-sitemap',
                concept: 'Injeção de LDAP',
                desc: 'Injeção de <span class="highlight-yellow">LDAP</span> explora falhas em serviços de diretório, injetando consultas para modificar a árvore ou obter dados de usuários da rede.',
                task: 'O que caracteriza um ataque de injeção de LDAP bem-sucedido?',
                options: [
                    'Permite manipular consultas e obter informações de serviços de diretório',
                    'Transforma o servidor web em um roteador Wi-Fi de alta potência',
                    'Criptografa todos os e-mails recebidos pela organização alvo'
                ],
                correctText: 'Permite manipular consultas e obter informações de serviços de diretório',
                explanation: 'Semelhante ao SQLi, o LDAP injection manipula o protocolo de acesso a diretórios corporativos.'
            },
            {
                icon: 'fa-shield-halved',
                concept: 'Mitigação e Higienização',
                desc: 'A defesa primária contra injeção é o uso de <span class="highlight-green">consultas parametrizadas</span> e a higienização rigorosa (sanitização) de toda entrada de usuário.',
                task: 'Qual a melhor prática de codificação para prevenir Injeção de SQL?',
                options: [
                    'Utilizar consultas parametrizadas (Prepared Statements)',
                    'Ocultar o código SQL dentro de arquivos de imagem binários',
                    'Bloquear o acesso de todos os usuários ao banco de dados relacional'
                ],
                correctText: 'Utilizar consultas parametrizadas (Prepared Statements)',
                explanation: 'Consultas parametrizadas separam o comando SQL dos dados, tornando a injeção impossível.'
            },
            {
                icon: 'fa-plug',
                concept: 'Shell Reverso vs Bind',
                desc: 'Em injeções de comando, o atacante usa <span class="highlight-cyan">Netcat</span> para criar shells reversos (vítima -> atacante) ou bind shells (backdoors no sistema).',
                task: 'Qual a definição técnica de um "Shell Reverso"?',
                options: [
                    'Uma conexão iniciada do sistema da vítima para a máquina do agressor',
                    'Uma conexão que inverte a ordem das letras nos comandos digitados',
                    'Um sistema que protege o disco rígido contra exclusões acidentais'
                ],
                correctText: 'Uma conexão iniciada do sistema da vítima para a máquina do agressor',
                explanation: 'O shell reverso é preferido para burlar firewalls que bloqueiam conexões de entrada.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">6.4 • INJEÇÃO WEB • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "VETOR VALIDADO!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "VETOR BLOQUEADO!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("ACESSO NEGADO. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: var(--cyber-blue)">
                    <i class="fas fa-syringe text-5xl text-cyan-400 mb-2"></i>
                    <h2 class="text-xl font-bold text-white mb-1">MESTRE DA INJEÇÃO!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você dominou exaustivamente os vetores de injeção SQL, Comando e LDAP no Módulo 6.4.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-06.html'" style="background: var(--cyber-blue); color: black;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
