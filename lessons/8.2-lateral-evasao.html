<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <title>CyberDuo - Movimento Lateral e Evasão 8.2</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #ff003c;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: max(0.8rem, env(safe-area-inset-top)) 1rem 0.8rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(255, 0, 60, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: clamp(0.95rem, 3.8vw, 1.1rem); color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: clamp(0.9rem, 3.5vw, 1rem); line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: clamp(1rem, 4vw, 1.15rem); font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: clamp(0.9rem, 3.5vw, 1rem); -webkit-tap-highlight-color: transparent;  min-height: 48px;}
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(255, 0, 60, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem 1rem max(1rem, env(safe-area-inset-bottom)); background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px;  min-height: 48px;}
        .check-btn.active { background: var(--cyber-blue); color: white; box-shadow: 0 4px 0 #990024; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: clamp(1rem, 4vw, 1.2rem); font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: clamp(0.9rem, 3.5vw, 1rem); color: #8b949e; line-height: 1.4; }
    
        /* Design Spells: Interactive Magic */
        .option-card {
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @media (hover: hover) and (pointer: fine) {
            .option-card:hover:not(.disabled) {
                transform: translateX(6px);
                border-color: rgba(0, 242, 255, 0.5);
                box-shadow: -4px 0 10px rgba(0, 242, 255, 0.1);
            }
            .check-btn.active:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 15px rgba(0, 255, 65, 0.3), 0 4px 0 #008f20;
            }
        }
        .check-btn.active:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #008f20;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <div class="flex items-center justify-center cursor-pointer text-gray-500" style="min-width: 44px; min-height: 44px; margin-left: -10px;" onclick="window.location.href='../modules/modulo-08.html'"><i class="fas fa-times"></i></div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-shoe-prints',
                concept: 'Movimento Lateral',
                desc: 'O objetivo do <span class="highlight-cyan">Movimento Lateral</span> (ou pivotagem) é passar de um dispositivo para outro para evitar detecção e localizar dados confidenciais de alto valor.',
                task: 'O que define tecnicamente o conceito de "Pivotagem" em uma rede?',
                options: [
                    'Usar um sistema comprometido para atacar outros sistemas na rede interna',
                    'Mudar a senha do administrador local para uma sequência aleatória',
                    'Inverter a ordem das pastas no diretório principal do servidor'
                ],
                correctText: 'Usar um sistema comprometido para atacar outros sistemas na rede interna',
                explanation: 'A máquina invadida vira o novo ponto de partida do atacante para explorar a rede.'
            },
            {
                icon: 'fa-id-card',
                concept: 'Pass the Hash (PtH)',
                desc: 'No <span class="highlight-yellow">Pass the Hash</span>, o atacante usa o hash da senha coletado (em vez da senha real) para se autenticar em outros sistemas Windows na rede.',
                task: 'Por que a técnica "Pass the Hash" é tão eficaz em ambientes Windows?',
                options: [
                    'Porque hashes de senha não podem ser invertidos, mas podem ser reutilizados',
                    'Porque o Windows não utiliza nenhum tipo de criptografia para hashes',
                    'Porque permite que o atacante apague o disco rígido da vítima sem senha'
                ],
                correctText: 'Porque hashes de senha não podem ser invertidos, mas podem ser reutilizados',
                explanation: 'O protocolo NTLM aceita o hash como prova de identidade sem exigir a senha em texto claro.'
            },
            {
                icon: 'fa-microchip',
                concept: 'WMI e WinRM',
                desc: 'O <span class="highlight-cyan">WinRM</span> e o <span class="highlight-cyan">WMI</span> são ferramentas legítimas do Windows usadas para gerenciar sistemas remotamente, mas abusadas por hackers para execução de comandos.',
                task: 'Qual comando habilita o WinRM permitindo conexões remotas em um sistema Windows?',
                options: [
                    'Enable-PSRemoting -Force',
                    'net stop winrm',
                    'ls -R c:\\windows'
                ],
                correctText: 'Enable-PSRemoting -Force',
                explanation: 'O comando configura o serviço e as regras de firewall para aceitar comandos PowerShell remotos.'
            },
            {
                icon: 'fa-toolbox',
                concept: 'Sysinternals e PsExec',
                desc: 'O <span class="highlight-yellow">PsExec</span> permite executar processos remotamente e ver a saída no terminal do atacante, tornando-o quase invisível para o usuário da vítima.',
                task: 'Qual a principal vantagem do PsExec para um atacante de pós-exploração?',
                options: [
                    'A saída dos comandos é mostrada no sistema do atacante, não no da vítima',
                    'Ele criptografa automaticamente todos os arquivos do disco rígido alvo',
                    'Ele é capaz de quebrar senhas de BIOS sem precisar reiniciar a máquina'
                ],
                correctText: 'A saída dos comandos é mostrada no sistema do atacante, não no da vítima',
                explanation: 'Isso evita que pop-ups ou janelas de terminal apareçam na tela do usuário alvo.'
            },
            {
                icon: 'fa-dog',
                concept: 'BloodHound',
                desc: 'O <span class="highlight-red">BloodHound</span> usa teoria de grafos para revelar caminhos ocultos e relacionamentos complexos dentro de um Active Directory do Windows.',
                task: 'Para que um pentester utilizaria a ferramenta BloodHound?',
                options: [
                    'Para identificar caminhos críticos de ataque e privilégios no Active Directory',
                    'Para monitorar o tráfego de rede física em busca de cabos rompidos',
                    'Para aumentar o limite de usuários em uma rede Wi-Fi doméstica'
                ],
                correctText: 'Para identificar caminhos críticos de ataque e privilégios no Active Directory',
                explanation: 'BloodHound mapeia quem pode "virar quem" até chegar ao Domain Admin.'
            },
            {
                icon: 'fa-terminal',
                concept: 'PowerSploit e Empire',
                desc: 'O <span class="highlight-cyan">Empire</span> permite implementar agentes PowerShell que rodam sem a necessidade do powershell.exe, facilitando a evasão de detecção.',
                task: 'O que caracteriza a estrutura de pós-exploração "Empire"?',
                options: [
                    'Framework que executa agentes PowerShell e Python para persistência e evasão',
                    'Um sistema de firewall que bloqueia conexões vindas do exterior',
                    'Uma lista de senhas padrões para roteadores da marca Cisco'
                ],
                correctText: 'Framework que executa agentes PowerShell e Python para persistência e evasão',
                explanation: 'Empire é focado em táticas furtivas de pós-exploração e controle.'
            },
            {
                icon: 'fa-mask',
                concept: 'Esteganografia',
                desc: 'A <span class="highlight-yellow">Esteganografia</span> envolve esconder mensagens ou arquivos dentro de imagens ou vídeos. A ferramenta <span class="highlight-cyan">steghide</span> é o padrão no Linux.',
                task: 'Qual o objetivo de usar esteganografia durante a exfiltração de dados?',
                options: [
                    'Esconder informações confidenciais dentro de arquivos de mídia comuns',
                    'Criptografar o nome do usuário para que ele não veja que está logado',
                    'Aumentar a resolução da imagem para esconder defeitos visuais'
                ],
                correctText: 'Esconder informações confidenciais dentro de arquivos de mídia comuns',
                explanation: 'Uma imagem enviada por e-mail ou upload pode conter gigabytes de dados ocultos.'
            },
            {
                icon: 'fa-broom',
                concept: 'Evasão e Cleanup',
                desc: 'A etapa final é o <span class="highlight-green">Cleanup</span>: apagar logs, excluir contas criadas e remover arquivos temporários para não deixar rastros da invasão.',
                task: 'Por que o processo de limpeza (Cleanup) deve ser documentado nas regras de engajamento?',
                options: [
                    'Para garantir que o ambiente do cliente retorne ao estado original e seguro',
                    'Para cobrar o cliente pelo serviço de faxina técnica realizado',
                    'Para evitar que o cliente saiba quais falhas foram encontradas'
                ],
                correctText: 'Para garantir que o ambiente do cliente retorne ao estado original e seguro',
                explanation: 'O profissional ético nunca deixa "pontas soltas" ou backdoors ativos após o teste.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">8.2 • EVASÃO E MOVIMENTO • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "VETOR VALIDADO!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "PROTOCOLO DETECTADO!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("ACESSO BLOQUEADO. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: var(--cyber-blue)">
                    <i class="fas fa-medal text-5xl text-yellow-400 mb-2"></i>
                    <h2 class="text-xl font-bold text-white mb-1">MOVIMENTO LATERAL DOMINADO!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você dominou as técnicas de pivotagem, evasão e ferramentas de pós-exploração no Módulo 8.2.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-08.html'" style="background: var(--cyber-blue); color: white;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
