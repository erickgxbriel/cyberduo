<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <title>CyberDuo - CSRF e SSRF 6.8</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #00f2ff;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: max(0.8rem, env(safe-area-inset-top)) 1rem 0.8rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(0, 242, 255, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: clamp(0.95rem, 3.8vw, 1.1rem); color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: clamp(0.9rem, 3.5vw, 1rem); line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: clamp(1rem, 4vw, 1.15rem); font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: clamp(0.9rem, 3.5vw, 1rem); -webkit-tap-highlight-color: transparent;  min-height: 48px;}
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(0, 242, 255, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem 1rem max(1rem, env(safe-area-inset-bottom)); background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px;  min-height: 48px;}
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #0099a1; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: clamp(1rem, 4vw, 1.2rem); font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: clamp(0.9rem, 3.5vw, 1rem); color: #8b949e; line-height: 1.4; }
    
        /* Design Spells: Interactive Magic */
        .option-card {
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @media (hover: hover) and (pointer: fine) {
            .option-card:hover:not(.disabled) {
                transform: translateX(6px);
                border-color: rgba(0, 242, 255, 0.5);
                box-shadow: -4px 0 10px rgba(0, 242, 255, 0.1);
            }
            .check-btn.active:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 15px rgba(0, 255, 65, 0.3), 0 4px 0 #008f20;
            }
        }
        .check-btn.active:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #008f20;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <div class="flex items-center justify-center cursor-pointer text-gray-500" style="min-width: 44px; min-height: 44px; margin-left: -10px;" onclick="window.location.href='../modules/modulo-06.html'"><i class="fas fa-times"></i></div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-exchange-alt',
                concept: 'Conceito de CSRF',
                desc: 'A <span class="highlight-cyan">Falsificação de Solicitação Entre Sites (CSRF)</span> aproveita a confiança que um site tem no navegador de um usuário já autenticado para executar comandos não autorizados.',
                task: 'Como um ataque de CSRF explora a confiança entre cliente e servidor?',
                options: [
                    'Utilizando a sessão ativa e os cookies salvos no navegador da vítima',
                    'Quebrando a criptografia RSA de 2048 bits do servidor de arquivos',
                    'Redirecionando o tráfego físico de cabos submarinos de fibra ótica'
                ],
                correctText: 'Utilizando a sessão ativa e os cookies salvos no navegador da vítima',
                explanation: 'O navegador envia automaticamente os cookies de autenticação em qualquer requisição para o site alvo.'
            },
            {
                icon: 'fa-mouse-pointer',
                concept: 'Ataque de Um Clique',
                desc: 'Vulnerabilidades CSRF são frequentemente referidas como <span class="highlight-yellow">ataques de um único clique</span> ou sequestro de sessão através de requisições involuntárias.',
                task: 'O que caracteriza a execução de um ataque CSRF clássico?',
                options: [
                    'O usuário clica em um link malicioso que dispara uma ação no site onde está logado',
                    'O atacante digita a senha da vítima manualmente na página de login oficial',
                    'O servidor web detecta o agressor e entrega a chave mestra de acesso'
                ],
                correctText: 'O usuário clica em um link malicioso que dispara uma ação no site onde está logado',
                explanation: 'O clique do usuário "valida" a requisição maliciosa com sua identidade legítima.'
            },
            {
                icon: 'fa-cookie-bite',
                concept: 'O Papel dos Cookies',
                desc: 'Ataques CSRF dependem da <span class="highlight-cyan">identidade do usuário</span> mantida via cookies. O atacante faz o navegador enviar solicitações HTTP para o site de destino.',
                task: 'Por que sites financeiros são alvos críticos para vulnerabilidades CSRF?',
                options: [
                    'Porque permitem transferências de dinheiro sem o conhecimento direto do usuário',
                    'Porque utilizam apenas imagens coloridas para representar o saldo bancário',
                    'Porque são os únicos sites que exigem o uso de mouse para navegação'
                ],
                correctText: 'Permitir transferências de dinheiro sem o conhecimento direto do usuário',
                explanation: 'Ações críticas (transferir, comprar, mudar senha) são os alvos principais do CSRF.'
            },
            {
                icon: 'fa-shield-halved',
                concept: 'Mitigação no Servidor',
                desc: 'As defesas contra CSRF devem ser implementadas no <span class="highlight-green">lado do servidor</span>, como o uso de tokens anti-CSRF exclusivos para cada sessão ou ação.',
                task: 'Qual a técnica de defesa mais comum e eficaz contra ataques CSRF?',
                options: [
                    'Uso de tokens anti-CSRF exclusivos e validados pelo servidor',
                    'Ocultar o código-fonte HTML de usuários não administradores',
                    'Reduzir a velocidade de processamento de requisições POST anônimas'
                ],
                correctText: 'Uso de tokens anti-CSRF exclusivos e validados pelo servidor',
                explanation: 'Sem o token correto, o servidor recusa a requisição mesmo com o cookie de sessão presente.'
            },
            {
                icon: 'fa-server',
                concept: 'Conceito de SSRF',
                desc: 'A <span class="highlight-red">Falsificação de Solicitação do Lado do Servidor (SSRF)</span> ocorre quando um agressor induz o servidor a fazer solicitações para recursos internos ou externos.',
                task: 'Qual o objetivo primário de um atacante ao explorar uma falha de SSRF?',
                options: [
                    'Induzir o servidor web a acessar sistemas que não estão expostos à internet',
                    'Formatar permanentemente o disco rígido do computador do usuário final',
                    'Mudar a senha do roteador Wi-Fi pessoal da vítima remotamente'
                ],
                correctText: 'Induzir o servidor web a acessar sistemas que não estão expostos à internet',
                explanation: 'O servidor vulnerável atua como um "proxy" para o atacante alcançar a rede interna protegida.'
            },
            {
                icon: 'fa-cloud',
                concept: 'SSRF e Metadados de Nuvem',
                desc: 'O SSRF é extremamente perigoso em nuvem, permitindo ler <span class="highlight-cyan">metadados da instância</span> (ex: AWS/GCP) e obter chaves de acesso temporárias.',
                task: 'O que um atacante pode obter ao realizar SSRF contra o serviço de metadados da nuvem?',
                options: [
                    'Chaves de segurança, tokens IAM e credenciais temporárias de acesso',
                    'O endereço residencial físico de todos os funcionários da empresa',
                    'Um cupom de desconto ilimitado para compras na loja virtual alvo'
                ],
                correctText: 'Chaves de segurança, tokens IAM e credenciais temporárias de acesso',
                explanation: 'O serviço de metadados (IMDS) é um alvo clássico para escalada de privilégios via SSRF.'
            },
            {
                icon: 'fa-bug',
                concept: 'CSRF vs SSRF',
                desc: 'Enquanto o CSRF explora a <span class="highlight-yellow">sessão do usuário</span> no navegador, o SSRF explora a <span class="highlight-red">confiança de rede</span> do servidor.',
                task: 'Qual a principal diferença de vetor entre CSRF e SSRF?',
                options: [
                    'CSRF mira no navegador do cliente; SSRF mira nas capacidades de rede do servidor',
                    'CSRF acontece via Wi-Fi; SSRF acontece apenas em servidores via cabo Ethernet',
                    'Não há diferença; ambos são nomes diferentes para o mesmo tipo de ataque'
                ],
                correctText: 'CSRF mira no navegador do cliente; SSRF mira nas capacidades de rede do servidor',
                explanation: 'CSRF = Falsificação de Cliente; SSRF = Falsificação de Servidor.'
            },
            {
                icon: 'fa-user-check',
                concept: 'Defesa com Allow-lists',
                desc: 'Para mitigar SSRF, deve-se usar <span class="highlight-green">listas de permissão (allow-lists)</span> de domínios/IPs e desativar o suporte a esquemas de URL desnecessários (file://, gopher://).',
                task: 'Qual estratégia é fundamental para prevenir vulnerabilidades de SSRF?',
                options: [
                    'Implementar listas de permissão rigorosas para destinos de conexões do servidor',
                    'Bloquear o acesso de navegadores web antigos como o Internet Explorer 6',
                    'Remover a bateria CMOS da placa-mãe do servidor web de produção'
                ],
                correctText: 'Implementar listas de permissão rigorosas para destinos de conexões do servidor',
                explanation: 'Limitar para onde o servidor pode se conectar impede que ele seja usado como vetor de ataque.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">6.8 • CSRF & SSRF • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "SOLICITAÇÃO VALIDADA!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "FALSIFICAÇÃO DETECTADA!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("CONEXÃO CORROMPIDA. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: var(--cyber-green)">
                    <i class="fas fa-medal text-5xl text-yellow-400 mb-2"></i>
                    <h2 class="text-xl font-bold text-white mb-1">TRILHA DE FALSIFICAÇÃO CONCLUÍDA!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você dominou as diferenças e mitigações de CSRF e SSRF no Módulo 6.8.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-06.html'" style="background: var(--cyber-green); color: black;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
