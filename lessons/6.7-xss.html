<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <title>CyberDuo - Cross-Site Scripting 6.7</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #00f2ff;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: max(0.8rem, env(safe-area-inset-top)) 1rem 0.8rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(0, 242, 255, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: clamp(0.95rem, 3.8vw, 1.1rem); color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: clamp(0.9rem, 3.5vw, 1rem); line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: clamp(1rem, 4vw, 1.15rem); font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: clamp(0.9rem, 3.5vw, 1rem); -webkit-tap-highlight-color: transparent;  min-height: 48px;}
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(0, 242, 255, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem 1rem max(1rem, env(safe-area-inset-bottom)); background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px;  min-height: 48px;}
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #0099a1; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: clamp(1rem, 4vw, 1.2rem); font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: clamp(0.9rem, 3.5vw, 1rem); color: #8b949e; line-height: 1.4; }
    
        /* Design Spells: Interactive Magic */
        .option-card {
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @media (hover: hover) and (pointer: fine) {
            .option-card:hover:not(.disabled) {
                transform: translateX(6px);
                border-color: rgba(0, 242, 255, 0.5);
                box-shadow: -4px 0 10px rgba(0, 242, 255, 0.1);
            }
            .check-btn.active:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 15px rgba(0, 255, 65, 0.3), 0 4px 0 #008f20;
            }
        }
        .check-btn.active:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #008f20;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <div class="flex items-center justify-center cursor-pointer text-gray-500" style="min-width: 44px; min-height: 44px; margin-left: -10px;" onclick="window.location.href='../modules/modulo-06.html'"><i class="fas fa-times"></i></div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-code',
                concept: 'Conceito de XSS',
                desc: 'O <span class="highlight-cyan">Cross-Site Scripting (XSS)</span> é um tipo de injeção onde scripts maliciosos são inseridos em páginas web para serem executados no navegador de outros usuários.',
                task: 'O que caracteriza essencialmente um ataque de XSS?',
                options: [
                    'A execução de scripts maliciosos no navegador da vítima através de um app web vulnerável',
                    'O envio massivo de e-mails de propaganda para endereços IP aleatórios',
                    'A alteração física dos servidores de DNS da rede interna da organização'
                ],
                correctText: 'A execução de scripts maliciosos no navegador da vítima através de um app web vulnerável',
                explanation: 'O XSS permite ao atacante agir em nome da vítima na aplicação web.'
            },
            {
                icon: 'fa-bolt',
                concept: 'XSS Refletido',
                desc: 'O <span class="highlight-yellow">XSS Refletido</span> ocorre quando o script é enviado em uma requisição (ex: link malicioso) e refletido imediatamente na resposta do servidor.',
                task: 'Como um agressor normalmente entrega um ataque XSS refletido?',
                options: [
                    'Persuadindo o usuário a clicar em um link malicioso construído',
                    'Armazenando o script permanentemente no banco de dados do servidor',
                    'Modificando o Modelo de Objeto de Documento (DOM) localmente'
                ],
                correctText: 'Persuadindo o usuário a clicar em um link malicioso construído',
                explanation: 'O payload viaja na URL e o servidor vulnerável o "reflete" de volta ao navegador.'
            },
            {
                icon: 'fa-database',
                concept: 'XSS Armazenado',
                desc: 'No <span class="highlight-red">XSS Armazenado</span>, o script malicioso é salvo permanentemente no servidor (ex: fóruns, comentários) e executado para todos que acessarem a página.',
                task: 'Qual o perigo maior do XSS Armazenado em comparação ao Refletido?',
                options: [
                    'O script afeta automaticamente todos os visitantes da página comprometida',
                    'O script exige que o atacante envie um link individual para cada vítima',
                    'O script desaparece assim que o banco de dados é reiniciado pelo admin'
                ],
                correctText: 'O script afeta automaticamente todos os visitantes da página comprometida',
                explanation: 'A persistência no banco de dados torna o ataque muito mais abrangente.'
            },
            {
                icon: 'fa-sitemap',
                concept: 'XSS Baseado em DOM',
                desc: 'No <span class="highlight-cyan">XSS baseado em DOM</span>, o payload é processado exclusivamente pelo navegador (cliente) e nunca é enviado ao servidor.',
                task: 'Onde ocorre o processamento da carga útil em ataques XSS baseados em DOM?',
                options: [
                    'Apenas no lado do cliente (navegador)',
                    'No banco de dados relacional do servidor backend',
                    'No firewall de borda da rede de longa distância (WAN)'
                ],
                correctText: 'Apenas no lado do cliente (navegador)',
                explanation: 'O ataque manipula a estrutura do documento (DOM) localmente para executar o script.'
            },
            {
                icon: 'fa-mask',
                concept: 'Ofuscação de Scripts',
                desc: 'Atacantes usam <span class="highlight-yellow">Unicode</span> ou codificação de marcas para disfarçar o código HTML malicioso e burlar filtros de segurança simples.',
                task: 'Por que atacantes utilizam técnicas de ofuscação em payloads XSS?',
                options: [
                    'Para disfarçar o script de filtros de entrada e evitar detecção visual',
                    'Para aumentar a velocidade de processamento do JavaScript no navegador',
                    'Para comprimir o arquivo HTML e economizar banda de internet da vítima'
                ],
                correctText: 'Para disfarçar o script de filtros de entrada e evitar detecção visual',
                explanation: 'Codificar o script impede que filtros por "palavras proibidas" (ex: <script>) o bloqueiem.'
            },
            {
                icon: 'fa-cookie-bite',
                concept: 'Impacto: Roubo de Sessão',
                desc: 'O XSS é frequentemente usado para roubar <span class="highlight-red">cookies de sessão</span>, permitindo que o atacante personifique a vítima no aplicativo.',
                task: 'Qual a consequência direta do roubo de tokens de sessão via XSS?',
                options: [
                    'O comprometimento total da conta e o sequestro da sessão da vítima',
                    'O aumento imediato da memória RAM disponível no computador do usuário',
                    'A formatação automática de todos os discos rígidos na rede local'
                ],
                correctText: 'O comprometimento total da conta e o sequestro da sessão da vítima',
                explanation: 'Com o cookie de sessão, o atacante "vira" o usuário para o servidor.'
            },
            {
                icon: 'fa-shield-halved',
                concept: 'Regras de Prevenção',
                desc: 'A regra geral do OWASP é <span class="highlight-green">nunca inserir dados não confiáveis</span> diretamente no DOM sem a codificação/higienização adequada.',
                task: 'De acordo com o OWASP, qual a melhor defesa contra Cross-Site Scripting?',
                options: [
                    'Codificação de saída e higienização rigorosa de entradas de usuários',
                    'Desativar permanentemente o uso de JavaScript em toda a internet',
                    'Criptografar as imagens estáticas enviadas via protocolo HTTP'
                ],
                correctText: 'Codificação de saída e higienização rigorosa de entradas de usuários',
                explanation: 'Transformar caracteres perigosos (ex: < para &lt;) impede a execução do script.'
            },
            {
                icon: 'fa-shield-check',
                concept: 'Subresource Integrity (SRI)',
                desc: 'O <span class="highlight-green">SRI</span> permite que o navegador verifique se as bibliotecas externas (JS/CSS) não foram manipuladas por terceiros através de hashes.',
                task: 'Como o recurso SRI protege sites contra a manipulação de bibliotecas externas?',
                options: [
                    'Comparando o hash do arquivo baixado com um valor de verificação esperado',
                    'Aumentando o tempo de expiração dos cookies de sessão do desenvolvedor',
                    'Bloqueando o acesso de robôs de busca como o Googlebot ao site'
                ],
                correctText: 'Comparando o hash do arquivo baixado com um valor de verificação esperado',
                explanation: 'Se um hacker alterar a biblioteca no servidor CDN, o hash não baterá e o navegador não a rodará.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">6.7 • CROSS-SITE SCRIPTING • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "SCRIPT VALIDADO!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "SCRIPT BLOQUEADO!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("ACESSO NEGADO. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
                <div class="fixation-card text-center items-center flex flex-col" style="border-color: var(--cyber-green)">
                    <i class="fas fa-medal text-5xl text-yellow-400 mb-2"></i>
                    <h2 class="text-xl font-bold text-white mb-1">XSS DOMINADO!</h2>
                    <p class="text-[0.7rem] text-gray-400 mb-4">Você compreendeu os tipos, impactos e mitigações de Cross-Site Scripting no Módulo 6.7.</p>
                    <button class="check-btn active w-full" onclick="window.location.href='../modules/modulo-06.html'" style="background: var(--cyber-green); color: black;">VOLTAR AO MÓDULO</button>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
