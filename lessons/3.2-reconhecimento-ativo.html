<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <title>CyberDuo - Reconhecimento Ativo 3.2</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #00facd;
            --cyber-green: #00ff41;
            --cyber-red: #ff003c;
            --cyber-yellow: #ffb800;
            --bg-dark: #05070a;
            --card-dark: #0d1117;
        }

        html, body { height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; touch-action: manipulation; }

        .game-header { flex-shrink: 0; padding: max(0.8rem, env(safe-area-inset-top)) 1rem 0.8rem; display: flex; align-items: center; gap: 0.8rem; background: #0d1117; border-bottom: 1px solid rgba(0, 250, 205, 0.2); z-index: 60; }
        .progress-container { flex-grow: 1; height: 8px; background: #1f2937; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cyber-blue); width: 0%; transition: width 0.4s ease; }
        .hearts { display: flex; gap: 0.3rem; color: var(--cyber-red); min-width: 100px; justify-content: flex-end; }

        .game-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0.8rem; width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; scrollbar-width: none; }
        .game-content::-webkit-scrollbar { display: none; }

        .fixation-card { background: #0d1117; border: 1px solid var(--cyber-blue); padding: clamp(1rem, 4vw, 1.3rem); border-radius: 1.2rem; width: 100%; box-sizing: border-box; margin-top: auto; margin-bottom: auto; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 0.3rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .concept-icon { font-size: 1.8rem; margin-bottom: 0.2rem; display: block; }
        .concept-text { font-size: clamp(0.95rem, 3.8vw, 1.1rem); color: var(--cyber-blue); font-weight: 800; text-transform: uppercase; margin-bottom: 0.1rem; }
        .concept-desc { color: #b1bac4; font-size: clamp(0.9rem, 3.5vw, 1rem); line-height: 1.4; text-align: left; margin-bottom: 0.8rem; border-left: 3px solid var(--cyber-blue); padding-left: 0.8rem; }

        .highlight-cyan { color: #00f2ff; font-weight: 700; }
        .highlight-yellow { color: var(--cyber-yellow); font-weight: 700; }
        .highlight-red { color: var(--cyber-red); font-weight: 700; }
        .highlight-green { color: var(--cyber-green); font-weight: 700; }

        .question-title { font-size: clamp(1rem, 4vw, 1.15rem); font-weight: 800; margin-bottom: 0.8rem; line-height: 1.4; color: white; padding-top: 0.8rem; border-top: 1px solid #1f2937; text-align: left; }

        .options-grid { display: grid; gap: 0.4rem; width: 100%; text-align: left; }
        .option-card { background: #161b22; border: 1px solid #30363d; border-bottom-width: 3px; padding: 0.7rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 0.6rem; font-weight: 600; font-size: clamp(0.9rem, 3.5vw, 1rem); -webkit-tap-highlight-color: transparent;  min-height: 48px;}
        .option-card.selected { border-color: var(--cyber-blue); background: rgba(0, 250, 205, 0.05); }
        .option-card.correct { border-color: var(--cyber-green) !important; background: rgba(0, 255, 65, 0.1) !important; color: var(--cyber-green); }
        .option-card.wrong { border-color: var(--cyber-red) !important; background: rgba(255, 0, 60, 0.1) !important; color: var(--cyber-red); }

        .game-footer { flex-shrink: 0; padding: 1rem 1rem max(1rem, env(safe-area-inset-bottom)); background: #0d1117; border-top: 1px solid #1f2937; width: 100%; display: flex; justify-content: center; box-sizing: border-box; z-index: 50; }
        .check-btn { width: 100%; max-width: 400px; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; background: #1f2937; color: #4b5563; border: none; font-size: 0.9rem; letter-spacing: 1px;  min-height: 48px;}
        .check-btn.active { background: var(--cyber-blue); color: black; box-shadow: 0 4px 0 #00b3a4; }

        .feedback-overlay { position: fixed; bottom: -100%; left: 0; right: 0; padding: 1.5rem; transition: bottom 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .feedback-overlay.show { bottom: 0; }
        .feedback-overlay.correct { background: #0d1a10; border-top: 3px solid var(--cyber-green); }
        .feedback-overlay.wrong { background: #1a0d0d; border-top: 3px solid var(--cyber-red); }
        .feedback-title { font-size: clamp(1rem, 4vw, 1.2rem); font-weight: 800; margin-bottom: 0.3rem; }
        .feedback-msg { font-size: clamp(0.9rem, 3.5vw, 1rem); color: #8b949e; line-height: 1.4; }
    
        /* Design Spells: Interactive Magic */
        .option-card {
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @media (hover: hover) and (pointer: fine) {
            .option-card:hover:not(.disabled) {
                transform: translateX(6px);
                border-color: rgba(0, 242, 255, 0.5);
                box-shadow: -4px 0 10px rgba(0, 242, 255, 0.1);
            }
            .check-btn.active:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 15px rgba(0, 255, 65, 0.3), 0 4px 0 #008f20;
            }
        }
        .check-btn.active:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #008f20;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <div class="flex items-center justify-center cursor-pointer text-gray-500" style="min-width: 44px; min-height: 44px; margin-left: -10px;" onclick="window.location.href='../modules/modulo-03.html'"><i class="fas fa-times"></i></div>
        <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        <div class="hearts" id="heartsContainer"></div>
    </div>

    <main class="game-content" id="gameArea"></main>

    <div id="feedbackPopup" class="feedback-overlay">
        <div class="feedback-title" id="fbTitle"></div>
        <div class="feedback-msg" id="fbMsg"></div>
        <button class="check-btn active w-full mt-4" onclick="handleContinue()">Continuar</button>
    </div>

    <footer class="game-footer" id="footerArea">
        <button class="check-btn" id="checkBtn" disabled onclick="checkResponse()">Verificar</button>
    </footer>

    <script>
        const phases = [
            {
                icon: 'fa-network-wired',
                concept: 'Reconhecimento Ativo',
                desc: 'O <span class="highlight-cyan">reconhecimento ativo</span> envolve interagir diretamente com o alvo enviando sondas e analisando as respostas para identificar serviços e vulnerabilidades.',
                task: 'Qual o risco principal do reconhecimento ativo para um Pentester?',
                options: [
                    'Ser detectado por sistemas de monitoramento e defesa do alvo (IDS/IPS)',
                    'Perder o acesso físico ao seu próprio laboratório de testes',
                    'Receber uma multa automática do provedor de internet do alvo'
                ],
                correctText: 'Ser detectado por sistemas de monitoramento e defesa do alvo (IDS/IPS)',
                explanation: 'A interação direta gera logs e pode disparar alarmes de segurança.'
            },
            {
                icon: 'fa-bullseye',
                concept: 'Nmap: SYN Scan (-sS)',
                desc: 'O <span class="highlight-yellow">SYN Scan</span> (semi-aberto) envia um pacote SYN e aguarda um SYN/ACK para confirmar se a porta está aberta, sem completar a conexão TCP.',
                task: 'O que indica uma resposta SYN/ACK recebida durante uma varredura SYN do Nmap?',
                options: [
                    'A porta está em estado de escuta (aberta)',
                    'A porta está fechada e o tráfego foi recusado',
                    'A porta está filtrada por um firewall de rede'
                ],
                correctText: 'A porta está em estado de escuta (aberta)',
                explanation: 'O SYN/ACK confirma que o serviço está pronto para aceitar conexões.'
            },
            {
                icon: 'fa-plug',
                concept: 'TCP Connect Scan (-sT)',
                desc: 'O <span class="highlight-cyan">Connect Scan</span> utiliza as chamadas de rede do SO para completar o handshake TCP de 3 vias. É mais ruidoso que o SYN scan.',
                task: 'Quando um Pentester normalmente deve usar a opção -sT em vez de -sS?',
                options: [
                    'Quando o usuário não possui privilégios de administrador para criar pacotes crus',
                    'Quando o objetivo é realizar a varredura mais rápida e silenciosa possível',
                    'Apenas para escanear redes que utilizam exclusivamente cabos de fibra'
                ],
                correctText: 'Quando o usuário não possui privilégios de administrador para criar pacotes crus',
                explanation: 'O scan -sT usa a stack TCP do sistema, não exigindo privilégios de "raw socket".'
            },
            {
                icon: 'fa-bolt',
                concept: 'UDP Scan (-sU)',
                desc: 'O <span class="highlight-yellow">UDP Scan</span> identifica serviços como DNS, SNMP e DHCP. Ele envia pacotes UDP e interpreta mensagens "ICMP Port Unreachable" como porta fechada.',
                task: 'O que o Nmap assume se não receber resposta nenhuma de uma porta em um UDP scan?',
                options: [
                    'Aberta/Filtrada (open|filtered)',
                    'Fechada (closed)',
                    'Resetada (reset)'
                ],
                correctText: 'Aberta/Filtrada (open|filtered)',
                explanation: 'Como o UDP não exige resposta, a ausência dela pode significar que o pacote chegou ou foi barrado.'
            },
            {
                icon: 'fa-stopwatch',
                concept: 'Opções de Temporização (-T)',
                desc: 'Nmap oferece 6 modelos (0 a 5). O <span class="highlight-red">-T0 (Paranoico)</span> é lentíssimo para evitar detecção, enquanto o <span class="highlight-red">-T5 (Insano)</span> é extremamente agressivo.',
                task: 'Qual a finalidade de usar a opção de temporização -T4 no Nmap?',
                options: [
                    'Acelerar a varredura assumindo uma rede rápida e confiável',
                    'Garantir que nenhum sistema de IDS consiga detectar a varredura',
                    'Desativar o scanner automaticamente após 4 minutos de execução'
                ],
                correctText: 'Acelerar a varredura assumindo uma rede rápida e confiável',
                explanation: '-T4 é o equilíbrio comum para redes estáveis, reduzindo o tempo de espera.'
            },
            {
                icon: 'fa-id-card',
                concept: 'Enumeração SMB',
                desc: 'A enumeração <span class="highlight-cyan">SMB</span> (porta 445) permite listar usuários, grupos e compartilhamentos em redes Windows usando scripts como <span class="highlight-yellow">smb-enum-users.nse</span>.',
                task: 'Qual o objetivo principal de enumerar compartilhamentos SMB na fase de reconhecimento?',
                options: [
                    'Mapear a superfície de ataque interna e identificar possíveis vazamentos de dados',
                    'Mudar a senha do administrador do domínio remotamente sem ser detectado',
                    'Bloquear o acesso de todos os funcionários aos arquivos da rede'
                ],
                correctText: 'Mapear a superfície de ataque interna e identificar possíveis vazamentos de dados',
                explanation: 'Saber quais pastas estão compartilhadas revela onde dados sensíveis podem estar expostos.'
            },
            {
                icon: 'fa-terminal',
                concept: 'Enum4linux',
                desc: 'A ferramenta <span class="highlight-cyan">enum4linux</span> automatiza a extração de informações de sistemas Windows/Samba, incluindo políticas de senha e usuários.',
                task: 'O que a ferramenta enum4linux busca extrair especificamente?',
                options: [
                    'Informações de contas, compartilhamentos e configurações de sistemas Windows/Samba',
                    'O código-fonte de aplicativos web hospedados em servidores Apache',
                    'A localização física exata dos roteadores Wi-Fi da organização'
                ],
                correctText: 'Informações de contas, compartilhamentos e configurações de sistemas Windows/Samba',
                explanation: 'É uma ferramenta indispensável para reconhecimento em redes locais.'
            },
            {
                icon: 'fa-globe',
                concept: 'Enumeração Web (http-enum)',
                desc: 'O script <span class="highlight-yellow">http-enum</span> do Nmap realiza força bruta em diretórios conhecidos para encontrar painéis de administração (ex: /admin, /manager).',
                task: 'Para que serve o script http-enum durante a varredura de um servidor web?',
                options: [
                    'Para identificar caminhos e arquivos comuns que podem ser caminhos para exploração',
                    'Para criptografar as imagens da página inicial e impedir a visualização',
                    'Para aumentar a largura de banda do servidor durante o teste'
                ],
                correctText: 'Para identificar caminhos e arquivos comuns que podem ser caminhos para exploração',
                explanation: 'Encontrar um /phpmyadmin ou /backup/ exposto é o primeiro passo para o exploit.'
            },
            {
                icon: 'fa-search',
                concept: 'Scanner Nikto',
                desc: 'O <span class="highlight-cyan">Nikto</span> é um scanner de vulnerabilidades web "barulhento" que busca por arquivos perigosos, softwares desatualizados e erros de configuração.',
                task: 'Por que o Nikto é frequentemente classificado como um scanner de "muito ruído"?',
                options: [
                    'Porque gera um grande volume de requisições HTTP que aparecem nos logs de defesa',
                    'Porque emite bips sonoros altos toda vez que encontra uma falha',
                    'Porque só funciona se o servidor web estiver com o volume no máximo'
                ],
                correctText: 'Porque gera um grande volume de requirições HTTP que aparecem nos logs de defesa',
                explanation: 'Sua varredura rápida deixa rastros claros para qualquer analista de SOC.'
            },
            {
                icon: 'fa-python',
                concept: 'Packet Crafting com Scapy',
                desc: 'O <span class="highlight-cyan">Scapy</span> é um framework Python que permite criar, manipular e enviar pacotes personalizados de quase qualquer protocolo de rede.',
                task: 'Qual a principal vantagem do Scapy sobre scanners de portas tradicionais?',
                options: [
                    'A capacidade de criar pacotes com campos de dados de protocolo totalmente personalizados',
                    'Ele é capaz de quebrar qualquer senha de Wi-Fi em menos de 10 segundos',
                    'Não exige nenhum conhecimento de programação ou redes para ser utilizado'
                ],
                correctText: 'A capacidade de criar pacotes com campos de dados de protocolo totalmente personalizados',
                explanation: 'Com Scapy você pode forjar pacotes para testar regras específicas de firewall.'
            },
            {
                icon: 'fa-code',
                concept: 'Função ls() no Scapy',
                desc: 'Em Scapy, a função <span class="highlight-yellow">ls()</span> permite listar todos os protocolos suportados ou detalhar os campos de um protocolo específico (ex: ls(TCP)).',
                task: 'Qual a finalidade da função ls(DNS) dentro do terminal do Scapy?',
                options: [
                    'Exibir todos os campos do pacote DNS que podem ser modificados',
                    'Listar todos os servidores DNS públicos disponíveis no mundo',
                    'Apagar o histórico de consultas DNS do sistema operacional local'
                ],
                correctText: 'Exibir todos os campos do pacote DNS que podem ser modificados',
                explanation: 'Permite ao profissional saber exatamente quais "parafusos" ele pode apertar no pacote.'
            },
            {
                icon: 'fa-user-gear',
                concept: 'Privilégios Raiz (Scapy)',
                desc: 'Para manipular pacotes e realizar injeções na rede, o Scapy deve ser executado obrigatoriamente com privilégios de <span class="highlight-red">ROOT (sudo)</span>.',
                task: 'Por que o Scapy exige permissões de superusuário (root)?',
                options: [
                    'Para poder criar e enviar pacotes crus (raw sockets) diretamente para a rede',
                    'Para garantir que o script Python não seja deletado acidentalmente',
                    'Porque é a única forma de acessar sites que utilizam criptografia SSL'
                ],
                correctText: 'Para poder criar e enviar pacotes crus (raw sockets) diretamente para a rede',
                explanation: 'Sistemas operacionais restringem o acesso direto ao hardware de rede por segurança.'
            },
            {
                icon: 'fa-search-dollar',
                concept: 'Fingerprinting (-sC)',
                desc: 'A opção <span class="highlight-cyan">-sC</span> do Nmap executa os scripts NSE padrão para identificar versões e configurações dos serviços encontrados de forma automatizada.',
                task: 'O que a flag -sC do Nmap realiza durante uma varredura?',
                options: [
                    'Executa os scripts padrão do Nmap Scripting Engine (NSE)',
                    'Desliga o sistema alvo para verificar se ele reinicia sozinho',
                    'Criptografa a saída do comando em um arquivo PDF binário'
                ],
                correctText: 'Executa os scripts padrão do Nmap Scripting Engine (NSE)',
                explanation: 'É o atalho para uma auditoria inicial rica em detalhes sobre o alvo.'
            },
            {
                icon: 'fa-shoe-prints',
                concept: 'Evasão de IDS',
                desc: 'Atacantes usam técnicas como <span class="highlight-yellow">fragmentação de pacotes</span> e varreduras lentas (-T0/-T1) para evitar que sistemas de defesa bloqueiem o IP de ataque.',
                task: 'Como a fragmentação de pacotes ajuda na evasão de detecção?',
                options: [
                    'Divide a sonda em pedaços pequenos para tentar passar despercebida por filtros de pacotes',
                    'Aumenta a velocidade de download de arquivos grandes no servidor',
                    'Transforma o endereço IP do atacante em um endereço MAC aleatório'
                ],
                correctText: 'Divide a sonda em pedaços pequenos para tentar passar despercebida por filtros de pacotes',
                explanation: 'A ideia é "quebrar" a assinatura do ataque que o IDS está procurando.'
            },
            {
                icon: 'fa-shield-halved',
                concept: 'Segmentação de Rede',
                desc: 'A defesa primária contra reconhecimento e movimento lateral é a <span class="highlight-green">segmentação de rede</span> via VLANs e firewalls internos.',
                task: 'Por que a segmentação de rede é vital para a segurança organizacional?',
                options: [
                    'Para limitar o alcance de um invasor e proteger sistemas críticos em sub-redes isoladas',
                    'Para permitir que todos os usuários acessem todas as impressoras da rede',
                    'Para reduzir o custo mensal da conta de energia elétrica do data center'
                ],
                correctText: 'Para limitar o alcance de um invasor e proteger sistemas críticos em sub-redes isoladas',
                explanation: 'Se um computador for invadido, a segmentação impede que o hacker "pule" para o banco de dados.'
            },
            {
                icon: 'fa-check-double',
                concept: 'Conclusão Ativa',
                desc: 'Dominar ferramentas de reconhecimento ativo é o que permite mapear a <span class="highlight-green">superfície de ataque real</span> e planejar os exploits mais eficazes.',
                task: 'Qual o resultado esperado após uma fase de reconhecimento ativo bem-sucedida?',
                options: [
                    'Uma lista detalhada de hosts vivos, portas abertas e serviços vulneráveis',
                    'O desligamento total da rede do cliente sem possibilidade de volta',
                    'A formatação automática de todos os backups na nuvem da empresa'
                ],
                correctText: 'Uma lista detalhada de hosts vivos, portas abertas e serviços vulneráveis',
                explanation: 'Este inventário técnico é a base para a próxima fase: Exploração.'
            }
        ];

        let currentStep = 0;
        let selectedIdx = null;
        let hearts = 5;
        let shuffledOptions = [];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function render() {
            if (currentStep >= phases.length) { showVictory(); return; }
            const step = phases[currentStep];
            const area = document.getElementById('gameArea');
            const checkBtn = document.getElementById('checkBtn');
            const progress = (currentStep / phases.length) * 100;
            
            document.getElementById('progressFill').style.width = `${progress}%`;
            selectedIdx = null;
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            updateHearts();

            shuffledOptions = shuffle([...step.options]);

            area.innerHTML = `
                <div class="fixation-card">
                    <i class="fas ${step.icon} concept-icon" style="color: var(--cyber-blue)"></i>
                    <div class="text-[0.6rem] font-black uppercase tracking-widest mb-1" style="color: var(--cyber-blue)">3.2 • RECONHECIMENTO ATIVO • Nível ${currentStep + 1}</div>
                    <div class="concept-text">${step.concept}</div>
                    <div class="concept-desc">${step.desc}</div>
                    <div class="question-title">${step.task}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option-card" onclick="select(${i})">
                                <div class="w-5 h-5 border border-gray-600 rounded-full flex items-center justify-center text-[9px] font-bold">${i+1}</div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            area.scrollTop = 0;
        }

        function select(idx) {
            selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('checkBtn').classList.add('active');
        }

        function checkResponse() {
            const step = phases[currentStep];
            const isCorrect = shuffledOptions[selectedIdx] === step.correctText;
            const popup = document.getElementById('feedbackPopup');
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                if (shuffledOptions[i] === step.correctText) c.classList.add('correct');
                else if (i === selectedIdx) c.classList.add('wrong');
                c.classList.add('disabled', 'pointer-events-none');
            });

            if (isCorrect) {
                document.getElementById('fbTitle').innerText = "VETOR VALIDADO!";
                document.getElementById('fbTitle').className = "text-green-500 font-bold";
                document.getElementById('fbMsg').innerText = step.explanation;
                popup.className = "feedback-overlay show correct";
            } else {
                hearts--;
                updateHearts();
                document.getElementById('fbTitle').innerText = "PACOTE CORROMPIDO!";
                document.getElementById('fbTitle').className = "text-red-500 font-bold";
                document.getElementById('fbMsg').innerText = "O correto era: " + step.correctText;
                popup.className = "feedback-overlay show wrong";
                if (hearts <= 0) setTimeout(() => { alert("ACESSO NEGADO. Reiniciando!"); location.reload(); }, 500);
            }
        }

        function handleContinue() {
            document.getElementById('feedbackPopup').classList.remove('show');
            currentStep++;
            render();
        }

        function updateHearts() {
            const container = document.getElementById('heartsContainer');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<i class="${i < hearts ? 'fas' : 'far'} fa-heart"></i>`).join('');
        }

        function showVictory() {
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('footerArea').classList.add('hidden');
            document.getElementById('gameArea').innerHTML = `
